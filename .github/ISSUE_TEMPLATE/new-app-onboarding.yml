name: "🚀 New App Onboarding"
description: "Checkliste für das Onboarding einer neuen App in die Platform (ADR-056 M2)"
title: "Onboarding: [APP-NAME]"
labels: ["onboarding", "deployment"]
body:
  - type: markdown
    attributes:
      value: |
        ## Pre-Deployment Checkliste (ADR-056)
        Alle Punkte müssen abgehakt sein, bevor der erste Workflow-Run gestartet wird.
        Führe zuerst das Pre-Flight-Script aus:
        ```bash
        ./scripts/validate-deployment-readiness.sh --repo <repo> --app <app> --pat <PAT>
        ```
        Server: `88.198.191.108` | Registry: `ghcr.io/achimdehnert/` | Runner: `self-hosted`  # noqa: hardcode

  - type: input
    id: app_name
    attributes:
      label: App-Name
      placeholder: "z.B. trading-hub"
    validations:
      required: true

  - type: input
    id: repo_url
    attributes:
      label: GitHub Repository URL
      placeholder: "https://github.com/achimdehnert/<repo>" # noqa: hardcode
    validations:
      required: true

  - type: input
    id: port
    attributes:
      label: App-Port (Host)
      placeholder: "z.B. 8088 — muss in ADR-021 §2.9 registriert sein"
    validations:
      required: true

  - type: checkboxes
    id: github_checks
    attributes:
      label: "1. GitHub Repository Settings (Fehlerklasse A)"
      description: "Verhindert startup_failure durch falsche Actions-Permissions"
      options:
        - label: "`allowed_actions` ist auf `all` oder `selected` gesetzt (NICHT `local_only`)"
          required: true
        - label: "Secret `DEPLOY_HOST` ist gesetzt (Wert: `88.198.191.108`)"  # noqa: hardcode
          required: true
        - label: "Secret `DEPLOY_USER` ist gesetzt (Wert: `root`)"
          required: true
        - label: "Secret `DEPLOY_SSH_KEY` ist gesetzt (SSH-Private-Key)"
          required: true
        - label: "GitHub Actions ist für das Repo aktiviert"
          required: true
        - label: "`permissions: packages: write` ist im Workflow deklariert"
          required: true

  - type: checkboxes
    id: dockerfile_checks
    attributes:
      label: "2. Dockerfile & Dependencies (Fehlerklasse B)"
      description: "Verhindert ModuleNotFoundError und Build-Fehler im CI"
      options:
        - label: "Kein `COPY packages/` (Cross-Repo COPY) im Dockerfile"
          required: true
        - label: "Keine absoluten lokalen Pfade (`/home/`, `/opt/`) in `pyproject.toml` oder `requirements.txt`" # noqa: hardcode
          required: true
        - label: "`platform_context` ist via GHCR-Package installiert (nicht via `wheels/`) — ADR-056 §2.3"
          required: false
        - label: "Image-Name in `docker-compose.prod.yml` stimmt mit Build-Output überein (`ghcr.io/achimdehnert/<repo>:latest`)"
          required: true
        - label: "Build pusht sowohl `latest` als auch `<sha7>`-Tag (für Rollback)"
          required: true

  - type: checkboxes
    id: workflow_checks
    attributes:
      label: "3. Workflow-Konfiguration (Fehlerklasse C)"
      description: "Verhindert startup_failure durch falsche Workflow-Struktur — ADR-056 §2.2"
      options:
        - label: "Inline `ci-cd.yml` Template verwendet (ADR-056 §2.2) — KEIN Mischen von Reusable + normalen Jobs"
          required: true
        - label: "Kein `inputs.*` bei Push-Triggern"
          required: true
        - label: "`runs-on: self-hosted` in allen Jobs"
          required: true
        - label: "Health-Check via `/livez/` nach Deploy-Job vorhanden"
          required: true

  - type: checkboxes
    id: server_checks
    attributes:
      label: "4. Server-Konfiguration (Fehlerklasse D)"
      description: "Verhindert 502 Bad Gateway und Infrastructure Drift — Server: 88.198.191.108"  # noqa: hardcode
      options:
        - label: "Deploy-Pfad `/opt/<app>/` existiert auf `88.198.191.108`"  # noqa: hardcode
          required: true
        - label: "`.env.prod` liegt in `/opt/<app>/.env.prod`" # noqa: hardcode
          required: true
        - label: "`.env.prod` enthält: `POSTGRES_USER`, `POSTGRES_PASSWORD`, `SECRET_KEY`, `ALLOWED_HOSTS`"
          required: true
        - label: "Nginx-Config in `/etc/nginx/sites-enabled/` vorhanden und proxy_pass korrekt"
          required: true
        - label: "Kein `proxy_pass http://127.0.0.1:...` in Nginx (muss auf Container-Port zeigen)" # noqa: hardcode
          required: true
        - label: "SSL-Zertifikat für die Domain via Let's Encrypt vorhanden"
          required: true
        - label: "Port in ADR-021 §2.9 Port-Registry eingetragen"
          required: true

  - type: checkboxes
    id: preflight_script
    attributes:
      label: "5. Pre-Flight Script"
      options:
        - label: "`./scripts/validate-deployment-readiness.sh --repo <repo> --app <app>` läuft ohne Fehler (exit 0)"
          required: true

  - type: textarea
    id: port_mapping
    attributes:
      label: Port-Mapping & Domain
      description: "Dokumentiere das Port-Mapping für ADR-021 §2.9"
      placeholder: |
        - App-Port (Host): 0.0.0.0:XXXX:8000
        - Nginx proxy_pass: http://localhost:XXXX # noqa: hardcode
        - Domain: https://app.example.com
        - SSL: Let's Encrypt ✓
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notizen / Abweichungen
      description: "Besonderheiten oder begründete Abweichungen vom Standard-Setup (ADR-056)"
