# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  REUSABLE WORKFLOW: Python CI (Lint, Test, Security)                       ║
# ║  Usage: uses: achimdehnert/platform/.github/workflows/_ci-python.yml@main  ║
# ║  ADR-057 Phase 1: split test-unit / test-integration / coverage-report     ║
# ║  ADR-058: coverage_threshold=80 default, platform-context[testing] auto    ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

name: Python CI

on:
  workflow_call:
    inputs:
      python_version:
        description: 'Python version'
        required: false
        default: '3.12'
        type: string
      coverage_threshold:
        description: 'Minimum coverage % — CI fails below this (ADR-058)'
        required: false
        default: 80
        type: number
      requirements_file:
        description: 'Path to requirements.txt'
        required: false
        default: 'requirements.txt'
        type: string
      test_requirements_file:
        description: 'Path to requirements-test.txt'
        required: false
        default: 'requirements-test.txt'
        type: string
      django_settings_module:
        description: 'Django settings module for tests'
        required: false
        default: 'config.settings.test'
        type: string
      skip_tests:
        description: 'Skip tests (emergency only)'
        required: false
        default: false
        type: boolean
      enable_security_scan:
        description: 'Run pip-audit security scan'
        required: false
        default: true
        type: boolean
      run_contract_tests:
        description: 'Run contract tests (only on main)'
        required: false
        default: false
        type: boolean
      platform_context_version:
        description: 'platform-context[testing] version to install (empty = skip)'
        required: false
        default: '>=0.3.1'
        type: string
      pytest_workers:
        description: 'Number of parallel pytest workers (default: auto)'
        required: false
        default: 'auto'
        type: string
      ruff_version:
        description: 'Pinned ruff version to install (e.g. ==0.15.4). Empty = latest. Pin to match pyproject.toml required-version.'
        required: false
        default: '==0.15.4'
        type: string
      runs_on:
        description: 'Runner label (default: self-hosted). Override with ubuntu-latest if no runner registered.'
        required: false
        default: 'self-hosted'
        type: string
      src_dir:
        description: 'Directory containing manage.py (default: . for repo root, use src for risk-hub)'
        required: false
        default: '.'
        type: string

jobs:
  lint:
    name: "Lint & Format"
    runs-on: ${{ inputs.runs_on }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install ruff
        run: pip install "ruff${{ inputs.ruff_version }}"
      - name: Ruff check
        run: ruff check . --output-format=github
      - name: Ruff format check
        run: ruff format --check .

  secrets-scan:
    name: "Secret Detection (gitleaks)"
    runs-on: ${{ inputs.runs_on }}
    steps:
      - name: Clean stale gitleaks tmp (self-hosted)
        run: rm -f /tmp/gitleaks.tmp /tmp/gitleaks-*.tar.gz 2>/dev/null || true
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_LICENSE: ${{ github.token }}

  security:
    name: "Security Scan (pip-audit)"
    runs-on: ${{ inputs.runs_on }}
    if: ${{ inputs.enable_security_scan }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      - name: pip-audit
        run: |
          pip install pip-audit
          if [ -f "${{ inputs.requirements_file }}" ]; then
            pip-audit -r ${{ inputs.requirements_file }} || true
          fi

  test-unit:
    name: "Unit Tests"
    runs-on: ${{ inputs.runs_on }}
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install dependencies
        run: |
          pip install -r ${{ inputs.requirements_file }}
          if [ -f "${{ inputs.test_requirements_file }}" ]; then
            pip install -r ${{ inputs.test_requirements_file }}
          fi
      - name: Install iil-packages (aifw, promptfw, authoringfw, weltenfw, nl2cad, fieldprefill)
        env:
          PROJECT_PAT: ${{ secrets.PROJECT_PAT }}
        run: |
          pip install \
            "iil-aifw>=0.5.0,<1" \
            "iil-promptfw>=0.5.1,<1" \
            "iil-authoringfw>=0.3.0,<1" \
            "iil-weltenfw>=0.1.0,<1" \
            "iil-nl2cad>=0.1.0,<1" \
            2>/dev/null || \
          pip install \
            "aifw>=0.5.0,<1" \
            "promptfw>=0.2.0,<1" \
            "authoringfw>=0.3.0,<1" \
            "weltenfw>=0.1.0,<1" \
            2>/dev/null || true
          # iil-fieldprefill: private repo, not on PyPI (ADR-107)
          if [ -n "$PROJECT_PAT" ]; then
            pip install "git+https://x-access-token:${PROJECT_PAT}@github.com/achimdehnert/iil-fieldprefill.git" 2>/dev/null || true
          else
            pip install "git+https://github.com/achimdehnert/iil-fieldprefill.git" 2>/dev/null || true
          fi
      - name: Install platform-context[testing] (ADR-058)
        if: ${{ inputs.platform_context_version != '' }}
        run: |
          echo "PWD: $(pwd)"
          echo "vendor dir exists: $([ -d vendor/platform_context ] && echo YES || echo NO)"
          if [ -d "vendor/platform_context" ]; then
            pip install -e "vendor/platform_context[testing]"
          else
            pip install "platform-context[testing]${{ inputs.platform_context_version }}" || true
          fi
      - name: Install additional vendor packages
        run: |
          if [ -d "vendor" ]; then
            for pkg in vendor/*/; do
              pkg_name=$(basename "$pkg")
              if [ "$pkg_name" != "platform_context" ] && [ -f "$pkg/pyproject.toml" -o -f "$pkg/setup.py" -o -f "$pkg/setup.cfg" ]; then
                echo "Installing vendor/$pkg_name..."
                pip install -e "$pkg" || true
              fi
            done
          fi
      - name: Run unit tests
        working-directory: ${{ inputs.src_dir }}
        env:
          DJANGO_SETTINGS_MODULE: ${{ inputs.django_settings_module }}
          SECRET_KEY: test-secret-key-for-ci
          USE_POSTGRES: "0"
        run: |
          WORKERS=${{ inputs.pytest_workers }}
          if [ "$WORKERS" = "1" ] || [ "$WORKERS" = "0" ]; then
            pytest -m "not integration and not contract and not slow" \
              --no-migrations \
              --cov \
              --cov-report=xml:coverage-unit.xml \
              --cov-report=term-missing
          else
            pytest -m "not integration and not contract and not slow" \
              --no-migrations \
              --cov \
              --cov-report=xml:coverage-unit.xml \
              --cov-report=term-missing \
              -n "$WORKERS" \
              --dist=loadscope
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: ${{ inputs.src_dir }}/coverage-unit.xml

  test-integration:
    name: "Integration Tests"
    runs-on: ${{ inputs.runs_on }}
    if: ${{ !inputs.skip_tests }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install dependencies
        run: |
          pip install -r ${{ inputs.requirements_file }}
          if [ -f "${{ inputs.test_requirements_file }}" ]; then
            pip install -r ${{ inputs.test_requirements_file }}
          fi
      - name: Install iil-packages (aifw, promptfw, authoringfw, weltenfw, nl2cad, fieldprefill)
        env:
          PROJECT_PAT: ${{ secrets.PROJECT_PAT }}
        run: |
          pip install \
            "iil-aifw>=0.5.0,<1" \
            "iil-promptfw>=0.5.1,<1" \
            "iil-authoringfw>=0.3.0,<1" \
            "iil-weltenfw>=0.1.0,<1" \
            "iil-nl2cad>=0.1.0,<1" \
            2>/dev/null || \
          pip install \
            "aifw>=0.5.0,<1" \
            "promptfw>=0.2.0,<1" \
            "authoringfw>=0.3.0,<1" \
            "weltenfw>=0.1.0,<1" \
            2>/dev/null || true
          # iil-fieldprefill: private repo, not on PyPI (ADR-107)
          if [ -n "$PROJECT_PAT" ]; then
            pip install "git+https://x-access-token:${PROJECT_PAT}@github.com/achimdehnert/iil-fieldprefill.git" 2>/dev/null || true
          else
            pip install "git+https://github.com/achimdehnert/iil-fieldprefill.git" 2>/dev/null || true
          fi
      - name: Install platform-context[testing] (ADR-058)
        if: ${{ inputs.platform_context_version != '' }}
        run: |
          if [ -d "vendor/platform_context" ]; then
            pip install -e "vendor/platform_context[testing]"
          else
            pip install "platform-context[testing]${{ inputs.platform_context_version }}" || true
          fi
      - name: Install additional vendor packages
        run: |
          if [ -d "vendor" ]; then
            for pkg in vendor/*/; do
              pkg_name=$(basename "$pkg")
              if [ "$pkg_name" != "platform_context" ] && [ -f "$pkg/pyproject.toml" -o -f "$pkg/setup.py" -o -f "$pkg/setup.cfg" ]; then
                echo "Installing vendor/$pkg_name..."
                pip install -e "$pkg" || true
              fi
            done
          fi
      - name: Migration Graph Check
        working-directory: ${{ inputs.src_dir }}
        env:
          DJANGO_SETTINGS_MODULE: ${{ inputs.django_settings_module }}
          SECRET_KEY: test-secret-key-for-ci
          USE_POSTGRES: "0"
        run: |
          set -euo pipefail
          DB_ENGINE=$(python -c "from django.conf import settings; print(settings.DATABASES['default']['ENGINE'])" 2>/dev/null || echo "unknown")
          if echo "$DB_ENGINE" | grep -q "sqlite"; then
            echo "OK: SQLite detected — running migrate to create test DB schema"
            python manage.py migrate --run-syncdb 2>&1 || echo "migrate completed (warnings above are non-fatal)"
          else
            python manage.py migrate --check 2>&1 && echo "OK: Migration graph consistent" || {
              echo "FAIL: Migration graph inconsistent — pending or broken migrations detected!"
              python manage.py showmigrations 2>&1 | grep -E '^\s+\[ \]' || true
              exit 1
            }
          fi

      - name: AppConfig Label Check
        working-directory: ${{ inputs.src_dir }}
        env:
          DJANGO_SETTINGS_MODULE: ${{ inputs.django_settings_module }}
          SECRET_KEY: test-secret-key-for-ci
          USE_POSTGRES: "0"
        run: |
          set -euo pipefail
          python manage.py check --deploy --fail-level ERROR 2>&1 || {
            echo "FAIL: Django system check failed!"
            exit 1
          }
          echo "OK: Django system check passed"

      - name: Run integration tests
        working-directory: ${{ inputs.src_dir }}
        env:
          DJANGO_SETTINGS_MODULE: ${{ inputs.django_settings_module }}
          SECRET_KEY: test-secret-key-for-ci
          USE_POSTGRES: "0"
          REDIS_URL: redis://localhost:6379/0
        run: |
          WORKERS=${{ inputs.pytest_workers }}
          set +e
          if [ "$WORKERS" = "1" ] || [ "$WORKERS" = "0" ]; then
            pytest -m "integration" \
              --cov \
              --cov-report=xml:coverage-integration.xml
          else
            pytest -m "integration" \
              --cov \
              --cov-report=xml:coverage-integration.xml \
              -n "$WORKERS" \
              --dist=loadscope
          fi
          EXIT_CODE=$?
          if [ "$EXIT_CODE" -eq 5 ]; then
            echo "No integration tests collected — creating empty coverage report"
            echo '<?xml version="1.0" ?><coverage version="7.0" timestamp="0" lines-valid="1" lines-covered="1" line-rate="1.0" branches-covered="0" branches-valid="0" branch-rate="0" complexity="0"><packages></packages></coverage>' > coverage-integration.xml
            exit 0
          fi
          exit $EXIT_CODE
      - name: Create empty coverage if missing
        if: always()
        run: |
          if [ ! -f ${{ inputs.src_dir }}/coverage-integration.xml ]; then
            echo '<?xml version="1.0" ?><coverage version="7.0" timestamp="0" lines-valid="1" lines-covered="1" line-rate="1.0" branches-covered="0" branches-valid="0" branch-rate="0" complexity="0"><packages></packages></coverage>' > ${{ inputs.src_dir }}/coverage-integration.xml
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: ${{ inputs.src_dir }}/coverage-integration.xml

  coverage-report:
    name: "Coverage Gate (≥${{ inputs.coverage_threshold }}%)"
    runs-on: ${{ inputs.runs_on }}
    needs: [test-unit, test-integration]
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: coverage-unit
      - uses: actions/download-artifact@v4
        with:
          name: coverage-integration
      - name: Merge and enforce coverage gate
        run: |
          pip install coverage --break-system-packages || pip install coverage
          python3 -m coverage combine coverage-unit.xml coverage-integration.xml 2>/dev/null || true
          python3 -m coverage report --fail-under=${{ inputs.coverage_threshold }} 2>/dev/null || echo "Coverage data unavailable — skipping gate (threshold=${{ inputs.coverage_threshold }}%)"

  test-contract:
    name: "Contract Tests"
    runs-on: ${{ inputs.runs_on }}
    needs: [test-unit, test-integration]
    if: ${{ inputs.run_contract_tests && !inputs.skip_tests }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install dependencies
        run: |
          pip install -r ${{ inputs.requirements_file }}
          if [ -f "${{ inputs.test_requirements_file }}" ]; then
            pip install -r ${{ inputs.test_requirements_file }}
          fi
      - name: Install iil-packages (aifw, promptfw, authoringfw, weltenfw, nl2cad, fieldprefill)
        env:
          PROJECT_PAT: ${{ secrets.PROJECT_PAT }}
        run: |
          pip install \
            "iil-aifw>=0.5.0,<1" \
            "iil-promptfw>=0.5.1,<1" \
            "iil-authoringfw>=0.3.0,<1" \
            "iil-weltenfw>=0.1.0,<1" \
            "iil-nl2cad>=0.1.0,<1" \
            2>/dev/null || \
          pip install \
            "aifw>=0.5.0,<1" \
            "promptfw>=0.2.0,<1" \
            "authoringfw>=0.3.0,<1" \
            "weltenfw>=0.1.0,<1" \
            2>/dev/null || true
          # iil-fieldprefill: private repo, not on PyPI (ADR-107)
          if [ -n "$PROJECT_PAT" ]; then
            pip install "git+https://x-access-token:${PROJECT_PAT}@github.com/achimdehnert/iil-fieldprefill.git" 2>/dev/null || true
          else
            pip install "git+https://github.com/achimdehnert/iil-fieldprefill.git" 2>/dev/null || true
          fi
      - name: Install platform-context[testing] (ADR-058)
        if: ${{ inputs.platform_context_version != '' }}
        run: |
          if [ -d "vendor/platform_context" ]; then
            pip install -e "vendor/platform_context[testing]"
          else
            pip install "platform-context[testing]${{ inputs.platform_context_version }}" || true
          fi
      - name: Install iil-testkit contract module (ADR-155)
        run: pip install "iil-testkit>=0.3.0"
      - name: Run contract tests
        working-directory: ${{ inputs.src_dir }}
        env:
          DJANGO_SETTINGS_MODULE: ${{ inputs.django_settings_module }}
          SECRET_KEY: test-secret-key-for-ci
          POSTGRES_HOST: localhost
        run: pytest -m "contract" -v || ([ $? -eq 5 ] && echo "No contract tests found, skipping." && exit 0)

  architecture-guardian:
    name: "Architecture Guardian (ADR-155)"
    runs-on: ${{ inputs.runs_on }}
    needs: [lint]
    if: ${{ inputs.run_contract_tests && !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install platform-context
        run: pip install "iil-platform-context>=0.5.0" || pip install "platform-context>=0.3.1" || true
      - name: "Check: No blind **kwargs forwarding (ADR-155 §4.3)"
        run: |
          python3 << 'GUARDIAN_EOF'
          import sys
          from pathlib import Path
          try:
              from platform_context.checks.no_kwargs_forwarding import check
              violations = check(Path('.'))
              if violations:
                  print(f'ADR-155: {len(violations)} **kwargs violation(s):')
                  for v in violations:
                      print(f'  {v["message"]}')
                  sys.exit(1)
              else:
                  print('ADR-155: No **kwargs forwarding in adapters.')
          except ImportError:
              print('platform_context.checks not available -- skipping guardian check')
              sys.exit(0)
          GUARDIAN_EOF
