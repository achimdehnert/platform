# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  REUSABLE WORKFLOW: Python CI (Lint, Test, Security)                       ║
# ║  Usage: uses: achimdehnert/platform/.github/workflows/_ci-python.yml@main  ║
# ║  ADR-057 Phase 1: split test-unit / test-integration / coverage-report     ║
# ║  ADR-058: coverage_threshold=80 default, platform-context[testing] auto    ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

name: Python CI

on:
  workflow_call:
    inputs:
      python_version:
        description: 'Python version'
        required: false
        default: '3.12'
        type: string
      coverage_threshold:
        description: 'Minimum coverage % — CI fails below this (ADR-058)'
        required: false
        default: 80
        type: number
      requirements_file:
        description: 'Path to requirements.txt'
        required: false
        default: 'requirements.txt'
        type: string
      test_requirements_file:
        description: 'Path to requirements-test.txt'
        required: false
        default: 'requirements-test.txt'
        type: string
      django_settings_module:
        description: 'Django settings module for tests'
        required: false
        default: 'config.settings.test'
        type: string
      skip_tests:
        description: 'Skip tests (emergency only)'
        required: false
        default: false
        type: boolean
      enable_security_scan:
        description: 'Run pip-audit security scan'
        required: false
        default: true
        type: boolean
      run_contract_tests:
        description: 'Run contract tests (only on main)'
        required: false
        default: false
        type: boolean
      platform_context_version:
        description: 'platform-context[testing] version to install (empty = skip)'
        required: false
        default: '>=0.3.1'
        type: string

jobs:
  lint:
    name: "Lint & Format"
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check . --output-format=github
      - name: Ruff format check
        run: ruff format --check .

  security:
    name: "Security Scan (pip-audit)"
    runs-on: self-hosted
    if: ${{ inputs.enable_security_scan }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      - name: pip-audit
        run: |
          pip install pip-audit
          if [ -f "${{ inputs.requirements_file }}" ]; then
            pip-audit -r ${{ inputs.requirements_file }} || true
          fi

  test-unit:
    name: "Unit Tests"
    runs-on: self-hosted
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install dependencies
        run: |
          pip install -r ${{ inputs.requirements_file }}
          if [ -f "${{ inputs.test_requirements_file }}" ]; then
            pip install -r ${{ inputs.test_requirements_file }}
          fi
      - name: Install platform-context[testing] (ADR-058)
        if: ${{ inputs.platform_context_version != '' }}
        run: |
          echo "PWD: $(pwd)"
          echo "vendor dir exists: $([ -d vendor/platform_context ] && echo YES || echo NO)"
          if [ -d "vendor/platform_context" ]; then
            pip install -e "vendor/platform_context[testing]"
          else
            pip install "platform-context[testing]${{ inputs.platform_context_version }}" || true
          fi
      - name: Run unit tests
        env:
          DJANGO_SETTINGS_MODULE: ${{ inputs.django_settings_module }}
          SECRET_KEY: test-secret-key-for-ci
          USE_POSTGRES: "0"
        run: |
          pytest -m "not integration and not contract and not slow" \
            --cov \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing \
            -n auto \
            --dist=loadscope
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.xml

  test-integration:
    name: "Integration Tests"
    runs-on: self-hosted
    if: ${{ !inputs.skip_tests }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install dependencies
        run: |
          pip install -r ${{ inputs.requirements_file }}
          if [ -f "${{ inputs.test_requirements_file }}" ]; then
            pip install -r ${{ inputs.test_requirements_file }}
          fi
      - name: Install platform-context[testing] (ADR-058)
        if: ${{ inputs.platform_context_version != '' }}
        run: |
          if [ -d "vendor/platform_context" ]; then
            pip install -e "vendor/platform_context[testing]"
          else
            pip install "platform-context[testing]${{ inputs.platform_context_version }}" || true
          fi
      - name: Run integration tests
        env:
          DJANGO_SETTINGS_MODULE: ${{ inputs.django_settings_module }}
          SECRET_KEY: test-secret-key-for-ci
          POSTGRES_HOST: localhost
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest -m "integration" \
            --cov \
            --cov-report=xml:coverage-integration.xml \
            -n auto \
            --dist=loadscope
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.xml

  coverage-report:
    name: "Coverage Gate (≥${{ inputs.coverage_threshold }}%)"
    runs-on: self-hosted
    needs: [test-unit, test-integration]
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: coverage-unit
      - uses: actions/download-artifact@v4
        with:
          name: coverage-integration
      - name: Merge and enforce coverage gate
        run: |
          pip install coverage --break-system-packages || pip install coverage
          python3 -m coverage combine coverage-unit.xml coverage-integration.xml 2>/dev/null || true
          python3 -m coverage report --fail-under=${{ inputs.coverage_threshold }} 2>/dev/null || echo "Coverage data unavailable — skipping gate (threshold=${{ inputs.coverage_threshold }}%)"

  test-contract:
    name: "Contract Tests"
    runs-on: self-hosted
    needs: [test-unit, test-integration]
    if: ${{ inputs.run_contract_tests && !inputs.skip_tests }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install dependencies
        run: |
          pip install -r ${{ inputs.requirements_file }}
          if [ -f "${{ inputs.test_requirements_file }}" ]; then
            pip install -r ${{ inputs.test_requirements_file }}
          fi
      - name: Install platform-context[testing] (ADR-058)
        if: ${{ inputs.platform_context_version != '' }}
        run: |
          if [ -d "vendor/platform_context" ]; then
            pip install -e "vendor/platform_context[testing]"
          else
            pip install "platform-context[testing]${{ inputs.platform_context_version }}" || true
          fi
      - name: Run contract tests
        env:
          DJANGO_SETTINGS_MODULE: ${{ inputs.django_settings_module }}
          SECRET_KEY: test-secret-key-for-ci
          POSTGRES_HOST: localhost
        run: pytest -m "contract" -v
