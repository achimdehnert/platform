name: "Deploy Unified Debug"

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      app_path:
        required: true
        type: string
      health_check_url:
        required: false
        type: string
        default: ""
      image_tag_override:
        required: false
        type: string
        default: ""
      target_environment:
        required: false
        type: string
        default: ""
      dockerfile_path:
        required: false
        type: string
        default: "Dockerfile"
      notify_discord:
        required: false
        type: boolean
        default: true
    secrets:
      DEPLOY_SSH_KEY:
        required: false
      DEPLOY_HOST:
        required: false
      DEPLOY_USER:
        required: false
      DEPLOY_SSH_FINGERPRINT:
        required: false
      STAGING_SSH_KEY:
        required: false
      STAGING_HOST:
        required: false
      STAGING_USER:
        required: false
      STAGING_SSH_FINGERPRINT:
        required: false
      DISCORD_WEBHOOK:
        required: false

jobs:
  resolve:
    name: "Resolve"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
      deploy_staging: ${{ steps.env.outputs.deploy_staging }}
      deploy_prod: ${{ steps.env.outputs.deploy_prod }}
    steps:
      - name: Resolve environment
        id: env
        run: |
          echo "environment=staging" >> "$GITHUB_OUTPUT"
          echo "deploy_staging=true" >> "$GITHUB_OUTPUT"
          echo "deploy_prod=false" >> "$GITHUB_OUTPUT"
      - name: Resolve image tag
        id: tag
        run: echo "image_tag=debug-test" >> "$GITHUB_OUTPUT"

  build:
    name: "Build"
    runs-on: ubuntu-latest
    needs: resolve
    if: inputs.image_tag_override == ''
    env:
      IMAGE_NAME: ${{ github.repository_owner }}/${{ inputs.app_name }}
    steps:
      - run: echo "Would build ${{ env.IMAGE_NAME }}:${{ needs.resolve.outputs.image_tag }}"

  deploy-staging:
    name: "Staging"
    runs-on: ubuntu-latest
    needs: [resolve, build]
    if: |
      always() &&
      needs.resolve.outputs.deploy_staging == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    steps:
      - run: echo "Would deploy to staging"

  deploy-production:
    name: "Production"
    runs-on: ubuntu-latest
    needs: [resolve, build]
    if: |
      always() &&
      needs.resolve.outputs.deploy_prod == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    steps:
      - run: echo "Would deploy to production"

  notify:
    name: "Notify"
    runs-on: ubuntu-latest
    needs: [resolve, deploy-staging, deploy-production]
    if: always() && inputs.notify_discord
    steps:
      - run: echo "Done - app=${{ inputs.app_name }} env=${{ needs.resolve.outputs.environment }}"
