# ADR Dual-Tool Review
#
# Tool 1 (deterministic): iil-adrfw validate + audit  — free, always runs
# Tool 2 (adversarial):   Claude API                  — ~$0.01-0.05 per ADR, cost-gated
#
# Controlling output (GitHub Actions Job Summary):
#   - Cost per ADR, tokens in/out, verdict, model
#   - ai_sparring_by patched in ADR frontmatter → audit trail in git
#
# Activation:
#   - Automatic: PR touches docs/adr/ADR-*.md
#   - Manual: workflow_dispatch with adr_file input
#
# Cost gates (in script):
#   - Skip if status=void/deprecated/superseded/rejected
#   - Skip if ai_sparring_by entry < 30 days old
#
# Secrets required:
#   - ANTHROPIC_API_KEY (for Tool 2)
#   - GITHUB_TOKEN     (auto-provided)

name: "🔍 ADR Dual-Tool Review"

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths:
      - "docs/adr/ADR-*.md"

  workflow_dispatch:
    inputs:
      adr_file:
        description: "Single ADR file to review (e.g. docs/adr/ADR-190-foo.md)"
        required: false
        type: string
      dry_run:
        description: "Dry run — no PR comment, no frontmatter patch"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

concurrency:
  group: adr-dual-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

# Workflow-level default (least privilege, #818 permissions sweep); the
# dual-review job below declares its own elevated (write) permissions
# and overrides this for jobs that actually need it.
permissions:
  contents: read

jobs:
  dual-review:
    name: "🤖 Dual-Tool Review"
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push ai_sparring_by patch
      pull-requests: write   # post PR comment

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euo pipefail
          pip install --quiet \
            "iil-adrfw>=0.5.0" \
            "anthropic>=0.28" \
            "pyyaml>=6.0"

      - name: Detect changed ADR files
        id: changed
        env:
          INPUT_FILE: ${{ inputs.adr_file }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_FILE:-}" ]]; then
            echo "files=${INPUT_FILE}" >> "$GITHUB_OUTPUT"
          else
            # Get changed files from PR diff
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            FILES=$(git diff --name-only "$BASE" "$HEAD" -- 'docs/adr/ADR-*.md' | tr '\n' ' ')
            echo "files=${FILES}" >> "$GITHUB_OUTPUT"
            echo "[INFO] Changed ADR files: ${FILES:-none}"
          fi

      - name: Run Dual-Tool Review
        if: steps.changed.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DRY_RUN="${{ inputs.dry_run || 'false' }}"
          DRY_FLAG=""
          [[ "$DRY_RUN" == "true" ]] && DRY_FLAG="--dry-run"

          python .github/scripts/adr_dual_review.py \
            --files ${{ steps.changed.outputs.files }} \
            --pr-number "${{ github.event.pull_request.number || 0 }}" \
            --repo "${{ github.repository }}" \
            $DRY_FLAG

      - name: Commit ai_sparring_by patches
        if: |
          steps.changed.outputs.files != '' &&
          (inputs.dry_run != 'true') &&
          github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git config user.name  "ADR Review Bot"
          git config user.email "adr-bot@iil.gmbh"

          if git diff --quiet docs/adr/; then
            echo "[INFO] No frontmatter changes to commit"
          else
            git add docs/adr/
            git commit \
              -m "chore(adr): patch ai_sparring_by [dual-tool-review]" \
              -m "Auto-generated by ADR Dual-Tool Review workflow." \
              -m "See Job Summary for cost and token details." \
              -m "[skip ci]"
            git push
            echo "[OK] ai_sparring_by patched and pushed"
          fi

      - name: No ADR files changed
        if: steps.changed.outputs.files == ''
        run: echo "[INFO] No ADR files changed — review skipped"
