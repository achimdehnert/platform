name: ADR Schema Validation

on:
  push:
    paths:
      - "docs/adr/ADR-*.md"
  pull_request:
    paths:
      - "docs/adr/ADR-*.md"
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install iil-adrfw
        run: pip install "iil-adrfw>=0.2.1"

      - name: Validate all ADRs
        run: iil-adrfw validate docs/adr/
