name: ADR Schema Validation

on:
  push:
    paths:
      - "docs/adr/**"
      - "tools/adr_citation_lint.py"
      - "tools/adr_index_check.py"
  pull_request:
    paths:
      - "docs/adr/**"
      - "tools/adr_citation_lint.py"
      - "tools/adr_index_check.py"
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install iil-adrfw
        run: pip install "iil-adrfw>=0.2.1"

      - name: Validate all ADRs
        run: iil-adrfw validate docs/adr/

      # ADR reference-drift report — SUGGEST / non-gating (repo-health-rule-discipline:
      # new rules start as SUGGEST; structural deterministic only). Surfaces depends_on /
      # references pointing at archived or missing ADR ids (renumbering-collision dead-refs).
      # Does NOT fail the build yet; promote to gating once the existing dead-refs are cleaned.
      - name: ADR reference-drift (SUGGEST, non-gating)
        run: |
          set +e
          iil-adrfw staleness docs/adr/ 2>&1 | tee staleness.txt
          drift=$(grep -c "does not exist" staleness.txt)
          if [ "$drift" -gt 0 ]; then
            echo "::warning title=ADR reference drift::$drift dangling ADR reference(s) (depends_on → archived/missing). Non-gating SUGGEST — see log. Promote to gating after cleanup."
          else
            echo "✓ No ADR reference drift."
          fi
          exit 0

      # ADR-211 C5/I4 — Cross-Repo-Ref-Format-Gate (gating).
      # Qualifizierte Refs müssen ^[a-z][a-z0-9-]+:ADR-[0-9]{3}$ matchen.
      - name: ADR cross-repo ref format (ADR-211 C5/I4, gating)
        run: bash scripts/checks/adr_cross_repo_refs.sh docs/adr/

      # ADR citation lint + INDEX consistency — SUGGEST / non-gating
      # (repo-health-rule-discipline: neue Regeln starten als SUGGEST, deterministisch-
      # strukturell, kein LLM). Ergaenzt den staleness-Step (nur depends_on-Frontmatter)
      # um Body-Zitate (dead_ref/stale_filename/external_target) und INDEX.md-Drift
      # (missing_row/ghost_row/status_drift/broken_link/stale_next_free).
      # Promotion-Pfad zu gating: erst die Alt-Funde bereinigen bzw. via
      # docs/adr/.adr-lint-ignore parken, dann hier `--gate` setzen und das
      # `exit 0` entfernen. Skripte selbst exiten im SUGGEST-Modus IMMER 0.
      - name: ADR citation lint + INDEX consistency (SUGGEST, non-gating)
        run: |
          set +e
          python3 tools/adr_citation_lint.py --format github
          python3 tools/adr_index_check.py --format github
          exit 0
