name: cad-services CI

on:
  pull_request:
    paths:
      - "packages/cad-services/**"
  push:
    branches: [main]
    paths:
      - "packages/cad-services/**"

# Workflow-level default (least privilege, #818 permissions sweep) —
# no job in this workflow needs to write via GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install package (editable) + dev deps
        working-directory: packages/cad-services
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        working-directory: packages/cad-services
        run: |
          python -m ruff check .

      - name: Pytest
        working-directory: packages/cad-services
        run: |
          python -m pytest -q
