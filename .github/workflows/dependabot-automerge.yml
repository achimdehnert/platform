name: Dependabot auto-merge

# Aktiviert Auto-Merge für Dependabot-**patch/minor**-Bumps, sobald die Required
# Checks (guardian, gitleaks) grün sind. Der Code-Owner-Review bleibt bestehen
# (KEIN Ruleset-Bypass) — dieser Workflow nimmt nur den manuellen Merge-Klick
# und das CI-Timing ab (Behind-Stalls). **major**-Bumps werden bewusst NICHT
# angefasst → manuelle Prüfung.
#
# Sicherheit: `pull_request_target` gibt Dependabot-PRs einen Schreib-Token
# (auf `pull_request` ist er read-only). Es wird **kein PR-Code ausgecheckt**
# oder ausgeführt — nur Metadaten gelesen + Auto-Merge gesetzt. Damit kein
# untrusted-code-execution-Risiko.

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    steps:
      - name: Dependabot-Metadaten holen
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-Merge für patch/minor aktivieren
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
