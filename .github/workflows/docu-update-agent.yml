# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  Docu-Update Agent — Stufe 1+2                                            ║
# ║  Trigger: Issue mit Label "docu-update" oder manuell via workflow_dispatch ║
# ║  Stufe 1: deterministisch (README version + CHANGELOG aus git log)        ║
# ║  Stufe 2: --llm (aifw → gpt-4o-mini für CHANGELOG-Zusammenfassungen)     ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

name: Docu-Update Agent

on:
  issues:
    types: [labeled]

  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue-Nummer manuell starten (z.B. 46)'
        required: true
        type: number
      dry_run:
        description: 'Dry-run (kein Push, kein Issue-Close)'
        required: false
        type: boolean
        default: false
      use_llm:
        description: 'Stufe 2: LLM-enhanced (gpt-4o-mini)'
        required: false
        type: boolean
        default: true

permissions:
  issues: write
  contents: read

jobs:
  docu-update:
    name: "Docu-Update: Issue #${{ github.event.issue.number || inputs.issue_number }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Nur bei docu-update Label (oder manuellem Trigger)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'docu-update')

    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx aifw

      - name: Run Docu-Update Agent
        env:
          PROJECT_PAT: ${{ secrets.PLATFORM_DEPLOY_TOKEN || secrets.PROJECT_PAT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}  # aifw reads this
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number || inputs.issue_number }}"
          DRY_RUN="${{ inputs.dry_run == true && '--dry-run' || '' }}"

          # Stufe 2 default bei workflow_dispatch, Stufe 1 bei auto-trigger
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LLM_FLAG="${{ inputs.use_llm == true && '--llm' || '' }}"
          else
            LLM_FLAG="--llm"
          fi

          python .github/scripts/docu_update_agent.py \
            --issue-number "$ISSUE_NUM" \
            $DRY_RUN $LLM_FLAG
