name: Drift Detection

on:
  schedule:
    - cron: '0 8 * * 1'  # Montags 08:00 UTC
  workflow_dispatch:  # Manuell auslösbar

jobs:
  drift:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml httpx

      - name: Run Drift Detector
        id: drift
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m agents.drift_detector \
            --docs-dir docs/source \
            --threshold 90 \
            --check-keys \
            --format json > /tmp/drift.json || true
          python -m agents.drift_detector \
            --docs-dir docs/source \
            --threshold 90 \
            --check-keys \
            --format markdown > /tmp/drift.md || true
          echo "has_issues=$(jq -r '.has_issues' /tmp/drift.json)" >> $GITHUB_OUTPUT

      - name: Create/Update GitHub Issue
        if: steps.drift.outputs.has_issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/drift.md', 'utf8');
            const data = JSON.parse(fs.readFileSync('/tmp/drift.json', 'utf8'));

            const title = `[Drift] ${data.stale_count} stale, ${data.incomplete_count} incomplete, ${data.keys_invalid} keys invalid`;

            // Find existing drift issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'drift-detection',
              state: 'open',
            });

            const issueBody = body + '\n\n---\n*Drift Detector v0.1.0 \u2014 Auto-generated*';

            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                title: title,
                body: issueBody,
              });
              console.log(`Updated issue #${issues[0].number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: issueBody,
                labels: ['drift-detection', 'automated'],
              });
              console.log('Created new drift issue');
            }
