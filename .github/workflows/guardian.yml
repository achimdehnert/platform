name: Architecture Guardian

on:
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:

# Workflow-level default (least privilege, #818 permissions sweep); the
# guardian job below already declares its own permissions
# (pull-requests: write for the PR comment) and overrides this.
permissions:
  contents: read

jobs:
  guardian:
    runs-on: ubuntu-latest
    # Dependabot/Renovate PRs: nur Dependency-Bumps, keine App-Logik
    if: >
      github.actor != 'dependabot[bot]' &&
      github.actor != 'renovate[bot]' &&
      !startsWith(github.head_ref, 'dependabot/') &&
      !startsWith(github.head_ref, 'renovate/')
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Get PR diff
        run: |
          # github.base_ref is only populated for pull_request events; merge_group
          # carries the base ref as a full refs/heads/... path instead (ADR-270
          # merge-queue precondition: this workflow must also run on merge_group).
          BASE_REF="${{ github.base_ref }}"
          if [ -z "$BASE_REF" ]; then
            BASE_REF="${{ github.event.merge_group.base_ref }}"
            BASE_REF="${BASE_REF#refs/heads/}"
          fi
          git diff "origin/${BASE_REF}...HEAD" > /tmp/pr.diff

      - name: Run Architecture Guardian
        id: guardian
        run: |
          python -m agents.guardian --diff /tmp/pr.diff --format json > /tmp/result.json || true
          python -m agents.guardian --diff /tmp/pr.diff --format markdown > /tmp/comment.md || true
          # Note: nachgelagerte Steps lesen /tmp/result.json + /tmp/comment.md direkt.
          # Multi-line JSON in $GITHUB_OUTPUT zu schreiben würde "Invalid format"
          # produzieren — daher kein output-set hier.

      - name: Post PR Comment
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('/tmp/comment.md', 'utf8');
            const result = JSON.parse(fs.readFileSync('/tmp/result.json', 'utf8'));

            // Find existing guardian comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Architecture Guardian')
            );

            const body = comment + '\n\n---\n*Architecture Guardian v0.1.0*';

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

            // Fail if blocking violations
            if (result.blocking) {
              core.setFailed('Architecture Guardian: Blocking violations found (Gate 2+)');
            }
