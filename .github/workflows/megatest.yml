name: Megatest — Hardcoding Guard

on:
  schedule:
    - cron: '0 6 * * 1-5'  # Mo–Fr 06:00 UTC (täglich an Werktagen)
  push:
    paths:
      - 'tests/megatest/**'
      - 'scripts/check_hardcoded_urls.py'
  workflow_dispatch:
    inputs:
      update_budgets:
        description: 'Budgets auf aktuellen Stand setzen (kein Fail)'
        type: boolean
        default: false

jobs:
  megatest:
    name: Platform Hardcoding Megatest
    runs-on: self-hosted
    permissions:
      contents: write     # für --update-budgets commit
      issues: write       # für Failure-Report als Issue

    steps:
      - name: Checkout platform
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pytest + pyyaml
        run: pip install pytest pyyaml --quiet

      - name: Checkout alle Repos unter ~/github
        run: |
          set -euo pipefail
          REPOS=$(python3 scripts/list_megatest_repos.py)
          mkdir -p ~/github
          for repo in $REPOS; do
            if [ ! -d "$HOME/github/$repo" ]; then
              git clone --depth=1 \
                "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/achimdehnert/$repo.git" \
                "$HOME/github/$repo" 2>/dev/null || echo "WARN: $repo not found"
            fi
          done

      - name: Run Megatest (normal)
        if: ${{ !inputs.update_budgets }}
        id: megatest_run
        env:
          GITHUB_DIR: /root/github
        run: |
          cd ~/github/platform
          python -m pytest tests/megatest/ \
            -v \
            --tb=short \
            --junitxml=megatest-results.xml \
            2>&1 | tee megatest-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Run Megatest (Budget-Update)
        if: ${{ inputs.update_budgets }}
        env:
          GITHUB_DIR: /root/github
        run: |
          cd ~/github/platform
          python -m pytest tests/megatest/ \
            --update-budgets \
            -v -q \
            2>&1 | tee megatest-output.txt

      - name: Upload JUnit Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: megatest-results
          path: ~/github/platform/megatest-results.xml

      - name: Failure-Summary als GitHub Issue
        if: steps.megatest_run.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const outputPath = `${process.env.HOME}/github/platform/megatest-output.txt`;
            const output = fs.existsSync(outputPath)
              ? fs.readFileSync(outputPath, 'utf8')
              : 'Output nicht gefunden (Pfad: ' + outputPath + ')';

            // Capture FAILED lines + last summary line + any ERROR lines
            const summaryLines = output
              .split('\n')
              .filter(l =>
                l.includes('FAILED') ||
                l.includes('ERROR') ||
                l.match(/^(ERRORS|FAILURES|=+\s+(\d+\s+)?failed)/) ||
                l.match(/^\s*(assert|E\s+)/) ||
                l.includes('short test summary')
              );
            const summary = summaryLines.length > 0
              ? summaryLines.join('\n').slice(0, 3000)
              : output.slice(-2000);  // fallback: last 2000 chars

            const today = new Date().toISOString().split('T')[0];
            const issueTitle = `🔴 Megatest Regression — ${today}`;

            // Deduplication: check for open issue with same title today
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'megatest',
              per_page: 10,
            });
            const alreadyOpen = existing.data.some(i => i.title === issueTitle);
            if (alreadyOpen) {
              console.log(`Issue "${issueTitle}" already open — skipping duplicate.`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: [
                '## Megatest hat Regressions gefunden',
                '',
                '**Neue Violations überschreiten das Budget in `tests/megatest/budgets.toml`.**',
                '',
                '```',
                summary,
                '```',
                '',
                '**Aktion:** Violation fixen oder Budget-Update beantragen.',
                '',
                `Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
              labels: ['megatest', 'hardcoding', 'regression'],
            });
