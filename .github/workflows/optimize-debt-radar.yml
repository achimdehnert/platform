name: optimize-debt-radar

# KONZ-platform-019 MVC Schritt 3 (PR #1177 = Schritt 1-2, dieser Workflow = Schritt 3).
# Woechentlicher Fleet-Radar: zaehlt Debt-Signale (tools/optimize_debt_radar.py) ueber
# alle nicht-archivierten achimdehnert-Repos, meldet Delta-ggue-Vorwoche als rollierendes
# Issue. Cross-Repo-Read via bestehendes Secret (kein neues Secret angelegt) — Scope laut
# KONZ-019 L6 nur achimdehnert; iilgmbh/meiki-lra bleiben "nicht pruefbar (Owner-Scope)".
#
# Named-Approval (Session 2026-07-16): contents:write + issues:write + Cross-Repo-Read via
# secrets.PLATFORM_GITHUB_TOKEN (Fallback PROJECT_PAT/GITHUB_TOKEN) explizit vom User
# bestaetigt (Gate 3 Security-/Governance-Config, autonomy-gates.md).
#
# Sicherheits-Hinweis (Gate `autonomous-no-human-review`): der Cross-Repo-Read-Token ist
# VOR dem ersten Vertrauen in den Zeitplan per manuellem `workflow_dispatch`-Lauf auf main
# zu verifizieren (workflow_dispatch kann laut GitHub nicht vor einem Merge auf einem
# Feature-Branch getestet werden — echter Beweis ist erst nach diesem Merge moeglich).
#
# Flaggt NUR — fixt nichts (KONZ-019 L5, kein Coding-Agent). Dupliziert NICHT
# fleet-drift-report (Drift/Registry/Deploy) oder deploy-health-triage (rote Deploys),
# KONZ-019 L4.

on:
  schedule:
    - cron: "15 7 * * 1,4" # Mo+Do 07:15 UTC — 2x/Woche (Entscheidung 2026-07-16: höhere Entwicklungsgeschwindigkeit)
  workflow_dispatch:

# contents auf read verengt (2026-07-22, #1338): der Workflow committet nichts mehr,
# die Baseline liegt als Artefakt. Die frueher hier per Named-Approval erteilte
# contents:write-Berechtigung wird damit nicht mehr gebraucht — Rechte-Reduktion,
# keine Erweiterung. Der Input commit_baseline entfaellt aus demselben Grund.
permissions:
  contents: read
  issues: write
  actions: read # gh run download aus dem vorherigen Lauf

concurrency:
  group: optimize-debt-radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout platform
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet pyyaml

      - name: Fleet-Targets auflösen (Owner-Scope achimdehnert, KONZ-019 L6)
        run: |
          python3 -c "
          import sys; sys.path.insert(0, 'tools')
          from optimize_debt_radar import resolve_fleet_targets
          from pathlib import Path
          for name, full in resolve_fleet_targets(Path('registry/canonical.yaml'), owner_filter='achimdehnert'):
              print(f'{name}\t{full}')
          " > /tmp/targets.txt
          echo "Ziele: $(wc -l < /tmp/targets.txt)"
          cat /tmp/targets.txt

      - name: Fleet shallow-clonen
        id: clone
        env:
          TOKEN: ${{ secrets.PLATFORM_GITHUB_TOKEN || secrets.PROJECT_PAT || secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "$RUNNER_TEMP/fleet"
          fail=0
          while IFS=$'\t' read -r name fullname; do
            [ -z "$name" ] && continue
            if git clone --quiet --depth 1 "https://x-access-token:${TOKEN}@github.com/${fullname}.git" "$RUNNER_TEMP/fleet/$name" 2>/tmp/clone_err.log; then
              echo "OK: $fullname"
            else
              echo "FAIL: $fullname"
              cat /tmp/clone_err.log
              fail=$((fail + 1))
            fi
          done < /tmp/targets.txt
          echo "clone_failures=$fail" >> "$GITHUB_OUTPUT"

      # Baseline aus dem letzten erfolgreichen Lauf holen — als Artefakt, nicht als
      # Commit (#1338 Weg 3: ein Push auf main wird vom Ruleset abgelehnt, GH013).
      # Fehlt das Artefakt (erster Lauf nach dieser Umstellung, abgelaufene Retention),
      # laeuft der Radar ohne Baseline und meldet Absolutwerte statt Delta — und sagt
      # das im Log, statt es zu verschweigen.
      - name: Baseline des letzten erfolgreichen Laufs holen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          mkdir -p /tmp/baseline
          PREV=$(gh run list --workflow optimize-debt-radar --status success \
                   --limit 1 --json databaseId --jq '.[0].databaseId // empty')
          if [ -z "$PREV" ]; then
            echo "Kein vorheriger erfolgreicher Lauf — Radar laeuft ohne Baseline."
            exit 0
          fi
          gh run download "$PREV" --name optimize-debt-radar-baseline --dir /tmp/baseline \
            || echo "Artefakt aus Lauf $PREV nicht verfuegbar — Radar laeuft ohne Baseline."

      - name: Radar laufen lassen
        run: |
          NAMES=$(cut -f1 /tmp/targets.txt | paste -sd, -)
          BASELINE_ARG=""
          if [ -f /tmp/baseline/radar_result.json ]; then
            BASELINE_ARG="--baseline /tmp/baseline/radar_result.json"
            echo "Baseline: aus dem vorherigen Lauf (Artefakt)."
          else
            echo "Baseline: keine — Delta bleibt leer, Werte sind absolut."
          fi
          python3 tools/optimize_debt_radar.py \
            --github-dir "$RUNNER_TEMP/fleet" \
            --repos "$NAMES" \
            $BASELINE_ARG \
            --out /tmp/radar_result.json \
            --format text | tee /tmp/radar_text.txt

      - name: Rollierendes Issue aktualisieren
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WEEK=$(date -u +%G-W%V)
          MARKER="<!-- optimize-radar:${WEEK} -->"
          { echo "$MARKER"; echo; cat /tmp/radar_text.txt; } > /tmp/issue_body.txt
          if [ "${{ steps.clone.outputs.clone_failures }}" -gt 0 ]; then
            echo "" >> /tmp/issue_body.txt
            echo "⚠ ${{ steps.clone.outputs.clone_failures }} Repo(s) konnten nicht geklont werden — Log im Workflow-Run." >> /tmp/issue_body.txt
          fi
          ISSUE=$(gh issue list --label optimize-radar --state open --json number -q '.[0].number // empty')
          if [ -z "$ISSUE" ]; then
            gh issue create --title "optimize-debt-radar — laufende Kandidaten" \
              --label optimize-radar --body-file /tmp/issue_body.txt
          else
            gh issue comment "$ISSUE" --body-file /tmp/issue_body.txt
          fi

      # Neue Baseline als Artefakt ablegen statt zu committen (#1338 Weg 3). Der
      # Folge-Lauf zieht sie oben wieder heraus. Retention 90 Tage deckt die Kadenz
      # (2x/Woche) mit grossem Abstand ab.
      - name: Neue Baseline als Artefakt ablegen
        uses: actions/upload-artifact@v7
        with:
          name: optimize-debt-radar-baseline
          path: /tmp/radar_result.json
          retention-days: 90
          overwrite: true

      - name: Ergebnis in die Job-Summary schreiben
        run: |
          {
            echo "## optimize-debt-radar — $(date -u +%F)"
            echo
            echo '```'
            cat /tmp/radar_text.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
