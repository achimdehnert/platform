name: Publish iil-codeguard to PyPI

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, no upload)"
        required: false
        default: false
        type: boolean

# Workflow-level default (least privilege, #818 permissions sweep) —
# no job in this workflow needs to write via GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  publish:
    name: Build and publish iil-codeguard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout iil-codeguard
        uses: actions/checkout@v6
        with:
          repository: achimdehnert/iil-codeguard
          token: ${{ secrets.PROJECT_PAT }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling twine

      - name: Build
        run: |
          rm -rf dist
          python -m hatchling build
          echo "Built packages:"
          ls -la dist/

      - name: Check
        run: twine check dist/*

      # ADR-226 binding gate: scan the EXACT bytes about to be uploaded.
      # CI on the package repo is advisory; this is the only place the
      # irreversible event (twine upload) is actually blocked.
      - name: Pre-publish secret gate (built artifact)
        uses: achimdehnert/platform/.github/actions/gitleaks-scan@main
        with:
          mode: sdist
          source: dist
          report_escape_hatch: "false"
          context_label: "pre-publish: iil-codeguard"
          triage_hint: "A secret is in the artifact about to be published to PyPI (irreversible). ROTATE it and exclude it from the build (MANIFEST.in / package_data / [tool.setuptools] exclude). NOT suppressible — the artifact must not ship it."

      - name: Upload to PyPI
        if: ${{ !inputs.dry_run }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
