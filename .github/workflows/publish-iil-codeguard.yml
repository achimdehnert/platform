name: Publish iil-codeguard to PyPI

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, no upload)"
        required: false
        default: false
        type: boolean

# Workflow-level default (least privilege, #818 permissions sweep) —
# no job in this workflow needs to write via GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  publish:
    name: Build and publish iil-codeguard
    runs-on: ubuntu-latest
    # id-token:write macht den Job OIDC-faehig (ADR-266 Trusted-Publisher-
    # Vorbereitung). Greift erst, wenn PyPI-seitig ein Trusted Publisher fuer
    # owner=achimdehnert repo=platform workflow=publish-iil-codeguard.yml
    # gebunden ist -- der Publish-Job laeuft HIER im platform-Repo (Checkout
    # via PROJECT_PAT gegen iil-codeguard), nicht im Paket-Repo selbst; die
    # Bindung muss also auf platform zeigen, nicht auf iil-codeguard. Bis zur
    # Bindung bleibt TWINE_PASSWORD/PYPI_API_TOKEN aktiv (Binding-Beweis
    # zuerst, kein Token vorher entfernen).
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout iil-codeguard
        uses: actions/checkout@v6
        with:
          repository: achimdehnert/iil-codeguard
          token: ${{ secrets.PROJECT_PAT }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling twine

      - name: Build
        run: |
          rm -rf dist
          python -m hatchling build
          echo "Built packages:"
          ls -la dist/

      - name: Check
        run: twine check dist/*

      # ADR-226 binding gate: scan the EXACT bytes about to be uploaded.
      # CI on the package repo is advisory; this is the only place the
      # irreversible event (twine upload) is actually blocked.
      - name: Pre-publish secret gate (built artifact)
        uses: achimdehnert/platform/.github/actions/gitleaks-scan@main
        with:
          mode: sdist
          source: dist
          report_escape_hatch: "false"
          context_label: "pre-publish: iil-codeguard"
          triage_hint: "A secret is in the artifact about to be published to PyPI (irreversible). ROTATE it and exclude it from the build (MANIFEST.in / package_data / [tool.setuptools] exclude). NOT suppressible — the artifact must not ship it."

      - name: Upload to PyPI
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
