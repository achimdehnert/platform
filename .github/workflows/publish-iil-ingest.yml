name: Publish iil-ingest to PyPI

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, no upload)'
        required: false
        default: false
        type: boolean

# Workflow-level default (least privilege, #818 permissions sweep) —
# no job in this workflow needs to write via GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  publish:
    name: Build and publish iil-ingest
    runs-on: ubuntu-latest
    # ADR-278: OIDC Trusted Publishing. id-token:write für den OIDC-Austausch;
    # environment pypi passend zur PyPI-Trusted-Publisher-Bindung
    # (repo=achimdehnert/platform, workflow=publish-iil-ingest.yml, env=pypi).
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/iil-ingest/
    steps:
      - name: Checkout iil-ingest
        uses: actions/checkout@v7
        with:
          repository: achimdehnert/iil-ingest
          token: ${{ secrets.PROJECT_PAT }}

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install hatchling twine

      - name: Build
        run: |
          rm -rf dist
          python -m hatchling build
          echo "Built packages:"
          ls -la dist/

      - name: Check
        run: twine check dist/*

      # ADR-226 binding gate: scan the EXACT bytes about to be uploaded.
      # CI on the package repo is advisory; this is the only place the
      # irreversible event (twine upload) is actually blocked.
      - name: Pre-publish secret gate (built artifact)
        uses: achimdehnert/platform/.github/actions/gitleaks-scan@main
        with:
          mode: sdist
          source: dist
          report_escape_hatch: "false"
          context_label: "pre-publish: iil-ingest"
          triage_hint: "A secret is in the artifact about to be published to PyPI (irreversible). ROTATE it and exclude it from the build (MANIFEST.in / package_data / [tool.setuptools] exclude). NOT suppressible — the artifact must not ship it."

      - name: Publish to PyPI (OIDC Trusted Publishing)
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
