# GitHub Packages does not provide a PyPI-compatible registry for Python wheels.
# Platform packages are distributed via git+https using PROJECT_PAT.
# See: https://docs.github.com/en/packages/learn-github-packages/introduction-to-github-packages
#
# This file is intentionally minimal — kept as placeholder for future PyPI publishing
# if a self-hosted registry (e.g. Cloudsmith, Gemfury, or Gitea) is introduced.
name: Package Info

on:
  workflow_dispatch:

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Platform packages are distributed via git+https with PROJECT_PAT"
