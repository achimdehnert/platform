name: Publish platform-context

on:
  push:
    paths:
      - 'packages/platform-context/**'
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Publish even if version unchanged'
        required: false
        default: false
        type: boolean

jobs:
  test:
    name: Test platform-context
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/platform-context
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/platform-context/pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  publish:
    name: Publish to GitHub Packages
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    defaults:
      run:
        working-directory: packages/platform-context
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling build twine

      - name: Extract version
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📦 platform-context version: ${VERSION}"

      - name: Check if version already published
        id: check
        run: |
          # Always build — twine upload --skip-existing handles duplicates
          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Build wheel + sdist
        run: python -m build

      - name: Publish to GitHub Packages (PyPI-compatible)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          TWINE_REPOSITORY_URL: https://upload.pkg.github.com/achimdehnert/
        run: |
          twine upload dist/* --skip-existing
          echo "✅ platform-context ${{ steps.version.outputs.version }} published"

      - name: Summary
        run: |
          echo "## platform-context Published" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Install | \`pip install platform-context==${{ steps.version.outputs.version }} --extra-index-url https://\$GITHUB_TOKEN@python.pkg.github.com/achimdehnert/\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
