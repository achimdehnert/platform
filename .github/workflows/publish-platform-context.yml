name: Publish platform-context

on:
  push:
    paths:
      - 'packages/platform-context/**'
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Publish even if version unchanged'
        required: false
        default: false
        type: boolean

jobs:
  test:
    name: Test platform-context
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/platform-context
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/platform-context/pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  publish:
    name: Build & Release
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: packages/platform-context
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling build

      - name: Extract version
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📦 platform-context version: ${VERSION}"

      - name: Build wheel + sdist
        run: python -m build

      # ADR-210 binding gate: dist/* is attached to a PUBLIC GitHub Release
      # (and pip-installable via git+https) — same irreversible-exposure
      # class as PyPI. Scan the exact artifact before it is released.
      # NOTE: a `uses:` step ignores defaults.working-directory, so the
      # path is workspace-relative.
      - name: Pre-publish secret gate (built artifact)
        uses: achimdehnert/platform/.github/actions/gitleaks-scan@main
        with:
          mode: sdist
          source: packages/platform-context/dist
          report_escape_hatch: "false"
          context_label: "pre-release: platform-context"
          triage_hint: "A secret is in the artifact about to be attached to a public GitHub Release (irreversible). ROTATE it and exclude it from the build. NOT suppressible — the artifact must not ship it."

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="platform-context-v${{ steps.version.outputs.version }}"
          # Delete existing release if re-running
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --title "platform-context v${{ steps.version.outputs.version }}" \
            --notes "Install: \`pip install iil-platform-context @ git+https://github.com/achimdehnert/platform.git#subdirectory=packages/platform-context\`" \
            --target "${{ github.sha }}" \
            dist/*

      - name: Summary
        run: |
          echo "## platform-context Released" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Install | \`pip install iil-platform-context @ git+https://github.com/achimdehnert/platform.git#subdirectory=packages/platform-context\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
