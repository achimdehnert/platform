# Registry↔Live-Abgleich (KONZ-platform-015 Nachtrag 2026-07-10 — Hauptmaßnahme).
#
# Läuft auf dem Prod-Host (self-hosted Runner) und vergleicht die deklarierte
# Topologie (canonical.yaml + ports.yaml) mit dem realen Zustand (Container,
# Ports, DNS). Drift-Kennzahl = Kill-Gate-KPI des Konzepts.
#
# ⚠️ run-conclusion ≠ Tool-Health (CC-Memory): Ein ROTER Lauf ist ein FUND
# (neue, untriagierte Drift), KEIN Workflow-Defekt. Triage: beheben oder mit
# owner+expires_at in infra/reconcile-baseline.yaml stunden.
name: Registry-Live-Reconcile (KONZ-015)

on:
  schedule:
    - cron: '17 5 * * *'        # täglich 05:17 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'tools/reconcile_registry_live.py'
      - 'infra/reconcile-baseline.yaml'
      - 'infra/ports.yaml'
      - 'registry/canonical.yaml'

permissions:
  contents: read

jobs:
  reconcile:
    name: "Drift-Kennzahl messen (rot = Fund, nicht Fehler)"
    runs-on: [self-hosted, prod]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Abgleich Registry ↔ Live (lokal auf Prod-Host)
        run: |
          python3 -m pip install --quiet --user pyyaml 2>/dev/null || true
          python3 tools/reconcile_registry_live.py
