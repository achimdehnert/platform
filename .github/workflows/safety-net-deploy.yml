# safety-net-deploy.yml
# ADR-042: Runs every 2 hours. For each app, checks if there are
# undeployed commits on main. If yes, triggers deploy.

name: "\U0001f6e1\ufe0f Safety-Net Deploy Check"

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:        # Manual trigger for testing

jobs:
  check-and-deploy:
    # TODO(ADR-042): Switch to [self-hosted, hetzner, dev] when runner is ready
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          # workflow: actual filename of the deploy workflow in each repo
          - { name: bfagent,     repo: achimdehnert/bfagent,      workflow: ci.yml }
          - { name: travel-beat, repo: achimdehnert/travel-beat,   workflow: deploy.yml }
          - { name: risk-hub,    repo: achimdehnert/risk-hub,      workflow: docker-build.yml }
          - { name: weltenhub,   repo: achimdehnert/weltenhub,     workflow: ci.yml }
          - { name: pptx-hub,    repo: achimdehnert/pptx-hub,      workflow: cd-production.yml }
          - { name: trading-hub, repo: achimdehnert/trading-hub,   workflow: ci-cd.yml }
      max-parallel: 1  # Sequential deploys to avoid PROD overload

    steps:
      - name: Check for undeployed commits
        id: check
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail

          REPO="${{ matrix.app.repo }}"

          # Get SHA of last successful deploy (filter by specific workflow!)
          WORKFLOW="${{ matrix.app.workflow }}"
          LAST_DEPLOY_SHA=$(gh api \
            "repos/${REPO}/actions/workflows/${WORKFLOW}/runs?status=success&per_page=1&branch=main" \
            --jq '.workflow_runs[0].head_sha // empty' 2>/dev/null || echo "")

          # Get current HEAD of main
          MAIN_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" \
            --jq '.object.sha' 2>/dev/null || echo "")

          if [ -z "$MAIN_SHA" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  ${{ matrix.app.name }}: could not determine main SHA"
            exit 0
          fi

          if [ "$LAST_DEPLOY_SHA" = "$MAIN_SHA" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "✅ ${{ matrix.app.name }}: up to date ($MAIN_SHA)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "🔔 ${{ matrix.app.name }}: undeployed commits detected"
            echo "   Last deploy: ${LAST_DEPLOY_SHA:-none}"
            echo "   Current main: $MAIN_SHA"
          fi

      - name: Trigger deploy
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          echo "🚀 Triggering deploy for ${{ matrix.app.name }}..."
          gh workflow run "${{ matrix.app.workflow }}" \
            --repo "${{ matrix.app.repo }}" \
            --ref main \
            -f environment=production
