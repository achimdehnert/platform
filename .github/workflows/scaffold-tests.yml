name: Auto-Scaffold Tests für neue Repos

on:
  push:
    branches: [main]
    paths:
      - 'scripts/repo-registry.yaml'
      - 'tests/megatest/budgets.toml'
  workflow_dispatch:
    inputs:
      repo_name:
        description: 'Repo-Name (leer = alle ohne tests/conftest.py prüfen)'
        required: false
        default: ''
      dry_run:
        description: 'Nur prüfen, keinen PR erstellen'
        type: boolean
        default: false

jobs:
  scaffold:
    name: Test-Scaffold PR für neue Repos
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout platform
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.PROJECT_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyyaml
        run: pip install pyyaml --quiet

      - name: Repos ohne Test-Scaffold ermitteln
        id: find_repos
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import json, os, yaml
          from pathlib import Path

          root = Path(".")
          reg = yaml.safe_load((root / "scripts/repo-registry.yaml").read_text())
          repos = reg.get("repos", {})

          # Filter: nur Django-Repos (type=django, agent, bot)
          SCAFFOLD_TYPES = {"django", "agent", "bot"}
          target_repos = [
              name for name, props in repos.items()
              if isinstance(props, dict) and props.get("type") in SCAFFOLD_TYPES
              and name != "platform"
          ]

          # Einzelnes Repo via workflow_dispatch?
          single = os.environ.get("INPUT_REPO_NAME", "").strip()
          if single:
              target_repos = [single] if single in target_repos else []

          print(f"Kandidaten ({len(target_repos)}): {target_repos}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"repos={json.dumps(target_repos)}\n")
              f.write(f"count={len(target_repos)}\n")
          PYEOF
        env:
          INPUT_REPO_NAME: ${{ inputs.repo_name }}

      - name: PR für jeden Repo ohne conftest.py erstellen
        if: steps.find_repos.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const repos = JSON.parse('${{ steps.find_repos.outputs.repos }}');
            const dryRun = '${{ inputs.dry_run }}' === 'true';
            const fs = require('fs');
            const owner = context.repo.owner;

            // Scaffold-Dateien aus platform lesen
            const scaffoldRoot = 'docs/templates/django_test_scaffold';
            const conftest = fs.readFileSync(`${scaffoldRoot}/tests/conftest.py`, 'utf8');
            const smokeTest = fs.readFileSync(`${scaffoldRoot}/tests/test_views_smoke.py`, 'utf8');
            const htmxTest = fs.readFileSync(`${scaffoldRoot}/tests/test_views_htmx.py`, 'utf8');
            const reqTest = fs.readFileSync(`${scaffoldRoot}/requirements-test.txt`, 'utf8');

            let created = 0;
            let skipped = 0;

            for (const repo of repos) {
              console.log(`\nPrüfe ${repo}...`);

              // Prüfen ob conftest.py bereits existiert
              let hasConftest = false;
              try {
                await github.rest.repos.getContent({ owner, repo, path: 'tests/conftest.py' });
                hasConftest = true;
              } catch (e) {
                if (e.status !== 404) {
                  console.log(`  WARN: ${repo} — ${e.message}`);
                  skipped++;
                  continue;
                }
              }

              if (hasConftest) {
                console.log(`  SKIP: tests/conftest.py bereits vorhanden`);
                skipped++;
                continue;
              }

              // Prüfen ob PR bereits offen
              const existing = await github.rest.pulls.list({
                owner, repo, state: 'open',
              });
              const alreadyOpen = existing.data.some(pr =>
                pr.title.includes('test scaffold') || pr.title.includes('Test-Infrastruktur')
              );
              if (alreadyOpen) {
                console.log(`  SKIP: PR bereits offen`);
                skipped++;
                continue;
              }

              if (dryRun) {
                console.log(`  DRY-RUN: würde PR erstellen für ${repo}`);
                created++;
                continue;
              }

              // Branch erstellen
              const branch = `chore/add-test-scaffold`;
              let defaultSha;
              try {
                const repoData = await github.rest.repos.get({ owner, repo });
                const defaultBranch = repoData.data.default_branch;
                const ref = await github.rest.git.getRef({
                  owner, repo, ref: `heads/${defaultBranch}`,
                });
                defaultSha = ref.data.object.sha;
              } catch (e) {
                console.log(`  WARN: ${repo} — getRef fehlgeschlagen: ${e.message}`);
                skipped++;
                continue;
              }

              try {
                await github.rest.git.createRef({
                  owner, repo,
                  ref: `refs/heads/${branch}`,
                  sha: defaultSha,
                });
              } catch (e) {
                if (!e.message.includes('already exists')) {
                  console.log(`  WARN: Branch-Erstellung fehlgeschlagen: ${e.message}`);
                  skipped++;
                  continue;
                }
              }

              // Dateien committen
              const files = [
                { path: 'tests/__init__.py', content: '' },
                { path: 'tests/conftest.py', content: conftest },
                { path: 'tests/test_views_smoke.py', content: smokeTest },
                { path: 'tests/test_views_htmx.py', content: htmxTest },
                { path: 'requirements-test.txt', content: reqTest },
              ];

              for (const file of files) {
                try {
                  let sha;
                  try {
                    const existing = await github.rest.repos.getContent({
                      owner, repo, path: file.path, ref: branch,
                    });
                    sha = existing.data.sha;
                  } catch (e) { /* new file */ }

                  await github.rest.repos.createOrUpdateFileContents({
                    owner, repo,
                    path: file.path,
                    message: `chore: add test scaffold — ${file.path}`,
                    content: Buffer.from(file.content).toString('base64'),
                    branch,
                    ...(sha ? { sha } : {}),
                  });
                } catch (e) {
                  console.log(`  WARN: ${file.path} fehlgeschlagen: ${e.message}`);
                }
              }

              // PR erstellen
              await github.rest.pulls.create({
                owner, repo,
                title: `chore: Test-Infrastruktur einrichten (iil-testkit v0.4.0)`,
                body: [
                  '## Test-Scaffold hinzufügen',
                  '',
                  'Automatisch generiert von [platform/scaffold-tests.yml](https://github.com/achimdehnert/platform/blob/main/.github/workflows/scaffold-tests.yml)',
                  '',
                  '### Was wird hinzugefügt',
                  '',
                  '| Datei | Zweck |',
                  '|-------|-------|',
                  '| `tests/conftest.py` | iil-testkit Fixtures (auth_client, db_user, ...) |',
                  '| `tests/test_views_smoke.py` | Auto-Discovery HTTP-200-Test aller Views |',
                  '| `tests/test_views_htmx.py` | HTMX-Partial + data-testid Enforcement (ADR-048) |',
                  '| `requirements-test.txt` | Pinned test dependencies |',
                  '',
                  '### Nächste Schritte nach Merge',
                  '',
                  '1. `DJANGO_SETTINGS_MODULE` in `pyproject.toml` setzen',
                  '2. `HTMX_URLS` in `test_views_htmx.py` mit eigenen HTMX-Endpoints füllen',
                  '3. `python -m pytest tests/ -v` lokal ausführen',
                  '',
                  'Docs: [`iil-testkit` v0.4.0](https://github.com/achimdehnert/testkit)',
                ].join('\n'),
                head: branch,
                base: 'main',
              });

              console.log(`  ✅ PR erstellt für ${repo}`);
              created++;
            }

            console.log(`\nErgebnis: ${created} PRs erstellt, ${skipped} übersprungen`);
