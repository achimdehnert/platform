name: Skill MCP Signature Lint

on:
  push:
    paths:
      - ".windsurf/workflows/**.md"
      - "scripts/lint_skill_mcp_signatures.py"
      - ".github/workflows/skill-mcp-signatures.yml"
  pull_request:
    paths:
      - ".windsurf/workflows/**.md"
      - "scripts/lint_skill_mcp_signatures.py"

# Workflow-level default (least privilege, #818 permissions sweep) —
# no job in this workflow needs to write via GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Lint MCP signatures in skill files
        run: python scripts/lint_skill_mcp_signatures.py
