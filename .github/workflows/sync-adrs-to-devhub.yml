name: Sync ADRs to DevHub

on:
  push:
    branches:
      - main
    paths:
      - "docs/adr/**.md"
      - "docs/templates/**.md"
  workflow_dispatch:

jobs:
  sync:
    name: Trigger ADR sync on DevHub
    runs-on: [self-hosted, hetzner, dev]

    steps:
      - name: Trigger import_adrs in running DevHub container
        run: |
          docker exec devhub_web python manage.py import_adrs \
            --repo achimdehnert/platform \
            --path docs/adr \
            --tenant-slug devhub

      - name: Webhook fallback (if container exec fails)
        if: failure()
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '{}' | openssl dgst -sha256 -hmac '${{ secrets.DEVHUB_WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '{"repository":{"full_name":"achimdehnert/platform"},"commits":[{"added":["docs/adr/placeholder.md"],"modified":[],"removed":[]}]}' \
            https://devhub.iil.pet/adrs/webhook/github/ \
          && echo "Webhook fallback triggered" || echo "Webhook fallback also failed"

  hardcode-scan:
    name: Hardcode Scanner (platform repo)
    runs-on: [self-hosted, hetzner, dev]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Run hardcode scanner
        run: |
          python3 scripts/hardcode_scanner.py \
            --repo platform \
            --base-dir /home/deploy/projects \
            --severity high \
            --no-color \
            --format text || true
