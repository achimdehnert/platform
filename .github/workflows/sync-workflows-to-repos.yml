name: Sync Workflows to all Repos

on:
  push:
    branches: [main]
    paths:
      - '.windsurf/workflows/**'
      - 'registry/github_repos.yaml'
      - 'docs/onboarding/**'
      - 'docs/governance/**'
  workflow_dispatch:
    inputs:
      workflow_name:
        description: 'Workflow to sync (leer = alle UNIVERSAL+DJANGO_HUB+PACKAGE)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — nichts ändern, nur ausgeben'
        type: boolean
        default: false

jobs:
  sync:
    name: Push workflows to repos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Parse registry/github_repos.yaml → Repo-Listen
        id: registry
        run: |
          python3 - <<'EOF'
          import yaml, json, os

          with open('registry/github_repos.yaml') as f:
              data = yaml.safe_load(f)

          django_hubs = list(data.get('django_apps', {}).keys())
          packages    = list(data.get('frameworks', {}).keys())

          env_file = os.environ['GITHUB_ENV']
          with open(env_file, 'a') as f:
              f.write(f"DJANGO_HUBS_JSON={json.dumps(django_hubs)}\n")
              f.write(f"PACKAGES_JSON={json.dumps(packages)}\n")

          print(f"django_apps ({len(django_hubs)}): {django_hubs}")
          print(f"frameworks  ({len(packages)}): {packages}")
          EOF

      - name: Sync workflows via GitHub API
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const fs   = require('fs');
            const path = require('path');

            // ── Workflow-Kategorien (SSoT: sync-workflows.sh) ─────────────────
            const UNIVERSAL = [
              'knowledge-capture', 'agent-session-start', 'agentic-coding',
              'adr', 'adr-review', 'pr-review', 'governance-check',
              'repo-health-check', 'hotfix', 'windsurf-clean', 'workflow-index',
              'sync-repo', 'use-case', 'session-start', 'session-ende',
              'session-docu', 'docu-update', 'complete', 'prompt', 'drift-check',
              'docu-repo-active', 'teste-repo', 'sync-project-facts', 'secrets',
              'onboarding-new-repo',
            ];
            const DJANGO_HUB_WF = [
              'deploy', 'deploy-check', 'backup', 'ship', 'ship-staging',
              'run-local', 'run-prod', 'run-staging', 'rollback',
              'frontend-ui-test', 'pre-release-test', 'testing-setup',
              'testing-conventions', 'onboard-repo', 'onboard-repo-testing-addendum',
              'new-github-project', 'stack-upgrade', 'refresh-github-token',
              'compose-audit', 'nginx-check', 'uptime-monitoring',
            ];
            const PACKAGE_WF = ['release'];

            // ── Repo-Listen aus registry/github_repos.yaml (SSoT) ────────────
            const DJANGO_HUBS = JSON.parse(process.env.DJANGO_HUBS_JSON || '[]');
            const PACKAGES    = JSON.parse(process.env.PACKAGES_JSON    || '[]');
            core.info(`Registry: ${DJANGO_HUBS.length} django_apps · ${PACKAGES.length} frameworks`);

            const owner    = 'achimdehnert';
            const wfDir    = '.windsurf/workflows';
            const dryRun   = context.eventName === 'workflow_dispatch'
                             ? (context.payload.inputs?.dry_run === 'true')
                             : false;
            const specificWf = context.eventName === 'workflow_dispatch'
                               ? (context.payload.inputs?.workflow_name || '')
                               : '';

            // ── Welche Workflows sollen synced werden? ────────────────────────
            let changedWorkflows = [];
            let registryChanged  = false;
            let lookupChanged    = false;  // ADR-175: docs/<topic>/ geändert

            if (context.eventName === 'push') {
              const { data: compare } = await github.rest.repos.compareCommitsWithBasehead({
                owner, repo: 'platform',
                basehead: `${context.payload.before}...${context.payload.after}`,
              }).catch(e => {
                core.warning(`Diff failed: ${e.message} — syncing all`);
                return { data: { files: [] } };
              });

              for (const file of compare.files) {
                if (file.filename === 'registry/github_repos.yaml') {
                  registryChanged = true;
                } else if (file.filename.startsWith('.windsurf/workflows/') && file.filename.endsWith('.md')) {
                  changedWorkflows.push(path.basename(file.filename, '.md'));
                } else if (file.filename.startsWith('docs/onboarding/') || file.filename.startsWith('docs/governance/')) {
                  lookupChanged = true;  // ADR-175: ausgelagerter Lookup-File geändert
                }
              }

              // Registry oder Lookup-File geändert → alle Workflows in alle Repos pushen
              if (registryChanged) {
                core.info('registry/github_repos.yaml geändert — alle Workflows werden synced');
                changedWorkflows = [...UNIVERSAL, ...DJANGO_HUB_WF, ...PACKAGE_WF];
              } else if (lookupChanged && changedWorkflows.length === 0) {
                core.info('docs/<topic>/ Lookup geändert — alle Workflows werden synced (referenzen)');
                changedWorkflows = [...UNIVERSAL, ...DJANGO_HUB_WF, ...PACKAGE_WF];
              }
            } else {
              changedWorkflows = specificWf
                ? [specificWf]
                : [...UNIVERSAL, ...DJANGO_HUB_WF, ...PACKAGE_WF];
            }

            if (changedWorkflows.length === 0) {
              core.info('Keine Workflow-Dateien geändert — nichts zu tun.');
              return;
            }
            core.info(`Syncing ${changedWorkflows.length} workflow(s): ${changedWorkflows.join(', ')}`);

            // ── Helper: Lookup-References aus Workflow extrahieren (ADR-175) ──
            // Erkennt Markdown-Links wie [`docs/onboarding/foo.md`](../../docs/onboarding/foo.md)
            const extractLookups = (wfContent) => {
              const re = /\((?:\.\.\/)*?(docs\/(onboarding|governance)\/[a-z0-9_-]+\.md)\)/gi;
              const found = new Set();
              let m;
              while ((m = re.exec(wfContent)) !== null) {
                found.add(m[1]);  // z.B. "docs/onboarding/onboard-repo-checklist.md"
              }
              return [...found];
            };

            // Helper: Lookup-File zu einem Repo pushen (mit unchanged-skip)
            const pushLookupToRepo = async (repo, lookupPath, lookupContent, lookupB64) => {
              try {
                let sha;
                try {
                  const { data: existing } = await github.rest.repos.getContent({ owner, repo, path: lookupPath });
                  sha = existing.sha;
                  const existingContent = Buffer.from(existing.content || '', 'base64').toString('utf8');
                  if (existing.type !== 'symlink' && existingContent === lookupContent) {
                    return 'skip';  // unchanged
                  }
                  if (existing.type === 'symlink') {
                    await github.rest.repos.deleteFile({
                      owner, repo, path: lookupPath,
                      message: `chore(docs): remove symlink ${lookupPath} (→ regular file)`,
                      sha,
                    });
                    sha = undefined;
                  }
                } catch (e) { /* Datei neu */ }
                await github.rest.repos.createOrUpdateFileContents({
                  owner, repo, path: lookupPath,
                  message: `chore(docs): sync ${lookupPath} from platform (ADR-175)`,
                  content: lookupB64, sha,
                });
                return 'updated';
              } catch (e) {
                if (e.status === 404 || e.message?.includes('Not Found')) return 'skip';
                throw e;
              }
            };

            // ── Für jeden Workflow: Ziel-Repos bestimmen + pushen ─────────────
            let successCount = 0, skipCount = 0, errorCount = 0;
            let lookupSuccess = 0, lookupSkip = 0, lookupError = 0;

            for (const wf of changedWorkflows) {
              const localPath = `${wfDir}/${wf}.md`;
              let content;
              try {
                content = fs.readFileSync(localPath, 'utf8');
              } catch (e) {
                core.warning(`SKIP: ${wf}.md nicht in platform`);
                skipCount++;
                continue;
              }

              let repos = [];
              if (UNIVERSAL.includes(wf))          repos = [...DJANGO_HUBS, ...PACKAGES];
              else if (DJANGO_HUB_WF.includes(wf)) repos = DJANGO_HUBS;
              else if (PACKAGE_WF.includes(wf))    repos = PACKAGES;
              else {
                core.info(`INFO: ${wf}.md ist PLATFORM-only — nicht verteilt`);
                skipCount++;
                continue;
              }

              const contentB64 = Buffer.from(content).toString('base64');

              for (const repo of repos) {
                const filePath = `.windsurf/workflows/${wf}.md`;

                if (dryRun) {
                  core.info(`DRY RUN: ${repo}/${filePath}`);
                  continue;
                }

                try {
                  let sha, existingContent, isSymlink = false;
                  try {
                    const { data: existing } = await github.rest.repos.getContent({ owner, repo, path: filePath });
                    sha = existing.sha;
                    isSymlink = existing.type === 'symlink';
                    if (!isSymlink) {
                      existingContent = Buffer.from(existing.content || '', 'base64').toString('utf8');
                    }
                  } catch (e) { /* Datei neu */ }

                  // Workflow updaten (nur wenn geändert)
                  if (!isSymlink && existingContent === content) {
                    core.info(`  SKIP (unchanged): ${repo}/${wf}.md`);
                    skipCount++;
                  } else {
                    // Symlink erst löschen — createOrUpdateFileContents ändert sonst nicht den git-Mode
                    if (isSymlink && sha) {
                      await github.rest.repos.deleteFile({
                        owner, repo, path: filePath,
                        message: `chore(workflows): remove symlink ${wf}.md (→ regular file)`,
                        sha,
                      });
                      sha = undefined;
                      core.info(`  DEL symlink: ${repo}/${wf}.md`);
                    }
                    await github.rest.repos.createOrUpdateFileContents({
                      owner, repo, path: filePath,
                      message: `chore(workflows): sync ${wf}.md from platform`,
                      content: contentB64, sha,
                    });
                    core.info(`  ✅ ${repo}: ${wf}.md`);
                    successCount++;
                  }

                  // ADR-175: Referenzierte Lookup-Files IMMER mitpushen (auch wenn Workflow unchanged)
                  const lookups = extractLookups(content);
                  for (const lookupPath of lookups) {
                    let lookupContent;
                    try {
                      lookupContent = fs.readFileSync(lookupPath, 'utf8');
                    } catch (e) {
                      core.warning(`    ⚠️ Lookup nicht in platform: ${lookupPath}`);
                      lookupError++;
                      continue;
                    }
                    const lookupB64 = Buffer.from(lookupContent).toString('base64');
                    try {
                      const result = await pushLookupToRepo(repo, lookupPath, lookupContent, lookupB64);
                      if (result === 'updated') {
                        core.info(`    📎 ${repo}: ${lookupPath}`);
                        lookupSuccess++;
                      } else {
                        lookupSkip++;
                      }
                    } catch (e) {
                      core.warning(`    ❌ ${repo}: ${lookupPath} — ${e.message}`);
                      lookupError++;
                    }
                  }
                } catch (e) {
                  if (e.status === 404 || e.message?.includes('Not Found')) {
                    core.info(`  SKIP (repo not found): ${repo}`);
                    skipCount++;
                  } else {
                    core.warning(`  ❌ ${repo}: ${wf}.md — ${e.message}`);
                    errorCount++;
                  }
                }
              }
            }

            core.info(`\nWorkflows: ${successCount} updated · ${skipCount} skipped · ${errorCount} errors`);
            core.info(`Lookups:   ${lookupSuccess} updated · ${lookupSkip} skipped · ${lookupError} errors`);
            const totalErrors = errorCount + lookupError;
            if (totalErrors > 0) core.setFailed(`${totalErrors} errors — check warnings above`);
