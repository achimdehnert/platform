name: Tools Unit-Tests

# Generischer Gate für ALLE tools/tests/ — schließt die strukturelle F-A-Wurzel:
# bisher musste jeder Tool-Test manuell in einen spezifischen Workflow verdrahtet werden
# (cc-skill-dist-doctor.yml kannte nur test_generate/test_doctor), sodass neue Tool-Tests
# CI-verwaist blieben (z.B. test_registry_coverage_drift). Hier läuft `pytest tools/tests/`
# als EIN blockierender Gate über alles — kein neues Tool-Test fällt mehr durchs Raster.
# Session-Retro F-A / KONZ-001 R7 (beweisbar-echte Gates).
#
# scripts/** ist mit-getriggert: tools/tests/ enthält auch Tests für scripts/-Module
# (z.B. test_drift_check.py → scripts/drift_check.py). Ohne den scripts/**-Trigger
# liefe der Gate bei einer drift_check.py-Änderung NICHT — genau die CI-verwaiste
# Lücke aus Session-Retro 2026-06-12 F1 (repo-root tests/ läuft in keinem Workflow).
#
# Ehrlichkeits-Hinweis (Issue #819 Häppchen 3, repo-optimize 2026-07-02): der
# scripts/**-Trigger bedeutet NICHT, dass alle scripts/*.py getestet sind — nur
# scripts/drift_check.py (test_drift_check.py) und scripts/render_staging.py
# (test_render_staging.py, s.u.) haben echte Tests; die übrigen ~24 scripts/*.py
# sind weiterhin ungetestet (Gate läuft grün, ohne sie zu prüfen). Kein
# Vollständigkeits-Claim — nur was unten tatsächlich läuft.
#
# Zusätzlich zu tools/tests/ laufen hier drei zuvor CI-tote Testorte mit (waren
# nie in einen Workflow verdrahtet, obwohl sie grün + portabel sind):
#   - tests/test_render_staging.py      → scripts/render_staging.py (ADR-212)
#   - tests/doc_profile_check/           → doc_profile_check.sh Regel-Engine (ADR-218)
#   - tools/claude-hooks/tests/          → tools/claude-hooks/log_llm_call.py
# tests/megatest/ bleibt bewusst außen vor (eigener, separat verdrahteter Gate).
#
# shared_contracts/** ist seit platform#820 (Entscheid A) ebenfalls mit-getriggert:
# tools/tests/test_shared_contracts.py deckt die Pydantic-Contracts dort ab; ohne
# diesen Trigger würde der Gate bei einer Contract-Änderung NICHT laufen — dieselbe
# Lücke wie oben, nur für shared_contracts/ statt scripts/.
#
# X-9 (repo-optimize 2026-07-03, Spec D / #903): zusätzlich zu den Tests läuft hier
# `ruff check tools/ scripts/` als eigener Step — vorher gab es KEINE CI, die tools/
# scripts/ überhaupt lintete (52 Workflows geprüft; _ci-python.yml wird von platform
# selbst nie aufgerufen; pre-commit hat keinen ruff-Hook). Pre-existing Lint-Schuld
# in vier Dateien ist bewusst per pyproject.toml [tool.ruff.lint.per-file-ignores]
# ausgenommen (mit Begründung dort) statt drive-by umgeschrieben.

on:
  push:
    paths:
      - "tools/**"
      - "scripts/**"
      - "shared_contracts/**"
      - "agents/**"
      # #901 Spec B: check_workflow_index.py gatet den Workflow-Index gegen die
      # .windsurf/workflows/-Quelle — bei Skill-Änderungen muss der Gate laufen.
      - ".windsurf/workflows/**"
  pull_request:
    paths:
      - "tools/**"
      - "scripts/**"
      - "shared_contracts/**"
      - "agents/**"
      - ".windsurf/workflows/**"

# CI-5 (#1202): cancel superseded runs on rapid pushes to the same
# ref/PR — avoids self-overlap when several commits land in quick
# succession on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level default (least privilege, #818 permissions sweep) —
# no job in this workflow needs to write via GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  tools-tests:
    name: pytest tools/tests/ + CI-tote Testorte
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # einige Tests bauen Wegwerf-Git-Repos / lesen Refs

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test deps
        # pydantic: shared_contracts-Tests (platform#820); Liste = Teilmenge von requirements-dev.txt
        run: pip install pytest pyyaml pydantic --quiet --break-system-packages

      - name: Run all tools tests
        # SSoT = Makefile `test`-Target (retro f4a546-incr #1: lokal liefen 388,
        # CI 486 Tests, weil beide Seiten eigene pytest-Listen pflegten — der
        # Makefile-Kommentar "identisch zu tools-tests.yml" war falsch). Jetzt
        # ruft CI exakt das Target, das auch Review-Gate 5b lokal verlangt.
        # Testorte-Rationale (agents/tests CI-dunkel, test_adr_scribe.py-Ausnahme
        # A-8) ist ins Makefile-Target gewandert.
        run: make test

      - name: Workflow-Index Vollständigkeit (K-44, #901 Spec B)
        # Jeder Skill in .windsurf/workflows/ muss in workflow-index.md stehen
        # (oder distribute:false / Allowlist). Struktureller Gate, keine LLM.
        run: python3 tools/check_workflow_index.py

      - name: Install ruff
        run: pip install ruff --quiet --break-system-packages

      - name: Lint (ruff check tools/ scripts/)
        # X-9: eigener Step NACH dem pytest-Step (Test-Failures sollen zuerst sichtbar
        # sein); per-file-ignores mit Begründung stehen in pyproject.toml.
        run: ruff check tools/ scripts/
