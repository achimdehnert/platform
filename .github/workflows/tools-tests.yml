name: Tools Unit-Tests

# Generischer Gate für ALLE tools/tests/ — schließt die strukturelle F-A-Wurzel:
# bisher musste jeder Tool-Test manuell in einen spezifischen Workflow verdrahtet werden
# (cc-skill-dist-doctor.yml kannte nur test_generate/test_doctor), sodass neue Tool-Tests
# CI-verwaist blieben (z.B. test_registry_coverage_drift). Hier läuft `pytest tools/tests/`
# als EIN blockierender Gate über alles — kein neues Tool-Test fällt mehr durchs Raster.
# Session-Retro F-A / KONZ-001 R7 (beweisbar-echte Gates).
#
# scripts/** ist mit-getriggert: tools/tests/ enthält auch Tests für scripts/-Module
# (z.B. test_drift_check.py → scripts/drift_check.py). Ohne den scripts/**-Trigger
# liefe der Gate bei einer drift_check.py-Änderung NICHT — genau die CI-verwaiste
# Lücke aus Session-Retro 2026-06-12 F1 (repo-root tests/ läuft in keinem Workflow).
#
# shared_contracts/** ist seit platform#820 (Entscheid A) ebenfalls mit-getriggert:
# tools/tests/test_shared_contracts.py deckt die Pydantic-Contracts dort ab; ohne
# diesen Trigger würde der Gate bei einer Contract-Änderung NICHT laufen — dieselbe
# Lücke wie oben, nur für shared_contracts/ statt scripts/.

on:
  push:
    paths:
      - "tools/**"
      - "scripts/**"
      - "shared_contracts/**"
  pull_request:
    paths:
      - "tools/**"
      - "scripts/**"
      - "shared_contracts/**"

jobs:
  tools-tests:
    name: pytest tools/tests/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # einige Tests bauen Wegwerf-Git-Repos / lesen Refs

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test deps
        # pydantic: shared_contracts-Tests (platform#820); Liste = Teilmenge von requirements-dev.txt
        run: pip install pytest pyyaml pydantic --quiet --break-system-packages

      - name: Run all tools tests
        run: python3 -m pytest tools/tests/ -q
