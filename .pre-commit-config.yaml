repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: Secret Detection (gitleaks)
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: main-tree-protect
        name: Main-Tree-Guard (ADR-233 — kein Commit im heiligen Haupt-Tree)
        language: system
        entry: tools/main-tree-guard.sh precommit-check
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: adr-number-guard
        name: ADR Number Guard (no duplicate numbers)
        language: python
        entry: python3 scripts/adr_next_number.py --check
        pass_filenames: false
        always_run: false
        files: ^docs/adr/ADR-.*\.md$
        stages: [pre-commit]

      - id: adr-schema-validate
        name: ADR Schema Validation (iil-adrfw)
        language: system
        entry: iil-adrfw validate docs/adr/
        pass_filenames: false
        always_run: false
        files: ^docs/adr/ADR-.*\.md$
        stages: [pre-commit]
