repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: Secret Detection (gitleaks)
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: adr-number-guard
        name: ADR Number Guard (no duplicate numbers)
        language: python
        entry: python3 scripts/adr_next_number.py --check
        pass_filenames: false
        always_run: false
        files: ^docs/adr/ADR-.*\.md$
        stages: [pre-commit]
