# AI Task Template — Platform Agentic Coding
# Version: 1.0 | ADR-066 + ADR-068
# Usage: Copy and fill out for every AI-agent task.
# Machine-readable: TaskRouter parses this to determine model tier.

task:
  # --- Identity ---
  id: "TASK-{uuid}"                          # Auto-generated by TaskRouter
  title: ""                                  # Short imperative: "Add X to Y"
  github_issue: ""                           # e.g. achimdehnert/platform#4
  adr_refs: []                               # e.g. ["ADR-066", "ADR-057"]
  created_by: ""                             # human | cascade | agent-name
  created_at: ""                             # ISO 8601

  # --- Classification (used by TaskRouter for model-tier selection) ---
  type: "feature"                            # feature | bugfix | refactor | test | adr | review | infra
  complexity: "moderate"                     # trivial | simple | moderate | complex | architectural
  risk_level: "medium"                       # low | medium | high | critical
  requires_planning: false                   # true → Router prefers high_reasoning tier
  context_size_estimate: "1k-10k"           # <1k | 1k-10k | 10k-50k | >50k (tokens)
  time_budget_minutes: 30                    # Expected max duration

  # --- Scope ---
  repo: ""                                   # e.g. achimdehnert/bfagent
  affected_paths: []                         # e.g. ["apps/core/handlers/base.py"]
  affected_adrs: []                          # ADRs whose compliance must be checked

  # --- Acceptance Criteria (machine-checkable where possible) ---
  acceptance_criteria:
    - ""                                     # e.g. "All tests pass (pytest exit 0)"
    - ""                                     # e.g. "Coverage delta >= 0"
    - ""                                     # e.g. "Guardian (Ruff/Bandit/MyPy) passes"

  # --- Quality Gates ---
  quality_gates:
    guardian_pass_required: true             # Ruff + Bandit + MyPy must pass
    min_coverage_delta: 0.0                  # Coverage must not decrease
    max_iteration_count: 3                   # Max review cycles before escalation
    human_review_required: false             # Gate 2+ requires human approval
    gate_level: 1                            # 0=Autonomous 1=Notify 2=Approve 3=Sync 4=Human-Only

  # --- Model Routing Hints (optional — overrides TaskRouter suggestion) ---
  routing_hints:
    preferred_tier: ""                       # Leave empty for auto-routing
    fallback_tier: ""                        # Leave empty for auto-fallback
    cost_sensitive: false                    # true → Router prefers budget_cloud over standard

  # --- Output Artifacts ---
  expected_artifacts:
    - type: "code"                           # code | test | adr | doc | config | report
      path: ""
    - type: "test"
      path: ""

  # --- Traceability ---
  linked_pr: ""                              # Filled after PR creation
  audit_log_id: ""                           # Filled by AuditStore after execution
