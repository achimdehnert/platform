# Host Nginx vHost for docs.bfagent.de # noqa: hardcode
# =====================================
# TLS termination, caching, proxy to Docker container
#
# Installation:
#   sudo cp docs.bfagent.de.conf /etc/nginx/sites-available/ # noqa: hardcode
#   sudo ln -s /etc/nginx/sites-available/docs.bfagent.de.conf /etc/nginx/sites-enabled/ # noqa: hardcode
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name docs.iil.pet; # noqa: hardcode

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Redirect all other traffic
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name docs.iil.pet; # noqa: hardcode

    # SSL Certificate (Wildcard or dedicated)
    ssl_certificate /etc/letsencrypt/live/docs.iil.pet/fullchain.pem; # noqa: hardcode
    ssl_certificate_key /etc/letsencrypt/live/docs.iil.pet/privkey.pem; # noqa: hardcode
    ssl_trusted_certificate /etc/letsencrypt/live/docs.iil.pet/chain.pem; # noqa: hardcode

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;

    # Logging
    access_log /var/log/nginx/docs.iil.pet_access.log combined; # noqa: hardcode
    error_log /var/log/nginx/docs.iil.pet_error.log warn; # noqa: hardcode

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # HTML files - no cache (always fresh after deploy)
    location ~* \.html$ {
        proxy_pass http://127.0.0.1:8081; # noqa: hardcode
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Static assets - long cache with immutable
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:8081; # noqa: hardcode
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    # Search index - moderate cache
    location ~* searchindex\.js$ {
        proxy_pass http://127.0.0.1:8081; # noqa: hardcode
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Build info - no cache
    location = /build-info.txt {
        proxy_pass http://127.0.0.1:8081; # noqa: hardcode
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        add_header Cache-Control "no-cache" always;
        add_header Content-Type "text/plain; charset=utf-8" always;
    }

    # Default - proxy to docs container
    location / {
        proxy_pass http://127.0.0.1:8081; # noqa: hardcode
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Moderate cache for index pages
        add_header Cache-Control "public, max-age=300" always;
    }

    # Versioned docs (immutable)
    location ~ ^/v[0-9]+\.[0-9]+/ {
        proxy_pass http://127.0.0.1:8081; # noqa: hardcode
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }
}
