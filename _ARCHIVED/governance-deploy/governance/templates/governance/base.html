{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Governance{% endblock %} | DDL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        .status-badge { font-size: 0.75rem; padding: 0.25em 0.5em; }
        .card-hover:hover { box-shadow: 0 0.5rem 1rem rgba(0,0,0,.15); transition: box-shadow 0.2s; }
        .stat-card { border-left: 4px solid; }
        .stat-card.draft { border-left-color: #6c757d; }
        .stat-card.review { border-left-color: #ffc107; }
        .stat-card.approved { border-left-color: #198754; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'governance:dashboard' %}">
                <i class="bi bi-diagram-3"></i> DDL Governance
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" 
                           href="{% url 'governance:dashboard' %}">
                            <i class="bi bi-speedometer2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if 'bc-' in request.resolver_match.url_name %}active{% endif %}" 
                           href="{% url 'governance:bc-list' %}">
                            <i class="bi bi-briefcase"></i> Business Cases
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if 'uc-' in request.resolver_match.url_name %}active{% endif %}" 
                           href="{% url 'governance:uc-list' %}">
                            <i class="bi bi-list-task"></i> Use Cases
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-dark text-light py-3 mt-5">
        <div class="container text-center">
            <small>DDL Governance System &bull; ADR-017</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
