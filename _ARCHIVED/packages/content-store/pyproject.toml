[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "iil-content-store"
version = "0.1.0"
description = "Shared Django app for AI-generated content persistence (ADR-130)"
readme = "README.md"
license = {text = "Proprietary"}
requires-python = ">=3.12"
authors = [
    { name = "Achim Dehnert", email = "achim.dehnert@iil.gmbh" },
]
dependencies = [
    "Django>=5.0,<6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.8",
]

[tool.hatch.build.targets.wheel]
packages = ["content_store"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "tests.settings"
pythonpath = ["."]
