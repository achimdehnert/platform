[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "iil-django-module-shop"
version = "0.2.0"
description = "Reusable Django module catalogue & subscription management"
requires-python = ">=3.12"
dependencies = ["Django>=5.0,<6.0"]

[tool.setuptools.packages.find]
where = ["."]

[tool.ruff]
line-length = 100
