[project]
name = "iil-platform-context"
version = "0.7.0"
description = "Shared platform foundation for all Django projects (Context, Tenancy, Audit, Outbox)"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [
    {name = "Achim Dehnert", email = "achim@dehnert.com"}
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: Django :: 5.0",
    "Framework :: Django :: 6.0",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

dependencies = [
    "Django>=5.0,<6.0",
    "asgiref>=3.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.8",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.12",
    "factory-boy>=3.3",
]
testing = [
    "pytest>=8.0",
    "pytest-django>=4.8",
    "pytest-mock>=3.12",
    "factory-boy>=3.3",
]
tenants = [
    "django-tenants>=3.6",
    "tenant-schemas-celery>=2.0",
    "httpx>=0.27",
]
temporal = [
    "temporalio>=1.7.0",
]
metrics = [
    "prometheus-client>=0.20",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/platform_context"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "tests.settings"
python_files = ["test_*.py"]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
