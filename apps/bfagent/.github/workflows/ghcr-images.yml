name: Build and Push Images (GHCR)

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  DEPLOY_ENABLED: true  # Set to false to disable auto-deploy

jobs:
  build-bfagent-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (bfagent-web)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          no-cache: true
          build-args: |
            CACHEBUST=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/bfagent-web:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/bfagent-web:${{ github.sha }}

  build-mcphub-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (mcphub-api)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.mcphub-api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/mcphub-api:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/mcphub-api:${{ github.sha }}

  # ============================================================================
  # Auto-Deploy to Hetzner after successful build
  # ============================================================================
  deploy-to-hetzner:
    name: Deploy to Hetzner
    needs: [build-bfagent-web]
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Deploy bfagent-web via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: bfagent.iil.pet
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/bfagent-app
            
            # Update image tag to new commit SHA
            sed -i 's/BFAgent_IMAGE_TAG=.*/BFAgent_IMAGE_TAG=${{ github.sha }}/' .env.prod
            
            # Pull new image
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull bfagent-web
            
            # Restart bfagent-web and caddy (for docs volume)
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --force-recreate bfagent-web caddy
            
            # Wait for startup
            sleep 15
            
            echo "✅ Deployed commit ${{ github.sha }}"

      - name: Verify Deployment
        run: |
          # Check main app
          HTTP_APP=$(curl -s -o /dev/null -w "%{http_code}" https://bfagent.iil.pet/login/)
          # Check docs
          HTTP_DOCS=$(curl -s -o /dev/null -w "%{http_code}" https://bfagent.iil.pet/docs/)
          
          echo "App: HTTP $HTTP_APP"
          echo "Docs: HTTP $HTTP_DOCS"
          
          if [ "$HTTP_APP" = "200" ] && [ "$HTTP_DOCS" = "200" ]; then
            echo "✅ Deployment verified - App and Docs accessible"
          else
            echo "❌ Health check failed"
            exit 1
          fi
