# HTMX Conformity Scanner Configuration
# BF Agent Project Configuration

# Patterns to ignore during scanning
ignore_patterns:
  - "*/migrations/*"
  - "*/static/vendor/*"
  - "*/node_modules/*"
  - "*/.venv/*"
  - "*/tests/*"
  - "*/fixtures/*"
  - "*/docs/*"

# Custom valid HTMX targets for BF Agent
custom_targets:
  - "#main-content"
  - "#form-container"
  - "#list-container"
  - "#detail-container"
  - "#modal-body"
  - "#results-container"
  - "#llm-test-result"
  - "#enrichment-results"
  - "#project-content"
  - "#character-content"
  - "#chapter-content"
  - "body"

# Feature toggles
check_javascript: true
check_response_headers: true
parallel_scanning: true
max_workers: 4
cache_enabled: true
strict_mode: false

# Issue severity customization
severity_overrides:
  missing_indicator: "info"  # Downgrade from warning
  hardcoded_urls: "warning"  # Keep as warning for now
  invalid_target: "critical" # Keep critical

# HTMX-specific settings
htmx_settings:
  required_attributes:
    - "hx-target"
  recommended_attributes:
    - "hx-indicator"
    - "hx-swap"
  forbidden_patterns:
    - "onclick="
    - "onsubmit="
  required_headers:
    - "HX-Request"

# Auto-fix settings
auto_fix:
  enabled: true
  create_backups: true
  fix_patterns:
    invalid_target:
      default_target: "body"
    missing_swap:
      default_strategy: "innerHTML"
    missing_indicator:
      default_class: ".htmx-indicator"

# Reporting options
reporting:
  include_context_lines: 3
  max_issues_per_file: 50
  group_by_pattern: true
  include_statistics: true
  formats:
    - json
    - html

# Integration settings
integrations:
  pre_commit: true

# Django-specific settings
django:
  apps_to_scan:
    - "apps/*"
  template_dirs:
    - "templates"
    - "*/templates"
  static_dirs:
    - "static"
    - "*/static"
