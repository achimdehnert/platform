# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
default_language_version:
  python: python3.11

# Don't run on files that match these patterns
exclude: |
  (?x)(
    ^migrations/|
    ^staticfiles/|
    ^media/|
    ^.venv/|
    ^venv/|
    ^node_modules/|
    ^outdated/|
    ^scripts_outdated/|
    ^.code_backups/|
    ^.tool_backups/|
    \.min\.(js|css)$|
    \.svg$|
    ^docs/_build/|
    \.backup$
  )

# Configure when to run
fail_fast: false
minimum_pre_commit_version: '3.0.0'

repos:
  # Python formatters (order matters - black should run after isort)
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length", "100"]

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3.11
        args: ["--line-length", "100"]

  # Python linters (run after formatters)
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--config=.flake8']
        additional_dependencies:
          - flake8-django
          - flake8-bugbear
          - flake8-comprehensions

  # General file fixes (these often cause conflicts - put them last)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # File content checks first (no modifications)
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-ast
      - id: check-json
      - id: check-yaml
        exclude: mkdocs.yml
      - id: check-xml
      - id: check-merge-conflict
      - id: check-case-conflict

      # File modifications (these cause the stash conflicts)
      - id: trailing-whitespace
        # Don't run on markdown to preserve intentional line breaks
        exclude_types: [markdown]
      - id: end-of-file-fixer
        # Don't run on minified files
        exclude: \.(min\.(js|css))$
      - id: mixed-line-ending
        args: ['--fix=lf']

      # Python specific checks
      - id: debug-statements
        # Only on Python files
        files: \.py$
      - id: fix-byte-order-marker
      - id: fix-encoding-pragma
        args: ['--remove']

  # Django specific hooks
  - repo: local
    hooks:
      - id: django-check
        name: Django Check
        entry: python manage.py check --fail-level WARNING
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
        # Don't run during rebase
        stages: [commit]

      - id: django-migrations-check
        name: Check for missing migrations
        entry: python manage.py makemigrations --check --dry-run
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
        # Don't run during rebase
        stages: [commit]

# Only run on staged files (helps prevent conflicts)
# This is the default behavior but explicit is better
files: ''
