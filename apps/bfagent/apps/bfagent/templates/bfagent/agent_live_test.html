<!-- CUSTOM_CODE: Agent Live Test Template - Protected from auto-generation -->
<div class="card shadow-sm">
    <div class="card-header bg-success text-white">
        <h5 class="mb-0">
            <i class="bi bi-robot"></i> Live Agent Test
        </h5>
    </div>
    <div class="card-body">
        <!-- Input Field -->
        <div class="mb-3">
            <label for="agent-test-prompt" class="form-label fw-bold">
                Prompt
            </label>
            <textarea 
                id="agent-test-prompt" 
                class="form-control" 
                rows="4" 
                placeholder="Enter your prompt here to test the agent..."
            ></textarea>
        </div>

        <!-- Test Button -->
        <div class="mb-3">
            <button 
                type="button" 
                class="btn btn-success"
                onclick="testAgent()"
            >
                <i class="bi bi-play-fill"></i> Test Agent
            </button>
            
            <!-- Loading Spinner -->
            <span id="agent-test-spinner" class="htmx-indicator ms-2" style="display: none;">
                <span class="spinner-border spinner-border-sm" role="status">
                    <span class="visually-hidden">Loading...</span>
                </span>
                Testing Agent...
            </span>
        </div>

        <!-- Response Field -->
        <div class="mb-3">
            <label class="form-label fw-bold">
                <i class="bi bi-chat-left-text"></i> Agent Response
            </label>
            <div 
                id="agent-test-response" 
                class="border rounded p-3 bg-light"
                style="min-height: 150px; white-space: pre-wrap;"
            >
                <span class="text-muted">Agent response will appear here...</span>
            </div>
        </div>

        <!-- Response Metadata -->
        <div id="agent-test-metadata" class="text-muted small">
            <!-- Agent info and timestamp will appear here -->
        </div>
    </div>
</div>

<script>
function testAgent() {
    const promptField = document.getElementById('agent-test-prompt');
    const responseField = document.getElementById('agent-test-response');
    const spinner = document.getElementById('agent-test-spinner');
    const prompt = promptField.value.trim();
    
    if (!prompt) {
        responseField.innerHTML = '<div class="alert alert-warning">Please enter a prompt</div>';
        return;
    }
    
    // Show spinner
    spinner.style.display = 'inline';
    responseField.innerHTML = '<div class="text-muted">Agent is processing...</div>';
    
    // Get CSRF token
    const csrftoken = getCookie('csrftoken');
    
    // Make request
    fetch("{% url 'bfagent:agent-live-test' object.pk %}", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrftoken
        },
        body: JSON.stringify({ prompt: prompt })
    })
    .then(response => {
        if (!response.ok) {
            return response.text().then(text => { throw new Error(text); });
        }
        return response.text();
    })
    .then(html => {
        responseField.innerHTML = html;
        spinner.style.display = 'none';
    })
    .catch(error => {
        responseField.innerHTML = '<div class="alert alert-danger">Error: ' + error.message + '</div>';
        spinner.style.display = 'none';
    });
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
