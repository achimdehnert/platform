{% extends "base.html" %}
{% load static %}

{% block title %}Delete AgentAction{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-exclamation-triangle text-danger"></i> Delete Agent Action</h1>
        <a href="{% url 'bfagent:agentaction-list' %}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Back to List
        </a>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <div class="alert alert-danger">
                <h5><i class="bi bi-exclamation-circle"></i> Warning!</h5>
                <p>Are you sure you want to delete <strong>{{ object.display_name }}</strong>?</p>
                <p>This action cannot be undone!</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-between">
                    <a href="{% url 'bfagent:agentaction-detail' object.pk %}" class="btn btn-secondary">
                        Cancel
                    </a>
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Yes, Delete
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
