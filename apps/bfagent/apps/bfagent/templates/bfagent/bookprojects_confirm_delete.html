{% extends "base.html" %}
{% load static %}

{% block title %}Delete BookProjects{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-trash"></i> Delete BookProjects</h1>
        <a href="{% url 'bfagent:bookprojects-detail' bookprojects.pk %}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div class="card shadow border-danger">
        <div class="card-body">
            <div class="alert alert-danger">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <strong>Warning!</strong> This action cannot be undone.
            </div>

            <p>Are you sure you want to delete <strong>{{ object }}</strong>?</p>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-between mt-4">
                    <a href="{% url 'bfagent:bookprojects-detail' object.pk %}" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Delete
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
