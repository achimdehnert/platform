<div class="modal-header">
    <h5 class="modal-title">💡 New Feature</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<form hx-post="{% url url_create %}" hx-swap="none">
    <div class="modal-body">
        {% csrf_token %}
        
        <div class="mb-3">
            <label class="form-label">Feature Name *</label>
            <input type="text" class="form-control" name="name" required placeholder="e.g. CharacterEmotionAnalyzer">
        </div>
        
        <div class="mb-3">
            <label class="form-label">Component Type *</label>
            <select class="form-select" name="component_type" required>
                <option value="">-- Select Type --</option>
                {% for type_code, type_label in available_types %}
                <option value="{{ type_code }}">{{ type_label }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Description *</label>
            <textarea class="form-control" name="description" rows="3" required placeholder="What does this feature do?"></textarea>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Priority</label>
                <select class="form-select" name="priority">
                    <option value="medium">🟡 Medium</option>
                    <option value="critical">🔥 Critical</option>
                    <option value="high">🔴 High</option>
                    <option value="low">🔵 Low</option>
                    <option value="backlog">📦 Backlog</option>
                </select>
            </div>
            
            <div class="col-md-6 mb-3">
                <label class="form-label">Domain</label>
                <input type="text" class="form-control" name="domain" placeholder="e.g. book, medtrans, shared">
            </div>
        </div>
    </div>
    
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Create Feature
        </button>
    </div>
</form>

<script>
// Close modal and refresh page on success
document.body.addEventListener('closeModal', function() {
    var modalEl = document.getElementById('detailModal');
    var modal = bootstrap.Modal.getInstance(modalEl);
    if (modal) {
        modal.hide();
    }
    // Reload page to show new feature
    setTimeout(function() {
        window.location.reload();
    }, 200);
});
</script>
