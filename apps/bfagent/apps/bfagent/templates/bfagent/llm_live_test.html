<!-- CUSTOM_CODE: LLM Live Test Template - Protected from auto-generation -->
<div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
        <h5 class="mb-0">
            <i class="bi bi-lightning-charge"></i> Live LLM Test
        </h5>
    </div>
    <div class="card-body">
        <!-- Input Field -->
        <div class="mb-3">
            <label for="llm-test-prompt" class="form-label fw-bold">
                Prompt
            </label>
            <textarea
                id="llm-test-prompt"
                class="form-control"
                rows="4"
                placeholder="Enter your prompt here..."
            ></textarea>
        </div>

        <!-- Test Button -->
        <div class="mb-3">
            <button
                type="button"
                class="btn btn-primary"
                onclick="testLLM()"
            >
                <i class="bi bi-play-fill"></i> Test LLM
            </button>

            <!-- Loading Spinner -->
            <span id="llm-test-spinner" class="htmx-indicator ms-2">
                <span class="spinner-border spinner-border-sm" role="status">
                    <span class="visually-hidden">Loading...</span>
                </span>
                Testing...
            </span>
        </div>

        <!-- Response Field -->
        <div class="mb-3">
            <label class="form-label fw-bold">
                <i class="bi bi-chat-left-text"></i> Response
            </label>
            <div
                id="llm-test-response"
                class="border rounded p-3 bg-light"
                style="min-height: 150px; white-space: pre-wrap;"
            >
                <span class="text-muted">Response will appear here...</span>
            </div>
        </div>

        <!-- Response Metadata -->
        <div id="llm-test-metadata" class="text-muted small">
            <!-- Model info and timestamp will appear here -->
        </div>
    </div>
</div>

<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function testLLM() {
    const promptField = document.getElementById('llm-test-prompt');
    const responseField = document.getElementById('llm-test-response');
    const spinner = document.getElementById('llm-test-spinner');
    const prompt = promptField.value.trim();

    if (!prompt) {
        responseField.innerHTML = '<div class="alert alert-warning">Please enter a prompt</div>';
        return;
    }

    // Show spinner
    spinner.style.display = 'inline';
    responseField.innerHTML = '<div class="text-muted">Calling LLM...</div>';

    // Get CSRF token
    const csrftoken = getCookie('csrftoken');

    // Make request
    fetch("{% url 'bfagent:llm-live-test' object.pk %}", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrftoken
        },
        body: JSON.stringify({ prompt: prompt })
    })
    .then(response => {
        if (!response.ok) {
            return response.text().then(text => { throw new Error(text); });
        }
        return response.text();
    })
    .then(html => {
        responseField.innerHTML = html;
        spinner.style.display = 'none';
    })
    .catch(error => {
        responseField.innerHTML = '<div class="alert alert-danger">Error: ' + error.message + '</div>';
        spinner.style.display = 'none';
    });
}
</script>
