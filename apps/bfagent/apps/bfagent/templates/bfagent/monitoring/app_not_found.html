{% extends "bfagent/base.html" %}
{% load static %}

{% block title %}App Not Found - Monitoring{% endblock %}

{% block content %}
<div class="container-fluid py-4">

    <div class="text-center py-5">
        <i class="bi bi-exclamation-triangle text-warning" style="font-size: 5rem;"></i>
        <h1 class="mt-4">App Not Found</h1>
        <p class="lead text-muted">The app "{{ app_label }}" does not exist or is not installed.</p>

        <a href="{% url 'monitoring:dashboard' %}" class="btn btn-primary mt-4">
            <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
    </div>

</div>
{% endblock %}
