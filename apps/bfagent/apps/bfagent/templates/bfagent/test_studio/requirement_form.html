{% extends "bfagent/base.html" %}
{% load static %}

{% block title %}Create Test Requirement{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1><i class="bi bi-plus-circle"></i> Create Test Requirement</h1>

    <form method="post" id="requirement-form">
        {% csrf_token %}
        
        <div class="card mb-3">
            <div class="card-header">
                <h5>Basic Information</h5>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="name" class="form-label">Requirement Name *</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="domain" class="form-label">Domain *</label>
                        <select class="form-control" id="domain" name="domain" required>
                            {% for domain in available_domains %}
                            <option value="{{ domain.slug }}" {% if domain.slug == 'core' %}selected{% endif %}>
                                {{ domain.display_name }}
                            </option>
                            {% empty %}
                            <option value="core" selected>Core/Shared</option>
                            {% endfor %}
                        </select>
                        <small class="text-muted">Welcher Bereich ist betroffen?</small>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="category" class="form-label">Category *</label>
                        <select class="form-control" id="category" name="category" required>
                            <option value="feature" {% if preselect_category == 'feature' %}selected{% endif %}>Feature Requirement</option>
                            <option value="bug_fix" {% if preselect_category == 'bug_fix' %}selected{% endif %}>Bug Fix</option>
                            <option value="enhancement" {% if preselect_category == 'enhancement' %}selected{% endif %}>Enhancement</option>
                            <option value="performance" {% if preselect_category == 'performance' %}selected{% endif %}>Performance</option>
                            <option value="security" {% if preselect_category == 'security' %}selected{% endif %}>Security</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="priority" class="form-label">Priority *</label>
                        <select class="form-control" id="priority" name="priority" required>
                            <option value="critical">Critical - Must Test</option>
                            <option value="high">High - Should Test</option>
                            <option value="medium" selected>Medium - Nice to Test</option>
                            <option value="low">Low - Optional</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5>Acceptance Criteria (Gherkin Format)</h5>
                <button type="button" class="btn btn-sm btn-primary" onclick="addCriterion()">
                    <i class="bi bi-plus"></i> Add Criterion
                </button>
            </div>
            <div class="card-body">
                <div id="criteria-container"></div>
            </div>
        </div>

        <input type="hidden" id="acceptance_criteria" name="acceptance_criteria" value="[]">

        <div class="d-flex justify-content-between">
            <a href="{% url 'bfagent:requirements-list' %}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Cancel
            </a>
            <button type="submit" class="btn btn-success">
                <i class="bi bi-check-circle"></i> Create Requirement
            </button>
        </div>
    </form>
</div>

<script>
let criteriaCount = 0;
let criteria = [];

function addCriterion() {
    const index = criteriaCount++;
    const html = `
        <div class="card mb-3 criterion-card" id="criterion-${index}">
            <div class="card-header bg-light d-flex justify-content-between align-items-center">
                <h6 class="mb-0">Scenario ${index + 1}</h6>
                <button type="button" class="btn btn-sm btn-danger" onclick="removeCriterion(${index})">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
            <div class="card-body">
                <div class="mb-2">
                    <label class="form-label fw-bold">Scenario Name *</label>
                    <input type="text" class="form-control" id="scenario-${index}" 
                           placeholder="e.g., User can add feedback to chapter" required>
                </div>

                <div class="mb-2">
                    <label class="form-label fw-bold text-success">GIVEN (Preconditions)</label>
                    <textarea class="form-control" id="given-${index}" rows="2" 
                              placeholder="e.g., User is logged in and viewing chapter"></textarea>
                </div>

                <div class="mb-2">
                    <label class="form-label fw-bold text-primary">WHEN (Action)</label>
                    <textarea class="form-control" id="when-${index}" rows="2" 
                              placeholder="e.g., User clicks add comment button"></textarea>
                </div>

                <div class="mb-2">
                    <label class="form-label fw-bold text-warning">THEN (Expected Result)</label>
                    <textarea class="form-control" id="then-${index}" rows="2" 
                              placeholder="e.g., Comment form should appear"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <label class="form-label">Test Type</label>
                        <select class="form-control" id="test-type-${index}">
                            <option value="ui">UI Test</option>
                            <option value="api">API Test</option>
                            <option value="integration">Integration Test</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Priority</label>
                        <select class="form-control" id="priority-${index}">
                            <option value="critical">Critical</option>
                            <option value="high">High</option>
                            <option value="medium" selected>Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    document.getElementById('criteria-container').insertAdjacentHTML('beforeend', html);
}

function removeCriterion(index) {
    const element = document.getElementById(`criterion-${index}`);
    if (element) {
        element.remove();
    }
}

function collectCriteria() {
    criteria = [];
    const cards = document.querySelectorAll('.criterion-card');
    
    cards.forEach((card, idx) => {
        const index = card.id.split('-')[1];
        const scenario = document.getElementById(`scenario-${index}`).value;
        const given = document.getElementById(`given-${index}`).value;
        const when = document.getElementById(`when-${index}`).value;
        const then = document.getElementById(`then-${index}`).value;
        const testType = document.getElementById(`test-type-${index}`).value;
        const priority = document.getElementById(`priority-${index}`).value;
        
        if (scenario && given && when && then) {
            criteria.push({
                id: `ac_${idx + 1}`,
                scenario: scenario,
                given: given,
                when: when,
                then: then,
                test_type: testType,
                priority: priority
            });
        }
    });
    
    document.getElementById('acceptance_criteria').value = JSON.stringify(criteria);
    return criteria.length > 0;
}

document.getElementById('requirement-form').addEventListener('submit', function(e) {
    if (!collectCriteria()) {
        e.preventDefault();
        alert('Please add at least one acceptance criterion with all fields filled!');
        return false;
    }
});

// Add first criterion on load
window.addEventListener('load', function() {
    addCriterion();
});
</script>
{% endblock %}
