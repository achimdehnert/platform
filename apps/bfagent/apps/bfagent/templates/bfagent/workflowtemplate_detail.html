{% extends "base.html" %}
{% load static %}

{% block title %}WorkflowTemplate Detail{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-eye"></i> WorkflowTemplate Detail</h1>
        <div>
            <a href="{% url 'bfagent:workflowtemplate-list' %}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Back to List
            </a>
            <a href="{% url 'bfagent:workflowtemplate-update' object.pk %}" class="btn btn-primary">
                <i class="bi bi-pencil"></i> Edit
            </a>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-3"><strong>Name:</strong></div>
                <div class="col-md-9">{{ object.name }}</div>
            </div>
            <div class="row mb-3">
                <div class="col-md-3"><strong>Book Type:</strong></div>
                <div class="col-md-9">{{ object.book_type }}</div>
            </div>
        </div>
        <div class="card-footer">
            <a href="{% url 'bfagent:workflowtemplate-delete' object.pk %}" class="btn btn-danger">
                <i class="bi bi-trash"></i> Delete
            </a>
        </div>
    </div>
</div>
{% endblock %}
