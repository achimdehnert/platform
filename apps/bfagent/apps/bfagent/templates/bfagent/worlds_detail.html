{% extends "base.html" %}
{% load static %}

{% block title %}Worlds Detail{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-eye"></i> Worlds Detail</h1>
        <div>
            <a href="{% url 'bfagent:world-list' %}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Back to List
            </a>
            <a href="{% url 'bfagent:world-update' object.pk %}" class="btn btn-primary">
                <i class="bi bi-pencil"></i> Edit
            </a>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-3"><strong>Name:</strong></div>
                <div class="col-md-9">{{ object.name }}</div>
            </div>
            <div class="row mb-3">
                <div class="col-md-3"><strong>World Type:</strong></div>
                <div class="col-md-9">{{ object.world_type }}</div>
            </div>
            <div class="row mb-3">
                <div class="col-md-3"><strong>Project:</strong></div>
                <div class="col-md-9">{{ object.project }}</div>
            </div>
            <div class="row mb-3">
                <div class="col-md-3"><strong>Created At:</strong></div>
                <div class="col-md-9">{{ object.created_at }}</div>
            </div>
        </div>
        <div class="card-footer">
            <a href="{% url 'bfagent:world-delete' object.pk %}" class="btn btn-danger">
                <i class="bi bi-trash"></i> Delete
            </a>
        </div>
    </div>
</div>
{% endblock %}
