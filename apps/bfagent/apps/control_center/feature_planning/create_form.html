<div class="modal-header">
    <h5 class="modal-title">Create New Feature</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<form hx-post="{% url 'control_center:feature-planning-create' %}" hx-target="#modal-content">
    {% csrf_token %}
    <div class="modal-body">
        <div class="mb-3">
            <label for="name" class="form-label">Feature Name *</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>
        
        <div class="mb-3">
            <label for="component_type" class="form-label">Type *</label>
            <select class="form-select" id="component_type" name="component_type" required>
                {% for type_code, type_label in available_types %}
                <option value="{{ type_code }}">{{ type_label }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="mb-3">
            <label for="domain" class="form-label">Domain</label>
            <select class="form-select" id="domain" name="domain">
                <option value="">Select domain...</option>
                {% for domain_id, domain_name in available_domains %}
                <option value="{{ domain_id }}">{{ domain_name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="mb-3">
            <label for="priority" class="form-label">Priority</label>
            <select class="form-select" id="priority" name="priority">
                <option value="backlog">📦 Backlog</option>
                <option value="low">🔵 Low</option>
                <option value="medium" selected>🟡 Medium</option>
                <option value="high">🔴 High</option>
                <option value="critical">🔥 Critical</option>
            </select>
        </div>
        
        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" name="description" rows="4"></textarea>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary">Create Feature</button>
    </div>
</form>
