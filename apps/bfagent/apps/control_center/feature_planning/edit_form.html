<div class="modal-header">
    <h5 class="modal-title">Edit Feature: {{ feature.name }}</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<form hx-post="{% url 'control_center:feature-planning-update' feature.pk %}" hx-target="#modal-content">
    {% csrf_token %}
    <div class="modal-body">
        <div class="mb-3">
            <label for="name" class="form-label">Feature Name *</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ feature.name }}" required>
        </div>
        
        <div class="mb-3">
            <label for="status" class="form-label">Status *</label>
            <select class="form-select" id="status" name="status" required>
                {% for status_code, status_label in available_statuses %}
                <option value="{{ status_code }}" {% if status_code == feature.status %}selected{% endif %}>{{ status_label }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="mb-3">
            <label for="domain" class="form-label">Domain</label>
            <select class="form-select" id="domain" name="domain">
                <option value="">Select domain...</option>
                {% for domain_id, domain_name in available_domains %}
                <option value="{{ domain_id }}" {% if domain_id == feature.domain %}selected{% endif %}>{{ domain_name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="mb-3">
            <label for="priority" class="form-label">Priority</label>
            <select class="form-select" id="priority" name="priority">
                <option value="backlog" {% if feature.priority == 'backlog' %}selected{% endif %}>📦 Backlog</option>
                <option value="low" {% if feature.priority == 'low' %}selected{% endif %}>🔵 Low</option>
                <option value="medium" {% if feature.priority == 'medium' %}selected{% endif %}>🟡 Medium</option>
                <option value="high" {% if feature.priority == 'high' %}selected{% endif %}>🔴 High</option>
                <option value="critical" {% if feature.priority == 'critical' %}selected{% endif %}>🔥 Critical</option>
            </select>
        </div>
        
        <div class="mb-3">
            <label for="owner" class="form-label">Owner</label>
            <select class="form-select" id="owner" name="owner">
                <option value="">Unassigned</option>
                {% for user in available_users %}
                <option value="{{ user.pk }}" {% if feature.owner and feature.owner.pk == user.pk %}selected{% endif %}>{{ user.username }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" name="description" rows="4">{{ feature.description }}</textarea>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary">Update Feature</button>
    </div>
</form>
