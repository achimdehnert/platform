<div class="col-md-6 col-lg-4">
    <div class="card h-100 shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="badge bg-{{ initiative.priority }}">{{ initiative.get_priority_display }}</span>
            <span class="badge bg-secondary">{{ initiative.domain }}</span>
        </div>
        <div class="card-body">
            <h5 class="card-title">
                <a href="{% url 'control_center:initiative-detail' pk=initiative.pk %}" class="text-decoration-none">
                    {{ initiative.title }}
                </a>
            </h5>
            <p class="card-text text-muted small">{{ initiative.description|truncatewords:20 }}</p>
            <span class="badge 
                {% if initiative.status == 'completed' %}bg-success
                {% elif initiative.status == 'in_progress' %}bg-primary
                {% elif initiative.status == 'analysis' %}bg-info
                {% elif initiative.status == 'concept' %}bg-warning text-dark
                {% else %}bg-secondary{% endif %}">
                {{ initiative.get_status_display }}
            </span>
        </div>
    </div>
</div>
