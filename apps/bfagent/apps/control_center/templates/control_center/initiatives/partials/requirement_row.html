<div class="list-group-item d-flex justify-content-between align-items-center">
    <div>
        <span class="badge 
            {% if requirement.status == 'done' or requirement.status == 'completed' %}bg-success
            {% elif requirement.status == 'in_progress' %}bg-primary
            {% else %}bg-secondary{% endif %} me-2">
            {{ requirement.get_status_display }}
        </span>
        <a href="{% url 'control_center:test-studio-requirement-detail' pk=requirement.pk %}">
            {{ requirement.name }}
        </a>
        <small class="text-muted ms-2">{{ requirement.category }}</small>
    </div>
    <span class="badge bg-{{ requirement.priority }}">{{ requirement.get_priority_display }}</span>
</div>
