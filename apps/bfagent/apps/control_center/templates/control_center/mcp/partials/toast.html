{# Toast Partial - Injected via OOB swap #}
<div class="toast show align-items-center text-bg-{{ level }} border-0" 
     role="alert" 
     aria-live="assertive" 
     aria-atomic="true"
     hx-swap-oob="afterbegin:#toast-container">
    <div class="d-flex">
        <div class="toast-body">
            <span class="me-2">{{ icon }}</span>
            {{ message }}
        </div>
        <button type="button" 
                class="btn-close btn-close-white me-2 m-auto" 
                data-bs-dismiss="toast" 
                aria-label="Close"
                onclick="this.closest('.toast').remove()"></button>
    </div>
</div>

<script>
// Auto-remove toast after 5 seconds
(function() {
    const toast = document.querySelector('#toast-container .toast:last-child');
    if (toast) {
        setTimeout(() => toast.remove(), 5000);
    }
})();
</script>
