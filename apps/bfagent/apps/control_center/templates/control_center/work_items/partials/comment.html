<div class="border-bottom pb-3 mb-3">
    <div class="d-flex justify-content-between align-items-start mb-2">
        <div>
            <span class="badge bg-{% if comment.comment_type == 'blocker' %}danger{% elif comment.comment_type == 'solution' %}success{% elif comment.comment_type == 'question' %}warning{% else %}secondary{% endif %} me-2">
                {{ comment.get_comment_type_display }}
            </span>
            <strong>{% if comment.author %}{{ comment.author.username }}{% else %}Cascade AI{% endif %}</strong>
            {% if comment.is_from_cascade %}
            <span class="badge bg-info">🤖 AI</span>
            {% endif %}
        </div>
        <small class="text-muted">{{ comment.created_at|timesince }} ago</small>
    </div>
    <div class="ps-2">
        {{ comment.content|linebreaks }}
    </div>
    {% if comment.screenshot %}
    <div class="mt-2">
        <a href="{{ comment.screenshot.url }}" target="_blank">
            <img src="{{ comment.screenshot.url }}" alt="Screenshot" class="img-thumbnail" style="max-height: 200px;">
        </a>
    </div>
    {% endif %}
</div>
