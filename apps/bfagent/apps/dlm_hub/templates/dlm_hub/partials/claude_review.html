<div class="card">
  <div class="card-header bg-primary text-white">
    <i class="bi bi-robot me-2"></i>Claude Review Prompt
  </div>
  <div class="card-body">
    {% if review %}
    <pre class="bg-light p-3 rounded small dlm-review-prompt">{{ review.prompt }}</pre>
    {% else %}
    <p class="text-muted">Could not generate review</p>
    {% endif %}
  </div>
</div>
