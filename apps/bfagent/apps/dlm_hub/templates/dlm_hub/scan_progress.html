{% extends "base.html" %}
{% load static %}

{% block title %}DLM Hub - Scan in Progress{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'dlm_hub/css/dlm_hub.css' %}">
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">
            <i class="bi bi-search me-2"></i>Documentation Scan
          </h5>
        </div>
        <div class="card-body text-center p-5"
             id="scan-status"
             hx-get="{% url 'dlm_hub:htmx-scan-status' run.id %}"
             hx-trigger="every 2s"
             hx-swap="innerHTML">
          {% include "dlm_hub/partials/scan_status.html" %}
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
