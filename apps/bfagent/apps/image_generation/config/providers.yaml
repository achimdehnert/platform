# Image Generation Provider Configuration
# =========================================
# Configuration for all image generation providers

providers:
  # OpenAI DALL-E 3 Configuration
  openai:
    enabled: true
    api_key_env: "OPENAI_API_KEY"  # Environment variable name
    model: "dall-e-3"
    default_size: "1024x1024"
    default_quality: "standard"
    default_style: "vivid"
    timeout_seconds: 60
    max_retries: 3
    retry_delay_seconds: 1.0
    rate_limit_per_minute: 5
    
    # Cost tracking (in cents)
    pricing:
      standard:
        "1024x1024": 4.0
        "1792x1024": 8.0
        "1024x1792": 8.0
      hd:
        "1024x1024": 8.0
        "1792x1024": 12.0
        "1024x1792": 12.0
    
    # Supported parameters
    supported_sizes:
      - "1024x1024"
      - "1792x1024"
      - "1024x1792"
    
    supported_qualities:
      - "standard"
      - "hd"
    
    supported_styles:
      - "vivid"
      - "natural"

  # Stability AI Configuration
  stability:
    enabled: true
    api_key_env: "STABILITY_API_KEY"
    model: "sd3"
    default_aspect_ratio: "1:1"
    default_quality: "standard"
    timeout_seconds: 60
    max_retries: 3
    retry_delay_seconds: 1.0
    rate_limit_per_minute: 10
    
    # Cost tracking (in cents)
    pricing:
      sd3: 3.5
      sd3-turbo: 2.0
    
    # Supported parameters
    supported_aspect_ratios:
      - "16:9"
      - "1:1"
      - "21:9"
      - "2:3"
      - "3:2"
      - "4:5"
      - "5:4"
      - "9:16"
      - "9:21"
    
    supported_models:
      - "sd3"
      - "sd3-turbo"
    
    style_presets:
      - "3d-model"
      - "analog-film"
      - "anime"
      - "cinematic"
      - "comic-book"
      - "digital-art"
      - "enhance"
      - "fantasy-art"
      - "isometric"
      - "line-art"
      - "low-poly"
      - "modeling-compound"
      - "neon-punk"
      - "origami"
      - "photographic"
      - "pixel-art"
      - "tile-texture"

# Provider Manager Configuration
manager:
  # Selection strategy: cheapest, fastest, priority, round_robin, random
  selection_strategy: "priority"
  
  # Enable automatic fallback to other providers on failure
  enable_fallback: true
  
  # Priority order (first = highest priority)
  priority_order:
    - "openai"
    - "stability"
  
  # Max parallel generations
  max_parallel: 3

# Handler Configuration
handlers:
  # Illustration Handler
  illustration:
    max_parallel: 3
    save_images: true
    add_metadata: true
    quality: "standard"
    default_provider: "openai"
  
  # Single Image Handler
  single_image:
    save_images: true
    default_provider: "auto"
  
  # Batch Image Handler
  batch_image:
    distribute_load: true
    default_provider: "auto"

# Storage Configuration
storage:
  # Base directory for generated images
  base_directory: "./generated_images"
  
  # Directory structure
  directory_structure:
    illustrations: "illustrations/{book_id}/chapter_{chapter_id}"
    generic: "images/{date}"
  
  # File naming
  naming_patterns:
    illustration: "illustration_{chapter}_{scene:02d}.png"
    generic: "image_{index:03d}_{timestamp}.png"

# Logging Configuration
logging:
  level: "INFO"
  format: "json"  # or "console"
  file: "./logs/image_generation.log"
  
  # What to log
  log_prompts: true
  log_costs: true
  log_timing: true
  log_errors: true

# Monitoring & Metrics
monitoring:
  enabled: true
  track_costs: true
  track_performance: true
  alert_on_failure: false
  
  # Cost alerts
  cost_alerts:
    daily_limit_cents: 1000  # Alert if daily cost exceeds $10
    per_image_limit_cents: 20  # Alert if single image costs >$0.20

# Development Settings
development:
  dry_run: false  # Set to true to skip actual API calls
  mock_responses: false  # Use mock responses for testing
  save_debug_info: true  # Save detailed debug information
