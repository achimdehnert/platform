<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UI Hub - HTMX Guardrails{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .severity-badge-error { background-color: #dc3545; }
        .severity-badge-warning { background-color: #ffc107; color: #000; }
        .severity-badge-info { background-color: #17a2b8; }
        .code-block { background-color: #f8f9fa; padding: 1rem; border-radius: 4px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'ui_hub:dashboard' %}">🎨 UI Hub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'ui_hub:dashboard' %}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'ui_hub:rules_list' %}">Rules</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'ui_hub:violations_list' %}">Violations</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'ui_hub:patterns_list' %}">HTMX Patterns</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/ui_hub/">Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
