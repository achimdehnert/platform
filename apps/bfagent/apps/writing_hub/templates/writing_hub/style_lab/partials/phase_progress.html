<div class="d-flex justify-content-between mb-2">
    {% for phase_key, phase_label in phases %}
    <div class="text-center flex-fill">
        <div class="rounded-circle mx-auto mb-1 d-flex align-items-center justify-content-center
            {% if forloop.counter0 < current_phase_idx %}bg-success text-white
            {% elif forloop.counter0 == current_phase_idx %}bg-primary text-white
            {% else %}bg-light text-muted{% endif %}"
            style="width: 32px; height: 32px;">
            {% if forloop.counter0 < current_phase_idx %}
            <i class="bi bi-check"></i>
            {% else %}
            {{ forloop.counter }}
            {% endif %}
        </div>
        <small class="{% if forloop.counter0 == current_phase_idx %}fw-bold{% else %}text-muted{% endif %}">
            {{ phase_label }}
        </small>
    </div>
    {% if not forloop.last %}
    <div class="flex-fill d-flex align-items-center" style="max-width: 50px;">
        <hr class="w-100 {% if forloop.counter0 < current_phase_idx %}border-success{% endif %}">
    </div>
    {% endif %}
    {% endfor %}
</div>
