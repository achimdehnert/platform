{% load static %}
<div class="sentence-row list-group-item border-start-0 border-end-0 {% if sentence.rating %}rated-{{ sentence.rating }}{% endif %}"
     id="sentence-{{ sentence.index }}">
    <div class="d-flex justify-content-between align-items-start">
        <div class="flex-grow-1 me-3">
            <span class="text-muted small me-2">#{{ sentence.index|add:1 }}</span>
            <span class="sentence-text">{{ sentence.text }}</span>
            {% if sentence.feedback.pattern_tag %}
            <span class="badge bg-info-subtle text-info ms-2">{{ sentence.feedback.pattern_tag }}</span>
            {% endif %}
            {% if sentence.feedback.comment %}
            <div class="small text-muted mt-1">
                <i class="bi bi-chat-left-text me-1"></i>{{ sentence.feedback.comment }}
            </div>
            {% endif %}
        </div>
        <div class="btn-group btn-group-sm flex-shrink-0">
            <button type="button" 
                    class="btn {% if sentence.rating == 'accepted' %}btn-success{% else %}btn-outline-success{% endif %}"
                    hx-post="{% url 'writing_hub:htmx-sentence-feedback' candidate_id=candidate.id sentence_index=sentence.index %}"
                    hx-vals='{"rating": "accepted"}'
                    hx-target="#sentence-{{ sentence.index }}"
                    hx-swap="outerHTML"
                    hx-trigger="click"
                    hx-on::after-request="htmx.trigger(document.body, 'feedbackUpdated')">
                ✅
            </button>
            <button type="button" 
                    class="btn {% if sentence.rating == 'partial' %}btn-warning{% else %}btn-outline-warning{% endif %}"
                    hx-post="{% url 'writing_hub:htmx-sentence-feedback' candidate_id=candidate.id sentence_index=sentence.index %}"
                    hx-vals='{"rating": "partial"}'
                    hx-target="#sentence-{{ sentence.index }}"
                    hx-swap="outerHTML"
                    hx-trigger="click"
                    hx-on::after-request="htmx.trigger(document.body, 'feedbackUpdated')">
                ⚠️
            </button>
            <button type="button" 
                    class="btn {% if sentence.rating == 'rejected' %}btn-danger{% else %}btn-outline-danger{% endif %}"
                    hx-post="{% url 'writing_hub:htmx-sentence-feedback' candidate_id=candidate.id sentence_index=sentence.index %}"
                    hx-vals='{"rating": "rejected"}'
                    hx-target="#sentence-{{ sentence.index }}"
                    hx-swap="outerHTML"
                    hx-trigger="click"
                    hx-on::after-request="htmx.trigger(document.body, 'feedbackUpdated')">
                ❌
            </button>
        </div>
    </div>
    
    <!-- Optionales Kommentar-Formular (ausklappbar) -->
    {% if sentence.rating %}
    <div class="mt-2 pt-2 border-top">
        <form hx-post="{% url 'writing_hub:htmx-sentence-feedback' candidate_id=candidate.id sentence_index=sentence.index %}"
              hx-target="#sentence-{{ sentence.index }}"
              hx-swap="outerHTML"
              hx-trigger="submit"
              hx-on::after-request="htmx.trigger(document.body, 'feedbackUpdated')"
              class="row g-2 align-items-end">
            <input type="hidden" name="rating" value="{{ sentence.rating }}">
            <div class="col-auto">
                <input type="text" 
                       class="form-control form-control-sm" 
                       name="pattern_tag" 
                       placeholder="Pattern-Tag"
                       value="{{ sentence.feedback.pattern_tag|default:'' }}"
                       style="width: 150px;">
            </div>
            <div class="col">
                <input type="text" 
                       class="form-control form-control-sm" 
                       name="comment" 
                       placeholder="Optionaler Kommentar..."
                       value="{{ sentence.feedback.comment|default:'' }}">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-check"></i>
                </button>
            </div>
        </form>
    </div>
    {% endif %}
</div>
