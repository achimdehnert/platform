  location: "Universität, Labor"
  
  scenes:
    scene_1:
      title: "Besuch"
      location: "Universität, Flur"
      time: "Mittag"
      length: "0.5 Seiten"
      
      beats:
        - "Lena will David im Labor treffen"
        - "Sie haben sich täglich gesehen"
        - "Ihre Verbindung wächst"
        - "Heute will sie die neuesten Daten sehen"
    
    scene_2:
      title: "Überraschung"
      location: "Labor"
      time: "Mittag"
      length: "2.5 Seiten"
      
      beats:
        - "Lena betritt das Labor"
        - "David ist nicht allein"
        - "Eine Frau steht neben ihm"
        - "Elegant. Kühl. Schön."
        - "Sie lacht über etwas — berührt seinen Arm"
        - "Lena bleibt stehen"
        - "David sieht sie — sein Gesicht verändert sich"
        - "David: 'Lena! Komm rein.'"
        - "Die Frau mustert Lena"
        - "David: 'Lena, das ist Dr. Maja Lindqvist.'"
        - "Pause"
        - "David: 'Meine Verlobte.'"
        - "Lena: Lächelt. Es fühlt sich falsch an."
      
      character_introduction:
        maja:
          profession: "Neurologin, arbeitet an derselben Uni"
          appearance: "Skandinavisch, blond, kontrolliert"
          demeanor: "Freundlich, aber territorial"
          subtext: "Sie weiß, dass etwas nicht stimmt"
    
    scene_3:
      title: "Spannung"
      location: "Labor"
      time: "Mittag"
      length: "2 Seiten"
      
      beats:
        - "Smalltalk. Unangenehm."
        - "Maja: 'David hat mir von seiner Forschung erzählt.'"
        - "Maja: 'Faszinierend. Wenn auch... unkonventionell.'"
        - "Subtext: Sie hält es für Unsinn"
        - "Lena: 'Es ist mehr als unkonventionell.'"
        - "Maja: Überrascht von Lenas Ton"
        - "David: Zwischen beiden Frauen"
        - "Maja: 'Nun, ich muss los. David, wir sehen uns heute Abend?'"
        - "David: '...Ja. Natürlich.'"
        - "Maja küsst ihn auf die Wange. Sieht Lena an dabei."
        - "Geht."
      
      key_dialogue:
        maja: "Sie sind also die 'besondere Patientin', von der David erzählt hat?"
        lena: "Ich bin eine Kollegin. In gewisser Weise."
        maja: "In welcher Weise genau?"
        lena: "In der Weise, die zählt."
        david: "Maja, Lena hilft bei der Forschung. Sie hat... einzigartige Erfahrungen."
        maja: "Wie interessant."
    
    scene_4:
      title: "Danach"
      location: "Labor"
      time: "Nachmittag"
      length: "1 Seite"
      
      beats:
        - "Stille nach Majas Abgang"
        - "David: 'Es tut mir leid. Ich hätte—'"
        - "Lena: 'Du hättest was? Mir sagen sollen, dass du verlobt bist?'"
        - "David: '...Ja.'"
        - "Lena: 'Warum hast du nicht?'"
        - "David schweigt"
        - "Lena: 'Ist auch egal.'"
        - "Aber es ist nicht egal"
        - "David: 'Es ist... kompliziert. Mit Maja.'"
        - "Lena: 'Das ist es immer.'"
        - "Sie wendet sich den Daten zu"
        - "Professionelle Distanz — aber die Mauer ist dünn"
  
  chapter_hook:
    opening_line: "Sie hatte nicht erwartet, dass er allein sein würde. Aber sie hatte auch nicht erwartet, dass es so wehtun würde, dass er es nicht war."
  
  cliffhanger:
    final_line: "Sie arbeiteten den Rest des Tages nebeneinander, ohne einander zu berühren, ohne darüber zu reden. Aber die Stille zwischen ihnen war lauter als jedes Wort."
  
  romance_arc_status:
    phase: "2b — Hindernis"
    obstacle: "Verlobte etabliert"
    tension: "Hoch"
    subtext: "Beide wissen, dass da mehr ist"
  
  khoury_family_beat:
    david_mentions: "Samira und ich... wir reden nicht oft. Familiengeschichte."
    lena_notes: "Da ist mehr. Frag später."

