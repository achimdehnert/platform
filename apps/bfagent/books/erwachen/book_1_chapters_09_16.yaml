    final_line: "Sie nahm die Fotos und die Karte und verließ ihre Wohnung. Vielleicht zum letzten Mal. Und das Symbol auf der Karte brannte in ihrer Tasche wie eine Frage, die niemand beantworten konnte."
  
  thriller_subplot_development:
    escalation: "5/10 — Physischer Einbruch, konkreter Beweis"
    mystery_deepened: "Wer? Warum? Das Symbol?"
    bruecken_hueter_hint: "Das Symbol verbindet Beobachter mit Großmutter"

