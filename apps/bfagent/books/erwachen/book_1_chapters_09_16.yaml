  cliffhanger:
    final_line: "Sie schlief auf seiner Couch, und zum ersten Mal seit Wochen träumte sie nicht von Lichtern und Stimmen. Sie träumte von gar nichts. Und das war das Beste, was ihr passieren konnte."
  
