  scenes:
    scene_1:
      title: "Debatte im TV"
      location: "Wartezimmer einer Arztpraxis"
      time: "Vormittag"
      length: "2 Seiten"
      
      beats:
        - "Lena wartet (Routineuntersuchung)"
        - "TV läuft — Nachmittagsprogramm"
        - "Thema: 'Die Nano-Seelen-Theorie'"
        - "Experten streiten"
        - "Religiöse Stimmen streiten"
        - "Politiker: 'Wir brauchen Regulierung'"
        - "Wissenschaftler: 'Wir brauchen mehr Forschung'"
        - "Lena sitzt da und WEISS"
        - "Aber sie kann nichts sagen"
      
      media_content:
        moderatorin: "Was bedeutet diese Entdeckung für unseren Glauben?"
        bischof: "Dies ist ein Beweis für das, was die Kirche seit zweitausend Jahren lehrt: Der Mensch hat eine unsterbliche Seele."
        atheist: "Es beweist das Gegenteil! Die 'Seele' ist nur Chemie. Messbar. Erklärbar. Kein Wunder."
        imam: "Wir sollten vorsichtig sein, Allahs Schöpfung mit unseren begrenzten Werkzeugen zu vermessen."
        moderatorin: "Unsere Umfrage zeigt: 34% fühlen sich bestätigt, 28% verunsichert, 38% wissen nicht, was sie denken sollen."
    
    scene_2:
      title: "Normale Menschen"
      location: "Wartezimmer"
      time: "Vormittag"
      length: "1.5 Seiten"
      
      beats:
        - "Eine ältere Frau neben Lena"
        - "Schüttelt den Kopf über den TV"
        - "Frau: 'Verrückt, oder? Was die sich ausdenken.'"
        - "Lena: 'Ja. Verrückt.'"
        - "Frau: 'Seelen, Nano-Dinger... Als ob wir mehr wären als Fleisch.'"
        - "Lena schweigt"
        - "Spürt die Nano-Strukturen in sich"
        - "Sie WEISS, dass es mehr gibt"
        - "Frau: 'Sie glauben doch auch nicht dran, oder?'"
        - "Lena: 'Ich weiß nicht, was ich glaube.'"
      
      internal_conflict:
        lena_knows: "Es ist real. Sie erlebt es."
        lena_cant_say: "Wer würde ihr glauben?"
        isolation: "Umgeben von Menschen, die nicht verstehen"
    
    scene_3:
      title: "Im Café"
      location: "Café"
      time: "Mittag"
      length: "1.5 Seiten"
      
      beats:
        - "Lena trinkt Kaffee, versucht normal zu sein"
        - "Gespräche um sie herum"
        - "Tisch 1: 'Mein Therapeut sagt, das ist alles Suggestion.'"
        - "Tisch 2: 'Ich hab immer gewusst, dass es mehr gibt!'"
        - "Tisch 3: 'Die Pharma-Industrie steckt dahinter.'"
        - "Jeder hat eine Meinung"
        - "Niemand hat Ahnung"
        - "Lena fühlt sich wie eine Außerirdische unter Menschen"
      
      overheard_conversations:
        conversation_1:
          speaker: "Geschäftsmann"
          content: "Wenn die Seele messbar ist, kann man sie verkaufen."
        conversation_2:
          speaker: "Studentin"
          content: "Stell dir vor, du könntest beweisen, dass du wiedergeboren wirst!"
        conversation_3:
          speaker: "Älterer Mann"
          content: "Meine Großmutter wusste so etwas. Ohne Wissenschaft."
  
  chapter_hook:
    opening_line: "Die Welt redete über etwas, das sie nicht verstand. Und Lena saß mittendrin und konnte nicht sagen, dass sie es lebte."
  
  cliffhanger:
    final_line: "Sie verließ das Café und fragte sich, wie lange sie noch schweigen konnte. Und was passieren würde, wenn sie es nicht mehr tat."
  
  soft_scifi_themes:
    explored:
