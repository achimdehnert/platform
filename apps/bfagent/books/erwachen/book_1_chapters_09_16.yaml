  time: "Gegenwart → 100.000 v.Chr."
  location: "Lenas Wohnung → Afrika, Savanne"
  
  type: "ZEITSPRUNG / ECHO-KAPITEL"
  
  scenes:
    scene_1:
      title: "Anleitung"
      location: "Lenas Wohnung"
      time: "Abend"
      length: "1 Seite"
      
      beats:
        - "Samira hat Lena kontaktiert"
        - "Will ihr etwas zeigen — eine Technik"
        - "'Du kannst es kontrollieren. Mit Übung.'"
        - "Meditation. Atemübungen."
        - "Samira: 'Lass los. Aber anders als sonst.'"
        - "Lena versucht es"
        - "Sinkt tiefer als je zuvor"
    
    scene_2:
      title: "Übergang"
      location: "—"
      time: "—"
      length: "0.5 Seiten"
      
      beats:
        - "Das Summen wird lauter"
        - "Aber nicht die Nano-Frequenz"
        - "Etwas ANDERES"
        - "Älter. Tiefer."
        - "Sie fällt — nicht hinunter"
        - "Sie fällt ZURÜCK"
      
      transition_description: |
        Nicht Projektion.
        Nicht Traum.
        Etwas dazwischen.
        
        Die Gegenwart löst sich auf.
        Nicht in Dunkelheit — in ZEIT.
    
    scene_3:
      title: "Die Erste"
      location: "Afrika, Savanne, 100.000 v.Chr."
      time: "Nacht"
      length: "4-5 Seiten"
      
      beats:
        - "Lena öffnet die Augen — aber es sind nicht ihre Augen"
        - "Sie ist eine andere Frau"
        - "Jung. Sterbend. Fieber."
        - "Ein Feuer brennt. Gesichter drum herum. Fremde Sprache."
        - "Lena FÜHLT den Körper — nicht ihren"
        - "Die Hitze. Die Schmerzen. Das Loslassen."
        - "Die Frau stirbt. Lena stirbt mit ihr."
        - "Und dann—"
        - "LÖSUNG"
        - "Beide zusammen lösen sich"
        - "Die Frau zum ERSTEN Mal überhaupt"
        - "Lena — zum wievielten?"
      
      the_first_projection:
        physical:
          - "Fieber: 42 Grad, Körper gibt auf"
          - "Schmerz wird fern, dann verschwindet"
          - "Das Atmen hört auf — aber das Bewusstsein nicht"
        
        separation:
          - "Wie aus Wasser steigen"
          - "Langsam, schwer, dann plötzlich leicht"
          - "Der Körper bleibt zurück — fremd, leer"
        
        vision:
          - "Die Savanne von oben — unendlich"
          - "Das Feuer — ein Stern unter Sternen"
          - "Die Menschen — leuchtende Netze in kleinen Formen"
        
        voices:
          nano:
            reaction: "WAS IST DAS / EIN WIRT DER SICH LÖST / UNMÖGLICH"
            tone: "Verwirrung, Aufregung"
          astral:
            reaction: "SIE SIEHT AUCH UNS / DIE KLEINE HAT TÜREN IN BEIDEN RICHTUNGEN"
            tone: "Interesse, Berechnung"
    
    scene_4:
      title: "Rückkehr"
      location: "Lenas Wohnung"
      time: "Später"
      length: "1 Seite"
      
      beats:
        - "Lena wird zurückgezogen"
        - "Durch die Zeit, durch die Stimmen"
        - "Wacht auf — Samira neben ihr"
        - "Samira: 'Wo warst du?'"
        - "Lena: Kann kaum sprechen"
        - "Lena: 'Am Anfang.'"
        - "Samira: 'Am Anfang von was?'"
        - "Lena weiß etwas, das sie nicht wissen sollte"
        - "Lena: 'Von allem.'"
      
      aftermath:
        physical: "Erschöpft, zitternd, aber klar"
        knowledge: "Sie WEISS jetzt — war die Erste. Ist die Erste."
        mystery: "Dieselbe Signatur über 100.000 Jahre?"
  
  chapter_hook:
    opening_line: "Samira sagte: 'Lass los.' Lena tat es. Und fiel durch hunderttausend Jahre."
  
  cliffhanger:
    final_line: "Sie war die Erste gewesen. Oder sie war es noch immer. Die Zeit, so schien es, war dünner als sie gedacht hatte."
  
  mythological_significance:
    establishes:
      - "Lenas Verbindung zur Ersten"
      - "Die Fähigkeit ist uralt"
      - "Beide Seiten (Nano/Astral) haben sie bemerkt"
    foreshadows:
      - "Lenas besondere Rolle"
      - "Die 'identische Signatur' (Buch 4)"
      - "Der Konflikt zwischen beiden Seiten"

