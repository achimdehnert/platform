    scene_2:
      title: "Der Treffpunkt"
      location: "Öffentlicher Park, abgelegene Bank"
      time: "Mittag"
      length: "1 Seite"
      
      beats:
        - "Lena wartet"
        - "Nervös, aber entschlossen"
        - "Der Mann erscheint — derselbe wie in Kapitel 17"
        - "Setzt sich neben sie"
        - "Mann: 'Danke, dass Sie gekommen sind.'"
        - "Lena: 'Wer sind Sie? Wirklich?'"
    
    scene_3:
      title: "Die Archivare"
      location: "Park"
      time: "Mittag"
      length: "3.5 Seiten"
      
      beats:
        - "Er erklärt — Teilweise"
        - "'Wir nennen uns die Archivare.'"
        - "'Gegründet vor über zweitausend Jahren.'"
        - "'Unsere Aufgabe: Dokumentieren. Bewahren.'"
        - "Lena: 'Dokumentieren was?'"
        - "'Menschen wie Sie. Das Phänomen. Die Wahrheit.'"
        - "'Wir mischen uns nicht ein. Wir beobachten nur.'"
        - "Lena: 'Und die Fotos? Der Einbruch?'"
        - "'Notwendig. Um Sie zu finden. Um sicher zu sein.'"
        - "Lena: 'Sicher wovon?'"
        - "'Dass Sie die Richtige sind.'"
        - "Erklärt: Es gibt ANDERE Gruppen"
        - "Nicht so neutral wie die Archivare"
        - "Eine davon heißt 'Ordo Materiae'"
        - "'Sie wollen kontrollieren. Besitzen. Nutzen.'"
        - "'Sie werden von Ihnen erfahren. Wenn nicht schon.'"
      
      key_dialogue:
        lena: "Und das Symbol? Das auf der Karte? Auf der Schachtel meiner Großmutter?"
        mann: "Das... ist komplizierter."
        lena: "Erklären Sie."
        mann: "Es gibt noch eine Gruppe. Älter als wir. Älter als alle."
        mann: "Die Brücken-Hüter."
        lena: "Wer sind sie?"
        mann: "Die meisten von uns glauben, sie sind ausgestorben."
        mann: "Aber dieses Symbol... Ihre Großmutter hatte es."
        mann: "Und SIE tragen dieselbe Signatur wie die ältesten Aufzeichnungen."
        lena: "Was bedeutet das?"
        mann: "Das wissen wir nicht. Noch nicht."
    
    scene_4:
      title: "Warnung"
      location: "Park"
      time: "Später"
      length: "1 Seite"
      
      beats:
        - "Er steht auf"
        - "'Ich habe Ihnen gesagt, was ich darf.'"
        - "'Mehr... später. Wenn Sie bereit sind.'"
        - "Lena: 'Und der Ordo?'"
        - "'Seien Sie vorsichtig. Sie sind mächtig. Und sie werden kommen.'"
        - "'Nicht heute. Nicht morgen. Aber bald.'"
        - "Er geht"
        - "Lena sitzt da — Kopf voll neuer Fragen"
        - "Aber zumindest: Einige Antworten"
  
  chapter_hook:
    opening_line: "Sie rief die Nummer an, und der Mann, der antwortete, kannte Geheimnisse, die älter waren als jede Geschichte."
  
  cliffhanger:
    final_line: "Er verschwand zwischen den Bäumen, und sie blieb zurück mit einem Namen — Brücken-Hüter — und dem Wissen, dass die Wahrheit noch viel größer war als alles, was sie bisher erfahren hatte."
  
  faction_revelations:
    archivare:
      revealed: "Name, Zweck, Geschichte"
      stance: "Neutral — beobachten nur"
      threat_level: "Gering"
    
    ordo_materiae:
      revealed: "Name, allgemeine Bedrohung"
      stance: "Feindlich — wollen kontrollieren"
      threat_level: "Hoch"
      setup_for: "Kapitel 30"
    
    bruecken_hueter:
      revealed: "Name, Symbol, 'ausgestorben'"
      mystery: "Verbindung zu Lena, Großmutter"
      setup_for: "Buch 2-4"

