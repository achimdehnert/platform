chapter_2:
  title: "Spuren"
  pov: "Lena Vogt"
  length_pages: "4-5"
  word_count_target: "2000-2500"
  
  layer_focus:
    primary: "THRILLER"
    secondary: "Mystik"
    romance: "—"
    soft_scifi: "—"
  
  time: "Früher Morgen, ca. 06:00"
  location: "Lenas Wohnung"
  
  scenes:
    scene_1:
      title: "Erwachen"
      location: "Schlafzimmer"
      time: "06:00"
      length: "0.5 Seiten"
      
      beats:
        - "Wecker klingelt — sie hat nicht geschlafen"
        - "Nacht durchgegrübelt"
        - "Versucht, rational zu denken"
        - "Schlafentzug? Stress? Halluzination?"
        - "Entscheidet: Verdrängen. Funktionieren."
    
    scene_2:
      title: "Normalität spielen"
      location: "Küche"
      time: "06:15"
      length: "0.5 Seiten"
      
      beats:
        - "Kaffee kochen — mechanisch"
        - "Blick auf Finn's Zeichnungen am Kühlschrank"
        - "Sie muss ihn heute Nachmittag abholen"
        - "Versucht, den Alltag als Anker zu nutzen"
    
    scene_3:
      title: "Der Laptop"
      location: "Wohnzimmer"
      time: "06:30"
      length: "2-3 Seiten"
      
      beats:
        - "Will E-Mails checken"
        - "Laptop ist AN. Sie hat ihn nicht eingeschaltet."
        - "Erste Unruhe — 'Habe ich...?'"
        - "Bildschirm: Ein Foto. VON IHR."
        - "Sie liegt im Bett. Augen geschlossen. Aber... ANDERS."
        - "Ihr Gesicht ist verzerrt. Wie in Bewegung. Wie beim Lösen."
        - "Das Foto wurde HEUTE NACHT aufgenommen."
        - "Darunter Text: 'Wir sehen dich. Endlich.'"
        - "Absolute Panik"
        - "Sie löscht die Datei. Sofort."
        - "Schaut sich um. Ist jemand hier?"
        - "Durchsucht die Wohnung. Niemand."
        - "Aber die Tür — war die abgeschlossen?"
      
      thriller_elements:
        paranoia: "Jemand war hier. In meiner Wohnung. Während ich—"
        physical_reaction: "Hände zittern, Übelkeit, Fluchtinstinkt"
        denial: "Das bilde ich mir ein. Das muss ich mir einbilden."
        but: "Die Datei war real. Das Foto war real."
    
    scene_4:
      title: "Verdrängung"
      location: "Wohnung"
      time: "07:00"
      length: "1 Seite"
      
      beats:
        - "Zwingt sich zur Ruhe"
        - "Logische Erklärungen suchen"
        - "Vielleicht hat SIE das Foto gemacht? Im Halbschlaf?"
        - "Vielleicht ein Virus? Ein Hacker-Streich?"
        - "Nichts davon ergibt Sinn"
        - "Aber die Alternative ist schlimmer"
        - "Entscheidet: Ignorieren. Weitermachen."
        - "Hat heute Schicht. Muss funktionieren."
        - "Schließt alle Fenster, prüft alle Schlösser"
        - "Verlässt die Wohnung — schaut dreimal zurück"
  
  key_dialogue:
    lena_internal:
      - "Das hat jemand Anderes geschrieben. Nicht ich. JEMAND ANDERES."
      - "'Wir sehen dich.' Wer ist 'wir'?"
      - "Ich werde verrückt. Das ist die einzige Erklärung."
      - "Aber Verrückte wissen nicht, dass sie verrückt werden."
      - "Also bin ich nicht verrückt?"
      - "Oder ist DAS genau das, was Verrückte denken?"
  
  chapter_hook:
    opening_line: "Sie hatte nicht geschlafen. Aber sie hatte geträumt — wenn es ein Traum gewesen war."
  
  cliffhanger:
    final_line: "Sie schloss die Tür hinter sich und überprüfte das Schloss. Dreimal. Als ob das helfen würde gegen etwas, das Fotos von ihr machte, während sie nicht in ihrem Körper war."
  
  thriller_subplot_beat:
    establishes: "Jemand beobachtet Lena"
    mystery: "Wer? Wie? Warum?"
    escalation_level: "1/10 — Erste Andeutung"

