        lena_renate: "Angespannt, unausgesprochen"
        lena_finn: "Wärme, Liebe, Schuld"
    
    scene_2:
      title: "Autofahrt"
      location: "Auto"
      time: "16:30"
      length: "0.5 Seiten"
      
      beats:
        - "Finn erzählt vom Tag bei Oma"
        - "Lena hört zu, aber ist abgelenkt"
        - "Finn merkt es: 'Mama, hörst du zu?'"
        - "Lena: 'Natürlich, Schatz.'"
        - "Finn: Zweifelnder Blick"
    
    scene_3:
      title: "Frühstück am Abend"
      location: "Lenas Küche"
      time: "17:30"
      length: "3 Seiten"
      
      beats:
        - "Abendessen = Frühstück (ihre Tradition)"
        - "Pfannkuchen, Finns Liebling"
        - "Normale Unterhaltung — Schule, Freunde"
        - "Dann, plötzlich:"
        - "Finn: 'Mama, warum schreist du nachts?'"
        - "Lena: ERSTARRT"
        - "Lena: 'Ich... schreie?'"
        - "Finn: 'Manchmal. Und du läufst durch die Wohnung. Aber deine Augen sind zu.'"
        - "Lena: Versucht ruhig zu bleiben"
        - "Finn: 'Oma Else hatte auch schlechte Träume. Das hat mir Oma Renate erzählt.'"
        - "Lena: Herz schlägt schneller"
        - "Lena: 'Was hat sie noch erzählt?'"
        - "Finn: 'Dass ich nicht so werden soll wie ihr.'"
        - "Finn: 'Was meint sie damit, Mama?'"
        - "Lena: Keine Antwort. Noch nicht."
      
      key_dialogue:
        finn: "Oma Else hat auch geschrien nachts. Oma Renate hat geweint, wenn sie davon erzählt hat."
        lena: "Wann hat sie dir das erzählt?"
        finn: "Letzte Woche. Als du lange arbeiten musstest."
        lena_internal: "Was weiß meine Mutter? Was hat sie Finn erzählt — und mir verschwiegen?"
    
    scene_4:
      title: "Gute Nacht"
      location: "Finns Zimmer"
      time: "20:00"
      length: "1 Seite"
      
      beats:
        - "Lena bringt Finn ins Bett"
        - "Geschichte vorlesen — aber sie ist nicht bei der Sache"
        - "Finn schläft ein"
        - "Lena sitzt da. Schaut ihn an."
        - "Die Angst: Was, wenn ER es auch hat?"
        - "Erinnerung: Großmutter Else. Ihre Augen, wenn sie 'woanders' war."
        - "Lena hat es verdrängt. 20 Jahre lang."
        - "Jetzt kommt es zurück."
  
  bloodline_beat:
    establishes: "Die Fähigkeit ist erblich"
    grandmother: "Else hatte es auch"
    mother: "Renate weiß mehr als sie zugibt"
    fear: "Wird Finn es auch haben?"
  
  chapter_hook:
    opening_line: "Finn rannte auf sie zu, als hätte er sie eine Woche nicht gesehen, nicht einen Tag."
  
  cliffhanger:
    final_line: "Sie sah ihren schlafenden Sohn an und fragte sich, ob das Ding in ihrem Blut auch in seinem war. Und ob sie ihn davor beschützen konnte. Vor sich selbst."
  
  foreshadowing:
    - "Finns 'komische Träume' (Buch 5)"
    - "Großmutter Else (Buch 2: Schachtel)"
    - "Renates Geheimnis (Kapitel 7)"

