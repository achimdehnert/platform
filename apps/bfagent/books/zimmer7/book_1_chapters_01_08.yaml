# KAPITEL 1: AUSSTIEG
# ═══════════════════════════════════════════════════════════════════════════════

chapter_1:
  title: "Ausstieg"
  pov: "Lena Vogt"
  length_pages: "5-6"
  word_count_target: "2500-3000"
  
  layer_focus:
    primary: "MYSTIK"
    secondary: "Drama (Familie)"
    thriller: "—"
    romance: "—"
    soft_scifi: "—"
  
  time: "Nacht, ca. 23:00 → 03:00"
  location: "Krankenhaus → Lenas Wohnung"
  
  # ─────────────────────────────────────────────────────────────────────────────
  # SZENEN-STRUKTUR
  # ─────────────────────────────────────────────────────────────────────────────
  
  scenes:
    scene_1:
      title: "Schichtende"
      location: "Krankenhaus, Notaufnahme"
      time: "23:00"
      length: "1 Seite"
      
      beats:
        - "Lena beendet 12-Stunden-Schicht"
        - "Letzter Patient: Kind mit Fieber, Eltern panisch"
        - "Sie beruhigt, diagnostiziert, entlässt"
        - "Routiniert, professionell, müde"
        - "Kollegin: 'Geh nach Hause, du siehst fertig aus'"
      
      sensory_details:
        visual: "Grelles Neonlicht, blasse Gesichter"
        auditory: "Piepen der Monitore, gedämpfte Stimmen"
        physical: "Schwere Beine, brennende Augen"
      
      character_establishment:
        - "Lena = kompetent, fürsorglich, erschöpft"
        - "Alleinstehend (kein Ring, niemand wartet)"
        - "Ihr Leben = Arbeit"
    
    scene_2:
      title: "Heimweg"
      location: "Auto → Wohnung"
      time: "23:30"
      length: "0.5 Seiten"
      
      beats:
        - "Kurze Autofahrt, Autopilot"
        - "Blick auf Handy: Nachricht von Mutter ('Finn schläft')"
        - "Erleichterung und Schuld gleichzeitig"
        - "Wohnung: dunkel, still, einsam"
      
      internal_monologue:
        - "Wie oft hat Finn diese Woche bei Oma geschlafen?"
        - "Bin ich eine gute Mutter?"
        - "Morgen mache ich es besser. (Lüge, die sie sich oft erzählt)"
    
    scene_3:
      title: "Routine"
      location: "Wohnung"
      time: "23:45"
      length: "0.5 Seiten"
      
      beats:
        - "Mechanische Abendrituale"
        - "Duschen, Zähne putzen"
        - "Blick in Finns leeres Zimmer"
        - "Ins Bett fallen"
        - "Augen schließen — sofort erschöpft"
      
      setup_for_projection:
        - "Die Stille ist zu laut"
        - "Ihr Körper ist müde, aber etwas in ihr ist wach"
        - "Ein Summen, das sie nicht einordnen kann"
    
    scene_4:
      title: "Ausstieg"
      location: "Schlafzimmer → ???"
      time: "03:17"
      length: "2-3 Seiten"
      
      beats:
        - "Sie wacht auf — aber nicht richtig"
        - "Etwas stimmt nicht. Sie kann sich nicht bewegen."
        - "Dann: Lösung. Herausgleiten."
        - "Sie schwebt über ihrem Körper"
        - "Terror. Absolute Panik."
        - "Sie sieht sich selbst — bleich, still, fremd"
        - "Die Wohnung — aber ANDERS. Alles hat Linien."
        - "Sie will schreien — kann nicht"
        - "Etwas SIEHT sie. Etwas IST da."
        - "Zurückgerissen — wie ein Gummiband"
        - "Wacht schreiend auf"
      
      projection_description:
        phase_1_paralysis:
          physical: "Körper wie Blei, kann nichts bewegen"
          mental: "Panik, Verwirrung, 'Träume ich?'"
          duration: "Gefühlt: Minuten. Real: Sekunden."
        
        phase_2_separation:
          sensation: "Wie durch zähen Honig gezogen werden"
          sound: "Ein tiefes Summen, das von INNEN kommt"
          visual: "Zuerst verschwommen, dann schärfer als je zuvor"
        
        phase_3_observation:
          own_body: "Fremd. Hülle. Nicht-Ich."
          room: "Bekannt aber anders. Alles hat Linien — Lichtfäden."
          presence: "Etwas ANDERES ist hier. Beobachtet."
        
        phase_4_return:
          trigger: "Instinkt. Angst. Der Körper ZIEHT."
          sensation: "Brutal, gewaltsam, schmerzhaft"
          aftermath: "Schweißgebadet, zitternd, schreiend"
      
      mystik_tone:
        - "Nicht erklärend — ERLEBEND"
        - "Fragmentierte Sätze"
        - "Sensorische Überlastung"
        - "Das Unaussprechliche andeuten"
    
    scene_5:
      title: "Danach"
      location: "Schlafzimmer"
      time: "03:20"
      length: "0.5 Seiten"
      
      beats:
        - "Sitzt aufrecht, Herz rast"
        - "Tastet sich ab — 'Bin ich hier? Bin ich real?'"
        - "Licht an — alles normal"
        - "Aber das Summen ist noch da. Leiser."
        - "Sie sagt sich: 'Nur ein Traum. Nur ein Traum.'"
        - "Glaubt es nicht."
  
  # ─────────────────────────────────────────────────────────────────────────────
  # DIALOG-AUSZÜGE
  # ─────────────────────────────────────────────────────────────────────────────
  
  key_dialogue:
    hospital:
      kollegin: "Geh nach Hause, Lena. Du siehst aus wie der Tod."
      lena: "Danke für das Kompliment."
      kollegin: "Im Ernst. Wann hast du zuletzt geschlafen? Richtig geschlafen?"
      lena: "...Ich weiß nicht."
    
    post_projection:
      lena_internal: |
        Das war kein Traum.
        Das war—
        Ich weiß nicht, was das war.
        Aber es war REAL.
  
  # ─────────────────────────────────────────────────────────────────────────────
  # TECHNISCHE ELEMENTE
  # ─────────────────────────────────────────────────────────────────────────────
  
  chapter_hook:
    opening_line: "Der letzte Patient der Nacht war sieben Jahre alt und hatte Angst vor dem Sterben."
    hook_type: "Ironie — Lena beruhigt andere, kann sich selbst nicht beruhigen"
  
  cliffhanger:
    final_line: "Sie sagte sich, es war nur ein Traum. Aber das Summen in ihrem Kopf sagte etwas anderes."
    emotion: "Unruhe, Vorahnung"
  
  foreshadowing:
    - "Das Kind ist 7 — wie Finn"
    - "Das Summen wird später als Nano-Kommunikation erklärt"
    - "Die Linien = das Nano-Netzwerk"
  
  pacing:
    first_half: "Langsam, etablierend"
    second_half: "Schnell, verstörend"
    overall: "Kontrast zwischen Normalität und Übernatürlichem"

