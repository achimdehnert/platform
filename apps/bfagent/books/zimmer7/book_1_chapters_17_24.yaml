  location: "Straße, abends"
  
  scenes:
    scene_1:
      title: "Alltag"
      location: "Straße"
      time: "Abend"
      length: "1 Seite"
      
      beats:
        - "Lena auf dem Weg nach Hause"
        - "Sie meidet ihre Wohnung — lebt bei David (Couch)"
        - "Heute: Einkaufen, Normalität versuchen"
        - "Aber sie fühlt sich beobachtet"
        - "Seit dem Einbruch — immer"
    
    scene_2:
      title: "Ansprache"
      location: "Ruhige Seitenstraße"
      time: "Abend"
      length: "3 Seiten"
      
      beats:
        - "Ein Mann tritt aus dem Schatten"
        - "Ruhig. Nicht bedrohlich. Aber bestimmt."
        - "Mann: 'Frau Vogt. Wir müssen reden.'"
        - "Lena: Fluchtinstinkt — aber er blockiert nicht"
        - "Mann: 'Bitte. Ich will Ihnen nicht schaden.'"
        - "Lena: 'Wer sind Sie?'"
        - "Mann: 'Jemand, der Sie seit langem beobachtet.'"
        - "Lena: 'Das Foto. Der Einbruch. Das waren Sie?'"
        - "Mann: 'Ja. Und nein. Es ist kompliziert.'"
        - "Er erklärt — teilweise"
        - "'Es gibt... Gruppen. Die wissen, was Sie sind.'"
        - "'Wir beobachten seit Jahren. Generationen.'"
        - "'Sie sind besonders. Mehr als die anderen.'"
        - "Lena: 'Was wollen Sie von mir?'"
        - "Mann: 'Im Moment? Nur, dass Sie wissen: Sie sind nicht allein.'"
        - "'Aber andere werden kommen. Die nicht so freundlich sind.'"
      
      key_dialogue:
        lena: "Wer sind die anderen?"
        mann: "Später. Wenn Sie bereit sind."
        lena: "Bereit wofür?"
        mann: "Zu verstehen, was Sie wirklich sind."
        lena: "Ich weiß, was ich bin."
        mann: "Nein. Sie wissen, was Sie ERLEBEN. Das ist nicht dasselbe."
    
    scene_3:
      title: "Karte"
      location: "Straße"
      time: "Abend"
      length: "1 Seite"
      
      beats:
        - "Er gibt ihr eine Karte"
        - "Nur eine Telefonnummer"
        - "Mann: 'Wenn Sie Fragen haben. Wenn Sie Hilfe brauchen.'"
        - "Mann: 'Und Frau Vogt? Passen Sie auf Ihren Sohn auf.'"
        - "Lena: ERSTARRT"
        - "Lena: 'Woher wissen Sie—'"
        - "Mann: 'Wir wissen vieles. Zum Glück für Sie — wir sind nicht die Einzigen.'"
        - "Er geht"
        - "Verschwindet in der Dunkelheit"
        - "Lena steht da — Karte in der Hand, Herz rasend"
    
    scene_4:
      title: "Panik"
      location: "Straße / Telefon"
      time: "Minuten später"
      length: "1 Seite"
      
      beats:
        - "Lena ruft ihre Mutter an"
        - "Renate: 'Hallo?'"
        - "Lena: 'Mama. Ist Finn bei dir? Ist er sicher?'"
        - "Renate: 'Ja, natürlich. Was ist los?'"
        - "Lena: 'Nichts. Ich... ich wollte nur hören.'"
        - "Renate: 'Lena, du machst mir Angst.'"
        - "Lena: 'Alles okay. Ich ruf morgen an.'"
        - "Legt auf"
        - "Nichts ist okay"
  
  chapter_hook:
    opening_line: "Sie hatte gewusst, dass sie kommen würden. Sie hatte nur nicht gewusst, wann — oder was sie sagen würden."
  
  cliffhanger:
    final_line: "'Passen Sie auf Ihren Sohn auf.' Die Worte hallten nach, lange nachdem der Mann verschwunden war. Und Lena wusste: Das war keine Warnung. Das war eine Drohung — oder ein Versprechen. Sie wusste nur nicht, von wem."
  
  thriller_development:
    escalation: "6/10"
    reveals:
      - "Mehrere Gruppen existieren"
      - "Sie beobachten seit Generationen"
      - "Lena ist 'besonders'"
      - "Finn ist bekannt"
    mystery_deepened:
      - "Wer ist der Mann?"
      - "Welche 'anderen' kommen?"
      - "Was ist die volle Wahrheit?"

