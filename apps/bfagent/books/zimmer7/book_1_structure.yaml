      bloodline_beat: "Erste Andeutung der Lena-Linie"
      
    - number: 4
      title: "Normal"
      pov: "Lena"
      length: "5-6 Seiten"
      location: "Krankenhaus, Alltag"
      time: "1-2 Wochen später"
      
      layers:
        soft_scifi: "████"
        thriller: "████"
        mystik: "████"
        drama: "████"
      
      content:
        summary: "Versuch der Normalität — aber die Risse zeigen sich"
        beats:
          - "Alltag im Krankenhaus — sie funktioniert"
          - "Aber: Mikro-Momente des Unheimlichen"
          - "Patienten-Blicke — sehen die etwas?"
          - "Kollegin: 'Du siehst müde aus'"
