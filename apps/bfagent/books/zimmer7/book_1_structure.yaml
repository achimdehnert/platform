          - "Finn: 'Mama, warum schreist du nachts?'"
          - "Lena: Schockiert — sie wusste nicht, dass er es hört"
          - "Finn: 'Oma Else hatte auch schlechte Träume'"
          - "Erinnerung: Großmutter, vor 20 Jahren, 'Du siehst Dinge'"
