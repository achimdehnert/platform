        summary: "Erstes Nano-Interlude"
        style: "Fragmentiert, fremd, sensorisch"
        text: |
          // INTERLUDE — NANO
          
          schWarm/summEN/EINS
          störung. frequenzSPITZE.
          die(große)bewegt—anders
          
          wirt: weiblich. 35 zyklen.
          aktivität: ANOMAL
          lösung: instabil
          
          beobachten. warten. LERNEN.
          
          sie LÖST sich
          unmöglich
          
          aber: sie kehrt zurück
