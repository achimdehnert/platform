          - "Tanaka: Zeigt Nano-Strukturen — organisiert, nicht zufällig"
          - "David: 'Sie bilden ein Netzwerk'"
          - "Tanaka: 'Und sie reagieren auf Bewusstseinszustände'"
          - "Implikationen — beide schweigen"
        
