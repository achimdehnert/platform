# ═══════════════════════════════════════════════════════════════════════════════
# NANO-SEIN: BUCH 1 — ERWACHEN
# Detaillierte Struktur mit Vier-Schichten-Architektur
# ═══════════════════════════════════════════════════════════════════════════════

book_1:
  title: "Erwachen"
  series_position: 1
  estimated_length: "85.000-95.000 Wörter"
  chapters: 32
  timespan: "~6 Monate"

  # ─────────────────────────────────────────────────────────────────────────────
  # VIER-SCHICHTEN-ARCHITEKTUR
  # ─────────────────────────────────────────────────────────────────────────────
  
  layer_architecture:
    thriller:
      percentage: 30
      focus: "Bedrohung, Mystery, Stakes"
      tone: "Paranoia-Thriller, nicht Action"
      elements:
        - "Beobachter-Subplot (wer? warum?)"
        - "Eskalation der Bedrohung"
        - "Finns Sicherheit als ultimativer Stake"
      subplot: |
        Jemand beobachtet Lena von Anfang an.
        Kap 2: Foto auf Laptop
        Kap 6: Auto folgt ihr
        Kap 9: Jemand fragt im Krankenhaus
        Kap 13: Einbruch — nichts fehlt, aber etwas hinzugefügt
        Kap 17: Offene Ansprache
        Kap 22: Finn fotografiert (Drohung)
        Kap 26: Konfrontation — Archivar enthüllt sich
        Kap 30: Zweite Gruppe (Ordo) greift ein

    romance:
      percentage: 25
      focus: "Beziehung, Vertrauen, Intimität"
      tone: "Erwachsene Verletzlichkeit, Slow Burn"
      elements:
        - "Lena/David: Beide haben Narben"
        - "Vertrauen zuerst, Anziehung folgt"
        - "Hindernis: Beiderseitige Verletzlichkeit"
      arc: |
        Phase 1: Begegnung (Kap 8-12)
        - Erste Begegnung — professionell, Funke
        - Er glaubt ihr — intimer als Berührung
        - Seine Geschichte (Mali)
        
        Phase 2: Nähe (Kap 15-22)
        - Gemeinsame Zeit, Suche
        - Fast-Momente — unterbrochen
        - Hindernis (Verlobte? Beruf? Angst?)
        
        Phase 3: Entscheidung (Kap 25-32)
        - Krise bringt Klarheit
        - Er wählt sie (zu glauben)
        - Erstes Eingestehen
        ENDE: Offen, aber Fundament

    soft_scifi:
      percentage: 30
      focus: "Gesellschaft, Ethik, Konsequenzen"
      tone: "Nachdenklich, keine einfachen Antworten"
      questions:
        - "Wem gehört die Entdeckung?"
        - "Was bedeutet es für Religion?"
        - "Was bedeutet es für Individuen?"
        - "Wer kontrolliert die Narrative?"
      elements:
        - "Tanaka-POV im Labor"
        - "Medien-Reaktionen"
        - "Religiöse Stimmen"
        - "Ethische Debatten"

    mystik:
      percentage: 25
      focus: "Transzendenz, Staunen, das Numinose"
      tone: "Ehrfurcht, Grauen, das Unsagbare"
      elements:
        - "Projektionen als sensorische Erfahrung"
        - "Zeitsprünge als Verbindung"
        - "Die zwei Präsenzen (Nano/Astral)"
        - "Grenze der Sprache"
      progression: |
        Projektion 1: Chaos, Angst, keine Kontrolle
        Projektion 2: Beginnt zu SEHEN
        Projektion 3: Zwei Ebenen unterscheidbar
        Projektion 4: Erste bewusste Navigation
        Projektion 5: Kontakt — mit WEM?

  # ─────────────────────────────────────────────────────────────────────────────
  # STRANG-STRUKTUR
  # ─────────────────────────────────────────────────────────────────────────────
  
  narrative_strands:
    individuum:
      percentage: 55
      pov_characters: ["Lena", "David"]
      focus: "Emotionaler Kern, Identifikation"
      
    menschheit:
      percentage: 25
      pov_characters: ["Tanaka", "Marcus"]
      focus: "Gesellschaftliche Reaktion, Debatte"
      
    nano_individuum:
      percentage: 10
      style: "Fragmentiert, sensorisch, zeitlos"
      focus: "Andeutung, Fremdartigkeit"
      
    astral_praesenz:
      percentage: 10
      style: "Poetisch, lockend, fremd"
      focus: "Andeutung, Alternative zu Nano"

  # ─────────────────────────────────────────────────────────────────────────────
  # DREI-AKT-STRUKTUR
  # ─────────────────────────────────────────────────────────────────────────────
  
  act_1:
    name: "RISSE"
    chapters: "1-10"
    percentage: "30%"
    
    goals:
      - "Lenas normale Welt etablieren"
      - "Erste Projektionen (2 Stück)"
      - "Beobachter einführen"
      - "David/Tanaka einführen"
      - "Wissenschaftliche Entdeckung"
    
    layer_balance:
      thriller: "20% — Aufbau, Unbehagen"
      romance: "15% — Begegnung, Spannung"
      soft_scifi: "35% — Entdeckung, erste Reaktionen"
      mystik: "30% — Projektionen, Interludes"
    
    turning_point: "Lena sucht Hilfe — landet bei David"
    
  act_2:
    name: "SPALTUNG"
    chapters: "11-22"
    percentage: "40%"
    
    goals:
      - "Lena/David vertiefen"
      - "Samira einführen und Konflikt"
      - "Bedrohung eskaliert"
      - "Zeitsprung: Die Erste"
      - "Beide Theorien etablieren"
    
    layer_balance:
      thriller: "30% — Eskalation, Einbruch, Ansprache"
      romance: "30% — Vertiefung, Hindernisse"
      soft_scifi: "20% — Debatte beginnt"
      mystik: "20% — Zeitsprung, zwei Präsenzen"
    
    midpoint: "David und Samira — Familienkonflikt + Theorienkonflikt"
    turning_point: "Lena erlebt etwas, das KEINE Theorie erklärt"
    
  act_3:
    name: "SCHWELLE"
    chapters: "23-32"
    percentage: "30%"
    
    goals:
      - "Konfrontation mit Beobachtern"
      - "Beide Seiten 'sprechen' zu Lena"
      - "Publikation — Welt erfährt"
      - "Lena muss wählen"
    
    layer_balance:
      thriller: "35% — Konfrontation, Enthüllung"
      romance: "25% — Entscheidung, Zusammenstehen"
      soft_scifi: "25% — Publikation, Konsequenzen"
      mystik: "15% — Finale Kommunikation, Cliffhanger"
    
    climax: "Lena zwischen zwei 'Rufen' — Nano und Astral"
    resolution: "Sie wählt zu SEHEN — aber nicht zu wählen"

  # ─────────────────────────────────────────────────────────────────────────────
  # WÄCHTER & LINIEN IN BUCH 1
  # ─────────────────────────────────────────────────────────────────────────────
  
  faction_presence:
    archivare: "Nur Andeutung — Samiras 'Kollegen'"
    ordo: "Unsichtbar strukturell (Geldfluss), Kap 30: greifen ein"
    stillen: "Unsichtbar"
    bruecken_hueter: "Unsichtbar"
  
  bloodline_presence:
    lena_linie: "Großmutter-Erinnerung (Kap 3)"
    khoury_linie: "David erwähnt Familienbruch (Kap 15)"
    tanaka_linie: "Unsichtbar"

  # ─────────────────────────────────────────────────────────────────────────────
  # ZEITSPRÜNGE IN BUCH 1
  # ─────────────────────────────────────────────────────────────────────────────
  
  time_jumps_in_book:
    - id: "schisma"
      placement: "Prolog oder Kapitel 6"
      length: "1-2 Seiten"
      function: "Etabliert kosmischen Kontext"
      
    - id: "die_erste"
      placement: "Kapitel 11"
      length: "4-6 Seiten"
      function: "Spiegelt Lenas Erwachen, etabliert Verbindung"

  # ─────────────────────────────────────────────────────────────────────────────
  # KAPITEL-ÜBERSICHT
  # ─────────────────────────────────────────────────────────────────────────────
  
  chapters:
    # ═══════════════════════════════════════════════════════════════════════════
    # AKT 1: RISSE (Kapitel 1-10)
    # ═══════════════════════════════════════════════════════════════════════════
    
    - number: 1
      title: "Ausstieg"
      pov: "Lena"
      length: "4-5 Seiten"
      location: "Krankenhaus, dann Zuhause"
      time: "Nacht"
      
      layers:
        mystik: "██████████ PRIMARY"
        thriller: "░░░░"
        romance: "░░"
        soft_scifi: "░░"
      
      content:
        summary: "Lenas erste Projektion — unkontrolliert, verstörend"
        beats:
          - "Schicht im Krankenhaus — Notärztin im Einsatz"
          - "Zuhause, Erschöpfung"
          - "Im Bett — plötzlich löst sie sich"
          - "Über ihrem Körper — Chaos, Angst"
          - "Sieht Dinge, die sie nicht sehen sollte"
          - "Zurückgerissen — wacht schreiend auf"
        
      hook: "Was ist gerade passiert? War das real?"
      
      emotional_beat: "Terror, Verwirrung, Isolation"
      
    - number: 2
      title: "Spuren"
      pov: "Lena"
      length: "4-5 Seiten"
      location: "Lenas Wohnung"
      time: "Früher Morgen"
      
      layers:
        thriller: "██████████ PRIMARY"
        mystik: "████"
        romance: "░░"
        soft_scifi: "░░"
      
      content:
        summary: "Jemand hat sie beobachtet — erstes Zeichen"
        beats:
          - "Lena versucht, die Nacht zu rationalisieren"
          - "Laptop ist an — sie hat ihn nicht eingeschaltet"
          - "Foto von ihr — aufgenommen während der Projektion"
          - "Text: 'Wir sehen dich. Endlich.'"
          - "Panik — sie löscht alles"
          - "Verdrängung — 'Das bilde ich mir ein'"
        
      hook: "Jemand war hier. Jemand WEISS."
      
      emotional_beat: "Paranoia, Verdrängung, Isolation"
      
    - number: 3
      title: "Frühstück"
      pov: "Lena"
      length: "5-6 Seiten"
      location: "Küche"
      time: "Morgen"
      
      layers:
        drama_family: "██████████ PRIMARY"
        mystik: "████"
        thriller: "░░"
        romance: "░░"
      
      content:
