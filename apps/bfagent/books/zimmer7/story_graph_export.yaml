# ═══════════════════════════════════════════════════════════════════════════════
# THEMATISCHE GRUNDSTRUKTUR
# ═══════════════════════════════════════════════════════════════════════════════

themes:
  core_theme:
    name: "Balance / Der dritte Weg"
    description: "Nicht Wahl zwischen Extremen, sondern Synthese"
    manifestation: "Lena wählt weder Nano noch Astral — sie wird Brücke"
  
  supporting_themes:
    - name: "Identität"
      question: "Wer bin ich, wenn mein Bewusstsein nicht an meinen Körper gebunden ist?"
    - name: "Erbe & Blutlinien"
      question: "Was schulden wir unseren Vorfahren? Was unseren Nachkommen?"
    - name: "Wissenschaft vs. Glaube"
      question: "Können Messung und Mystik koexistieren?"
    - name: "Kontrolle vs. Loslassen"
      question: "Was gewinnen wir, wenn wir aufhören zu kämpfen?"
    - name: "Kosmische Verantwortung"
      question: "Was bedeutet es, eine Brücke zwischen Welten zu sein?"

# ═══════════════════════════════════════════════════════════════════════════════
# KOSMISCHE MYTHOLOGIE
# ═══════════════════════════════════════════════════════════════════════════════

mythology:
  origin:
    name: "Das Schisma"
    timeframe: "Vor der Zeit"
    description: |
      Das Eine stellte die Frage: "Wie erfahre ich mich selbst?"
      Zwei Antworten entstanden gleichzeitig:
      - NANO: "Durch Begrenzung. Werde Form."
      - ASTRAL: "Durch Ausdehnung. Bleibe frei."
      Das Eine wurde Zwei.

  factions:
    nano:
      principle: "Erfahrung durch Materie"
      method: "Inkarnieren, bewohnen, werden"
      goal: "Materie bewusst machen"
      danger: "Gefangen in der Form"
      manifestation: "Nano-Strukturen in allem Lebendigen"
    
    astral:
      principle: "Erfahrung durch Ausdehnung"
      method: "Beobachten, berühren, leiten"
      goal: "Bewusstsein befreien"
      danger: "Verloren in der Formlosigkeit"
      manifestation: "Präsenzen jenseits der Materie"

  cosmic_context:
    bridge_worlds:
      description: "Seltene Welten, wo beide Prinzipien koexistieren können"
      earth_status: "Eine von wenigen Brücken-Welten"
      significance: "Kampfplatz und potenzielle Heilung des Schismas"
    
    other_worlds:
      - type: "Nano-dominiert"
        characteristics: "Kollektiv-Bewusstsein, Materie ist heilig"
      - type: "Astral-dominiert"
        characteristics: "Keine feste Form, Individuen ohne Körper"
      - type: "Gescheiterte Brücke"
        characteristics: "Warnung — was passiert, wenn die Wahl falsch fällt"

