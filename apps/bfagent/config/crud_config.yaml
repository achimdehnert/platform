# ============================================================================
# BF Agent - CRUD Configuration
# ============================================================================
# Defines which models need CRUD components and custom code protection
#
# Levels:
#   FULL_CRUD: Complete Create, Read, Update, Delete + Custom Code Protection
#   READ_ONLY: Only List and Detail views (no create/edit/delete)
#   UD_ONLY: Update and Delete only (system creates records)
#   SKIP: No CRUD generation (internal/system models)
# ============================================================================

models:
  # ============================================================================
  # CORE BUSINESS MODELS - Full CRUD Required
  # ============================================================================

  BookProjects:
    level: FULL_CRUD
    priority: high
    description: "Main book project management"
    custom_code: true
    features:
      - forms
      - views
      - templates
      - urls

  Agents:
    level: FULL_CRUD
    priority: high
    description: "AI agent configuration and management"
    custom_code: true
    features:
      - forms
      - views
      - templates
      - urls

  BookChapters:
    level: FULL_CRUD
    priority: high
    description: "Chapter content and management"
    custom_code: true
    features:
      - forms
      - views
      - templates
      - urls

  Characters:
    level: FULL_CRUD
    priority: high
    description: "Character database and profiles"
    custom_code: true
    features:
      - forms
      - views
      - templates
      - urls

  Worlds:
    level: FULL_CRUD
    priority: medium
    description: "World-building and settings"
    custom_code: true
    features:
      - forms
      - views
      - templates
      - urls

  StoryArc:
    level: FULL_CRUD
    priority: medium
    description: "Story arc planning and tracking"
    custom_code: true
    features:
      - forms
      - views
      - templates
      - urls

  PlotPoint:
    level: FULL_CRUD
    priority: medium
    description: "Plot point management"
    custom_code: true
    features:
      - forms
      - views
      - templates
      - urls

  Llms:
    level: FULL_CRUD
    priority: high
    description: "LLM provider configuration"
    custom_code: true
    features:
      - forms
      - views
      - templates
      - urls

  PromptTemplate:
    level: FULL_CRUD
    priority: high
    description: "Reusable prompt templates for agents"
    custom_code: true
    features:
      - forms
      - views
      - templates
      - urls
    notes: "Manages prompt versions and active prompt selection"

  BookTypes:
    level: FULL_CRUD
    priority: low
    description: "Book type taxonomy"
    custom_code: false
    features:
      - forms
      - views
      - templates
      - urls

  # ============================================================================
  # SYSTEM MODELS - Limited CRUD
  # ============================================================================

  AgentExecutions:
    level: UD_ONLY
    priority: medium
    description: "Agent execution history (system creates)"
    custom_code: false
    features:
      - views  # List and detail only
      - templates
    notes: "Records are created automatically by agent system"

  AgentArtifacts:
    level: UD_ONLY
    priority: medium
    description: "Generated artifacts from agent runs"
    custom_code: false
    features:
      - views  # List and detail only
      - templates
    notes: "Artifacts are generated by agents, not manually created"

  QueryPerformanceLog:
    level: READ_ONLY
    priority: low
    description: "Query performance monitoring (system generated)"
    custom_code: false
    features:
      - views  # List and detail only
      - templates
    notes: "Automatically logged by Django middleware"

  # ============================================================================
  # MASTER DATA MODELS - Reference Data Management
  # ============================================================================

  Genre:
    level: FULL_CRUD
    priority: medium
    description: "Genre classification for books"
    custom_code: false
    features:
      - forms
      - views
      - templates
      - urls
    notes: "Master data for genre dropdowns, supports hierarchical genres"

  TargetAudience:
    level: FULL_CRUD
    priority: medium
    description: "Target audience/age groups for books"
    custom_code: false
    features:
      - forms
      - views
      - templates
      - urls
    notes: "Master data for audience dropdowns"

  WritingStatus:
    level: FULL_CRUD
    priority: low
    description: "Project status options with styling"
    custom_code: false
    features:
      - forms
      - views
      - templates
      - urls
    notes: "Master data for status dropdowns, includes color and icon settings"

  # ============================================================================
  # WORKFLOW ENGINE MODELS - Phase Management
  # ============================================================================

  WorkflowPhase:
    level: FULL_CRUD
    priority: medium
    description: "Workflow phases (Planning, Writing, Editing, etc.)"
    custom_code: false
    features:
      - forms
      - views
      - templates
      - urls
    notes: "Master data for workflow phases with icon and color"

  WorkflowTemplate:
    level: FULL_CRUD
    priority: medium
    description: "Workflow templates per book type"
    custom_code: false
    features:
      - forms
      - views
      - templates
      - urls
    notes: "Defines workflow structure for different book types"

  WorkflowPhaseStep:
    level: FULL_CRUD
    priority: medium
    description: "Individual steps in workflow template"
    custom_code: false
    features:
      - forms
      - views
      - templates
      - urls
    notes: "Defines order, requirements, and transitions between phases"

  PhaseActionConfig:
    level: FULL_CRUD
    priority: medium
    description: "Agent actions available per phase"
    custom_code: false
    features:
      - forms
      - views
      - templates
      - urls
    notes: "Configures which agent actions can be executed in each phase"

  ProjectPhaseHistory:
    level: READ_ONLY
    priority: low
    description: "Project phase transition history"
    custom_code: false
    features:
      - views
      - templates
    notes: "Audit trail of phase changes, read-only"

  # ============================================================================
  # INTERNAL MODELS - Skip CRUD Generation
  # ============================================================================

  GraphQLOperation:
    level: SKIP
    priority: none
    description: "Internal GraphQL operation tracking"
    custom_code: false
    features: []
    notes: "API-only model, no UI needed"

  FieldUsage:
    level: SKIP
    priority: none
    description: "Internal field usage analytics"
    custom_code: false
    features: []
    notes: "Analytics model, accessed via reports only"

# ============================================================================
# GENERATION OPTIONS
# ============================================================================

generation_options:
  # Component Generation
  generate_forms: true
  generate_views: true
  generate_templates: true
  generate_urls: true

  # Code Protection
  protect_custom_code: true
  backup_before_changes: true

  # Validation
  validate_imports: true
  validate_model_health: true
  validate_db_consistency: true

  # Encoding
  enforce_utf8: true

  # Dry Run Default
  dry_run_default: true

# ============================================================================
# CUSTOM CODE MARKERS
# ============================================================================

custom_code_markers:
  - start: "# CUSTOM_CODE_START:"
    end: "# CUSTOM_CODE_END:"
  - start: "# BUSINESS_LOGIC_START:"
    end: "# BUSINESS_LOGIC_END:"
  - start: "# USER_CODE_START:"
    end: "# USER_CODE_END:"
  - single_line: "# DO_NOT_MODIFY"

# ============================================================================
# EXCLUSIONS
# ============================================================================

exclusions:
  # Models to never process
  exclude_models:
    - "ContentType"  # Django internal
    - "Session"      # Django internal
    - "LogEntry"     # Django admin
    - "Permission"   # Django auth
    - "Group"        # Django auth

  # Apps to skip
  exclude_apps:
    - "admin"
    - "auth"
    - "contenttypes"
    - "sessions"
