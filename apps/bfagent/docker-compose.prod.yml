services:
  caddy:
    image: caddy:2
    container_name: bfagent_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      BFAgent_DOMAIN: ${BFAgent_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - bfagent_docs:/srv/docs:ro
    depends_on:
      - bfagent-web
    networks:
      - platform

  bfagent-web:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}/bfagent-web:${BFAgent_IMAGE_TAG:-latest}
    container_name: bfagent_web
    restart: unless-stopped
    environment:
      DJANGO_ENV: production
      DJANGO_SETTINGS_MODULE: config.settings

      USE_POSTGRES: "1"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-bfagent_prod}
      POSTGRES_USER: ${POSTGRES_USER:-bfagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      REDIS_URL: redis://redis:6379/0

      MCPHUB_API_BASE_URL: http://mcphub-api:8080

      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      SECURE_SSL_REDIRECT: "1"

      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

    volumes:
      - bfagent_media:/app/media
      - bfagent_static:/app/staticfiles
      - bfagent_docs:/app/docs/build/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["bash", "-lc", "./docker/entrypoint.web.sh"]
    networks:
      - platform

  mcphub-api:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}/mcphub-api:${MCPHUB_IMAGE_TAG:-latest}
    container_name: mcphub_api
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-bfagent_prod}
      POSTGRES_USER: ${POSTGRES_USER:-bfagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - platform

  postgres:
    image: postgres:16-alpine
    container_name: bfagent_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bfagent_prod}
      POSTGRES_USER: ${POSTGRES_USER:-bfagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bfagent} -d ${POSTGRES_DB:-bfagent_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - platform

  redis:
    image: redis:7-alpine
    container_name: bfagent_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - platform

volumes:
  postgres_data:
    name: bfagent_postgres_data_prod
  redis_data:
    name: bfagent_redis_data_prod
  bfagent_media:
    name: bfagent_media_prod
  bfagent_static:
    name: bfagent_static_prod
  bfagent_docs:
    name: bfagent_docs_prod
  caddy_data:
    name: bfagent_caddy_data
  caddy_config:
    name: bfagent_caddy_config

networks:
  platform:
    name: bf_platform_prod
