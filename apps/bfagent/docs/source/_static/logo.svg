<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <!-- BF Agent Logo -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  
  <!-- Icon: Stylized Agent/Workflow -->
  <g transform="translate(5, 5)">
    <!-- Hexagon background -->
    <path d="M20 0 L35 10 L35 30 L20 40 L5 30 L5 10 Z" fill="url(#blueGradient)"/>
    <!-- Inner circuit pattern -->
    <circle cx="20" cy="20" r="8" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="20" cy="20" r="3" fill="#f59e0b"/>
    <line x1="20" y1="12" x2="20" y2="5" stroke="#fff" stroke-width="2"/>
    <line x1="20" y1="28" x2="20" y2="35" stroke="#fff" stroke-width="2"/>
    <line x1="12" y1="20" x2="7" y2="20" stroke="#fff" stroke-width="2"/>
    <line x1="28" y1="20" x2="33" y2="20" stroke="#fff" stroke-width="2"/>
  </g>
  
  <!-- Text: BF Agent -->
  <text x="50" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#1e40af">
    BF Agent
  </text>
  
  <!-- Tagline -->
  <text x="50" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">
    Workflow Orchestration
  </text>
</svg>
