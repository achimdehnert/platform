[project]
name = "bfagent-mcp"
version = "2.0.0"
description = "BF Agent MCP Server - Universal Workflow Orchestration Platform"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Achim Grosskopf", email = "achim@example.com"}
]
keywords = ["mcp", "model-context-protocol", "workflow", "automation", "django"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "mcp>=1.0.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
django = [
    "django>=4.2",
    "psycopg2-binary",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio",
    "black",
    "ruff",
]
all = [
    "bfagent-mcp[django,dev]",
]

[project.scripts]
bfagent-mcp = "bfagent_mcp.mcp_server:run_server"

[project.urls]
Homepage = "https://github.com/achim/bfagent-mcp"
Documentation = "https://github.com/achim/bfagent-mcp#readme"
Repository = "https://github.com/achim/bfagent-mcp"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["bfagent_mcp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.ruff]
line-length = 100
select = ["E", "F", "W", "I"]
ignore = ["E501"]
