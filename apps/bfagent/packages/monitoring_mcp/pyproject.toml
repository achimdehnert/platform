[project]
name = "monitoring-mcp"
version = "0.1.0"
description = "BF Agent Monitoring MCP Server - Auto-Healing & Error Monitoring"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "BF Agent Team" }
]
dependencies = [
    "mcp>=0.9.0",
    "django>=5.0.0",
    "psycopg2-binary>=2.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["monitoring_mcp*"]

[project.scripts]
monitoring-mcp = "monitoring_mcp.server:main"
