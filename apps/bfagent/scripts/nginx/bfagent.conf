# BF Agent Nginx Configuration
# ==============================
# Production-ready Nginx configuration for BF Agent
#
# Installation:
#   sudo cp scripts/nginx/bfagent.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/bfagent.conf /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx

# Rate Limiting
limit_req_zone $binary_remote_addr zone=bfagent_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=bfagent_login:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Upstream (Gunicorn)
upstream bfagent_backend {
    server 127.0.0.1:8000;

    # For multiple workers (load balancing):
    # server 127.0.0.1:8000;
    # server 127.0.0.1:8001;

    keepalive 32;
}

# =============================================================================
# HTTP -> HTTPS Redirect
# =============================================================================

server {
    listen 80;
    listen [::]:80;

    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# =============================================================================
# HTTPS Server
# =============================================================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name yourdomain.com www.yourdomain.com;

    # Logging
    access_log /var/log/nginx/bfagent_access.log combined;
    error_log /var/log/nginx/bfagent_error.log warn;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    # SSL Protocols and Ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    # SSL Session
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ==========================================================================
    # Security Headers
    # ==========================================================================

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # CSP (adjust as needed)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'" always;

    # ==========================================================================
    # Rate Limiting
    # ==========================================================================

    limit_req zone=bfagent_limit burst=20 nodelay;
    limit_conn addr 10;

    # ==========================================================================
    # File Upload Size
    # ==========================================================================

    client_max_body_size 100M;
    client_body_buffer_size 128k;

    # ==========================================================================
    # Static Files (Served by Nginx)
    # ==========================================================================

    location /static/ {
        alias /opt/bfagent/staticfiles/;

        # Cache static files
        expires 30d;
        add_header Cache-Control "public, immutable";

        # Compression
        gzip on;
        gzip_vary on;
        gzip_types text/css text/javascript application/javascript application/json image/svg+xml;

        # Security
        add_header X-Content-Type-Options "nosniff" always;

        # Disable logging for static files (optional)
        access_log off;
        log_not_found off;
    }

    # ==========================================================================
    # Media Files
    # ==========================================================================

    location /media/ {
        alias /opt/bfagent/media/;

        # Cache media files
        expires 7d;
        add_header Cache-Control "public";

        # Security
        add_header X-Content-Type-Options "nosniff" always;

        # Optional: Protect sensitive uploads
        # internal;  # Only accessible via X-Accel-Redirect
    }

    # ==========================================================================
    # Favicon & Robots
    # ==========================================================================

    location = /favicon.ico {
        alias /opt/bfagent/staticfiles/favicon.ico;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        alias /opt/bfagent/staticfiles/robots.txt;
        access_log off;
        log_not_found off;
    }

    # ==========================================================================
    # Django Admin (Stricter Rate Limiting)
    # ==========================================================================

    location /admin/ {
        limit_req zone=bfagent_login burst=5 nodelay;

        proxy_pass http://bfagent_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for admin
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ==========================================================================
    # Health Check (No Rate Limiting)
    # ==========================================================================

    location /health/ {
        proxy_pass http://bfagent_backend;
        proxy_set_header Host $host;

        access_log off;

        # Allow from monitoring services
        # allow 10.0.0.0/8;  # Internal network
        # deny all;
    }

    # ==========================================================================
    # Django Application
    # ==========================================================================

    location / {
        # Try static first, then proxy to Django
        try_files $uri @django;
    }

    location @django {
        proxy_pass http://bfagent_backend;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Disable buffering for SSE/streaming
        # proxy_buffering off;
    }

    # ==========================================================================
    # Block Access to Sensitive Files
    # ==========================================================================

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to .env, .git, etc.
    location ~ /\.(env|git|svn|htaccess) {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# =============================================================================
# Maintenance Mode (Optional)
# =============================================================================
#
# To enable maintenance mode:
#   1. Create: /opt/bfagent/maintenance.html
#   2. Uncomment the location block below
#   3. Reload nginx: sudo systemctl reload nginx
