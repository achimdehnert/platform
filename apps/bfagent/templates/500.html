<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error (500) - BF Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
        }
        .error-icon {
            font-size: 4rem;
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="error-card p-5 text-center">
        <div class="error-icon mb-4">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <h1 class="h3 mb-3">Ein Fehler ist aufgetreten</h1>
        <p class="text-muted mb-4">
            Es ist ein unerwarteter Serverfehler aufgetreten. 
            Unser Team wurde benachrichtigt.
        </p>
        
        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a href="javascript:history.back()" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-2"></i>Zurück
            </a>
            <a href="/" class="btn btn-outline-primary">
                <i class="bi bi-house me-2"></i>Startseite
            </a>
            <button type="button" class="btn btn-danger" onclick="reportBug()">
                <i class="bi bi-bug-fill me-2"></i>Bug melden
            </button>
        </div>
        
        <hr class="my-4">
        <small class="text-muted">
            <i class="bi bi-info-circle me-1"></i>
            Error Code: 500 | Server Error
        </small>
    </div>
    
    <script>
    function reportBug() {
        const url = encodeURIComponent(document.referrer || window.location.href);
        const title = encodeURIComponent('Server Error 500: ' + (document.referrer || window.location.pathname));
        window.location.href = '/bfagent/test-studio/requirements/create/?source_url=' + url + '&name=' + title + '&category=bug&priority=high';
    }
    </script>
</body>
</html>
