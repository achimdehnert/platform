<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF Agent - AI Management Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .landing-container {
            text-align: center;
            max-width: 800px;
            padding: 3rem;
        }
        .logo {
            font-size: 5rem;
            margin-bottom: 2rem;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .title {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 3rem;
            opacity: 0.9;
        }
        .btn-landing {
            padding: 1rem 3rem;
            font-size: 1.2rem;
            border-radius: 50px;
            background: white;
            color: #667eea;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .btn-landing:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            background: #f8f9fa;
            color: #667eea;
        }
        .features {
            margin-top: 4rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .feature-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1.5rem;
            width: 200px;
            transition: all 0.3s ease;
        }
        .feature-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .feature-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="logo">
            <i class="bi bi-rocket-takeoff"></i>
        </div>
        
        <h1 class="title">BF Agent</h1>
        <p class="subtitle">Your AI-Powered Enterprise Management Hub</p>
        
        <div class="mb-4">
            <a href="{% url 'login' %}" class="btn btn-landing">
                <i class="bi bi-box-arrow-in-right"></i> Sign In
            </a>
        </div>
        
        <div class="features">
            <div class="feature-card">
                <div class="feature-icon">
                    <i class="bi bi-book"></i>
                </div>
                <h5>Book Writing</h5>
                <p class="small">AI-powered story development</p>
            </div>
            
            <div class="feature-card">
                <div class="feature-icon">
                    <i class="bi bi-translate"></i>
                </div>
                <h5>Translation</h5>
                <p class="small">Professional medical translation</p>
            </div>
            
            <div class="feature-card">
                <div class="feature-icon">
                    <i class="bi bi-gear"></i>
                </div>
                <h5>Control Center</h5>
                <p class="small">System management tools</p>
            </div>
        </div>
        
        <div class="mt-5">
            <p class="text-white-50 small">
                Logged out successfully. <a href="{% url 'login' %}" class="text-white">Sign in again</a>
            </p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
