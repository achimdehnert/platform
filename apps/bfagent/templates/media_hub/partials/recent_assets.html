<div class="row g-2">
{% for asset in assets %}
<div class="col-4">
    <a href="{% url 'media_hub:asset-detail' asset.id %}" class="d-block position-relative">
        {% if asset.thumbnail_url %}
        <img src="{{ asset.thumbnail_url }}" class="img-fluid rounded" alt="{{ asset.title }}">
        {% else %}
        <div class="bg-light rounded d-flex align-items-center justify-content-center" style="aspect-ratio: 1;">
            {% if asset.asset_type == 'image' %}
            <i class="bi bi-image text-muted fs-3"></i>
            {% elif asset.asset_type == 'audio' %}
            <i class="bi bi-music-note text-muted fs-3"></i>
            {% else %}
            <i class="bi bi-file text-muted fs-3"></i>
            {% endif %}
        </div>
        {% endif %}
        <span class="position-absolute bottom-0 start-0 end-0 bg-dark bg-opacity-50 text-white px-1 py-0 rounded-bottom" style="font-size: 0.7rem;">
            #{{ asset.id }}
        </span>
    </a>
</div>
{% empty %}
<div class="col-12 text-center py-4 text-muted">
    <i class="bi bi-images fs-3 d-block mb-2"></i>
    <small>No assets yet</small>
</div>
{% endfor %}
</div>
