version: '3.8'

# Development Docker Compose - Travel Beat
# Usage: docker-compose -f docker/docker-compose.dev.yml up -d
#
# SEPARATER Port 5433 um Konflikte mit anderen PostgreSQL zu vermeiden!

services:
  travel-beat-db:
    image: postgres:15-alpine
    container_name: travel-beat-postgres
    environment:
      - POSTGRES_DB=travel_beat
      - POSTGRES_USER=travel_beat
      - POSTGRES_PASSWORD=travel_beat_dev_2025
    ports:
      - "5433:5432"  # Port 5433 extern -> 5432 intern
    volumes:
      - travel_beat_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel_beat -d travel_beat"]
      interval: 10s
      timeout: 5s
      retries: 5

  travel-beat-redis:
    image: redis:7-alpine
    container_name: travel-beat-redis
    ports:
      - "6380:6379"  # Port 6380 extern -> 6379 intern
    volumes:
      - travel_beat_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  travel_beat_postgres:
    name: travel_beat_postgres_data
  travel_beat_redis:
    name: travel_beat_redis_data
