# Travel Beat - Production Docker Compose (Hetzner)
# Runs alongside BF Agent on shared platform network
version: '3.8'

services:
  travel-beat-web:
    image: ghcr.io/achimdehnert/travel-beat:${TRAVELBEAT_IMAGE_TAG:-latest}
    container_name: travel_beat_web
    restart: unless-stopped
    environment:
      - DJANGO_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@travel-beat-db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://travel-beat-redis:6379/0
      - CELERY_BROKER_URL=redis://travel-beat-redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-travel-beat.iil.pet,localhost}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://travel-beat.iil.pet}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    env_file:
      - .env.prod
    depends_on:
      travel-beat-db:
        condition: service_healthy
      travel-beat-redis:
        condition: service_started
    volumes:
      - travelbeat_static:/app/staticfiles
      - travelbeat_media:/app/media
    networks:
      - platform
      - travelbeat

  travel-beat-celery:
    image: ghcr.io/achimdehnert/travel-beat:${TRAVELBEAT_IMAGE_TAG:-latest}
    container_name: travel_beat_celery
    command: celery -A config worker -l info --concurrency=2
    restart: unless-stopped
    environment:
      - DJANGO_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@travel-beat-db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://travel-beat-redis:6379/0
      - CELERY_BROKER_URL=redis://travel-beat-redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    env_file:
      - .env.prod
    depends_on:
      - travel-beat-db
      - travel-beat-redis
    networks:
      - travelbeat

  travel-beat-celery-beat:
    image: ghcr.io/achimdehnert/travel-beat:${TRAVELBEAT_IMAGE_TAG:-latest}
    container_name: travel_beat_celery_beat
    command: celery -A config beat -l info
    restart: unless-stopped
    environment:
      - DJANGO_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@travel-beat-db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://travel-beat-redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
    env_file:
      - .env.prod
    depends_on:
      - travel-beat-db
      - travel-beat-redis
    networks:
      - travelbeat

  travel-beat-db:
    image: postgres:15-alpine
    container_name: travel_beat_db
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-travel_beat}
      - POSTGRES_USER=${POSTGRES_USER:-travelbeat}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - travelbeat_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-travelbeat}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travelbeat

  travel-beat-redis:
    image: redis:7-alpine
    container_name: travel_beat_redis
    command: redis-server --appendonly yes
    restart: unless-stopped
    volumes:
      - travelbeat_redis:/data
    networks:
      - travelbeat

volumes:
  travelbeat_postgres:
  travelbeat_redis:
  travelbeat_static:
  travelbeat_media:

networks:
  platform:
    external: true
    name: bfagent_platform
  travelbeat:
    name: travelbeat_network
