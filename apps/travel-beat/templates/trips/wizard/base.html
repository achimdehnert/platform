{% extends "base.html" %}

{% block title %}Neue Reise erstellen - Travel Beat{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <!-- Progress Bar -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="small {% if step >= 1 %}text-primary fw-bold{% else %}text-muted{% endif %}">
                            1. Reisedaten
                        </span>
                        <span class="small {% if step >= 2 %}text-primary fw-bold{% else %}text-muted{% endif %}">
                            2. Stopps
                        </span>
                        <span class="small {% if step >= 3 %}text-primary fw-bold{% else %}text-muted{% endif %}">
                            3. Story-Einstellungen
                        </span>
                        <span class="small {% if step >= 4 %}text-primary fw-bold{% else %}text-muted{% endif %}">
                            4. Übersicht
                        </span>
                    </div>
                    <div class="progress" style="height: 8px;">
                        <div class="progress-bar bg-gradient-primary" role="progressbar" 
                             style="width: {% if step == 1 %}25{% elif step == 2 %}50{% elif step == 3 %}75{% else %}100{% endif %}%"></div>
                    </div>
                </div>
            </div>
            
            <!-- Step Content -->
            <div class="card border-0 shadow">
                <div class="card-header bg-white py-3">
                    <h4 class="mb-0">
                        <i class="bi bi-{% block step_icon %}airplane{% endblock %}"></i>
                        {% block step_title %}Neue Reise{% endblock %}
                    </h4>
                </div>
                <div class="card-body p-4">
                    {% block step_content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
