# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  REUSABLE BUILD WORKFLOW - Docker Images                                   ║
# ║  Platform Repository: achimdehnert/platform                                ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
#
# Usage in app repository:
#   jobs:
#     build:
#       uses: achimdehnert/platform/.github/workflows/_build-docker.yml@v1
#       with:
#         dockerfile: docker/Dockerfile
#       secrets: inherit

name: _Build Docker

on:
  workflow_call:
    inputs:
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        default: 'docker/Dockerfile'
        type: string
      context:
        description: 'Build context path'
        required: false
        default: '.'
        type: string
      target:
        description: 'Docker build target (for multi-stage)'
        required: false
        default: ''
        type: string
      platforms:
        description: 'Target platforms (comma-separated)'
        required: false
        default: 'linux/amd64'
        type: string
      push:
        description: 'Push image to registry'
        required: false
        default: true
        type: boolean
      registry:
        description: 'Container registry'
        required: false
        default: 'ghcr.io'
        type: string
      image_suffix:
        description: 'Suffix for image name (e.g., -web, -worker)'
        required: false
        default: ''
        type: string
      build_args:
        description: 'Build arguments (multiline KEY=VALUE)'
        required: false
        default: ''
        type: string
      scan_image:
        description: 'Scan image with Trivy'
        required: false
        default: true
        type: boolean

    outputs:
      image_tag:
        description: 'Full image tag'
        value: ${{ jobs.build.outputs.image_tag }}
      image_digest:
        description: 'Image digest'
        value: ${{ jobs.build.outputs.digest }}
      image_sha:
        description: 'Short SHA tag'
        value: ${{ jobs.build.outputs.sha_tag }}

jobs:
  build:
    name: "🏗️ Build & Push"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
      sha_tag: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: contains(inputs.platforms, ',') || inputs.platforms != 'linux/amd64'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/${{ github.repository }}${{ inputs.image_suffix }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          target: ${{ inputs.target || '' }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Trivy Vulnerability Scan
        if: ${{ inputs.scan_image && inputs.push }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.registry }}/${{ github.repository }}${{ inputs.image_suffix }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy Results
        if: ${{ inputs.scan_image && inputs.push }}
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Image Summary
        run: |
          echo "## 🐳 Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ inputs.registry }}/${{ github.repository }}${{ inputs.image_suffix }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **SHA Tag** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Platforms** | ${{ inputs.platforms }} |" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════
  # MULTI-TARGET BUILD (optional parallel builds)
  # ═══════════════════════════════════════════════════════════════════════════
  build-matrix:
    name: "🏗️ Build ${{ matrix.target }}"
    runs-on: ubuntu-latest
    if: false  # Disabled by default, enable via separate workflow
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - target: web
            dockerfile: docker/Dockerfile
            suffix: -web
          - target: worker
            dockerfile: docker/Dockerfile.worker
            suffix: -worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.target }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ inputs.registry }}/${{ github.repository }}${{ matrix.suffix }}:${{ github.sha }}
            ${{ inputs.registry }}/${{ github.repository }}${{ matrix.suffix }}:latest
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
