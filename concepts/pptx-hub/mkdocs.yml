site_name: PPTX-Hub
site_description: Production-ready PowerPoint processing platform
site_url: https://pptx-hub.readthedocs.io
repo_url: https://github.com/YOUR_ORG/pptx-hub
repo_name: YOUR_ORG/pptx-hub

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - toc.follow
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
  - Guides:
      - Multi-Tenancy: guides/multi-tenancy.md
      - Storage Backends: guides/storage-backends.md
      - Job Processing: guides/job-processing.md
  - API Reference: api-reference/
  - Architecture Decisions: decisions/
