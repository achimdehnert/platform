# Nginx Prod Config — authentik Identity Provider (ADR-142)
# Domain: id.iil.pet
# Proxied to: localhost:9000 (iil_authentik_server container)
# SSL: Cloudflare Tunnel (default.crt) oder Certbot
#   certbot --nginx -d id.iil.pet
#
# Copy to: /etc/nginx/sites-enabled/ on hetzner-prod

limit_req_zone $binary_remote_addr zone=authentik_auth:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=authentik_api:10m rate=60r/m;

server {
    listen 80;
    listen [::]:80;
    server_name id.iil.pet;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name id.iil.pet;

    ssl_certificate     /etc/nginx/ssl/default.crt;
    ssl_certificate_key /etc/nginx/ssl/default.key;

    # Rate-Limiting auf Login-Flows
    location ~* ^/application/o/(authorize|token|introspect)/ {
        limit_req zone=authentik_auth burst=20 nodelay;
        limit_req_status 429;
        proxy_pass          http://127.0.0.1:9000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # Rate-Limiting auf API
    location /api/ {
        limit_req zone=authentik_api burst=100 nodelay;
        limit_req_status 429;
        proxy_pass          http://127.0.0.1:9000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # WebSocket-Upgrade fuer authentik Admin Live-Events
    location /ws/ {
        proxy_pass          http://127.0.0.1:9000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass          http://127.0.0.1:9000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }
}
