# Nginx Prod Config — Knowledge-Hub / Outline Wiki (ADR-143)
# Domain: knowledge.iil.pet
# Proxied to: localhost:3000 (iil_knowledge_outline container)
# SSL: Certbot
#   certbot --nginx -d knowledge.iil.pet
#
# Copy to: /etc/nginx/sites-enabled/ on hetzner-prod

server {
    listen 80;
    listen [::]:80;
    server_name knowledge.iil.pet;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name knowledge.iil.pet;

    ssl_certificate     /etc/letsencrypt/live/knowledge.iil.pet/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/knowledge.iil.pet/privkey.pem;

    client_max_body_size 25m;

    # WebSocket fuer Echtzeit-Kollaboration (Outline Y.js)
    location /realtime {
        proxy_pass          http://127.0.0.1:3100;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass          http://127.0.0.1:3100;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }
}
