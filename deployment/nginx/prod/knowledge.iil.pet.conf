# Nginx Prod Config — Knowledge-Hub / Outline Wiki (ADR-143)
# Domain: knowledge.iil.pet
# Proxied to: localhost:3100 (iil_knowledge_outline container, intern 3000)
# SSL: Cloudflare Tunnel (default.crt) oder Certbot
#   certbot --nginx -d knowledge.iil.pet
#
# Copy to: /etc/nginx/sites-enabled/ on hetzner-prod
#
# Cascade Action Helpers (2026-03-24):
#   /_upload      — Outline File Upload Helper
#   /_action      — Cascade Action Page (Quick-Actions + Freitext)
#   /_cascade.js  — Inline Action-Panel (auto-injected via sub_filter)
#   CSP Override  — Outline setzt nonce-basierte CSP, die sub_filter-
#                   injizierte Scripts blockiert. Nginx ersetzt den Header
#                   mit 'self' + 'unsafe-inline' (ADR-143, Phase Cascade).

server {
    listen 80;
    listen [::]:80;
    server_name knowledge.iil.pet;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name knowledge.iil.pet;

    ssl_certificate     /etc/nginx/ssl/default.crt;
    ssl_certificate_key /etc/nginx/ssl/default.key;

    client_max_body_size 25m;

    # WebSocket fuer Echtzeit-Kollaboration (Outline Y.js)
    location /realtime {
        proxy_pass          http://127.0.0.1:3100;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # Cascade Action: Inline-Panel Script (auto-injected into /doc/ pages)
    location /_cascade.js {
        alias /opt/outline/cascade-action.js;
        default_type application/javascript;
        add_header Cache-Control "no-cache";
    }

    # Cascade Action Page (Quick-Actions + Freitext)
    location /_action {
        alias /opt/outline/action-page.html;
        default_type text/html;
    }

    # Outline File Upload Helper (PDF, Excel, Word, CSV, ZIP)
    location /_upload {
        alias /opt/outline/upload-helper.html;
        default_type text/html;
    }

    location / {
        proxy_pass          http://127.0.0.1:3100;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # Strip Outline CSP (nonce blocks injected scripts) and replace
        # Outline setzt: script-src 'nonce-...' — sub_filter-injizierte
        # Scripts haben keinen Nonce und werden geblockt (leere Seite).
        # Fix: Ersetze mit 'self' + 'unsafe-inline' (internes Tool, kein Public).
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "base-uri 'none';default-src 'self';style-src 'self' 'unsafe-inline';script-src 'self' 'unsafe-inline';media-src * data: blob:;img-src * data: blob:;frame-src * data:;object-src 'self';connect-src *" always;

        # Cascade Action: inject FAB into all Outline pages
        sub_filter '</body>' '<script src="/_cascade.js" defer></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
        proxy_set_header Accept-Encoding "";
    }
}
