# Nginx Prod Config — learn-hub (ADR-140)
# Domain: learn.iil.pet
# Proxied to: localhost:8099 (learn-hub-web container)
# SSL: Certbot — run after first deploy:
#   certbot --nginx -d learn.iil.pet
#
# Copy to: /etc/nginx/sites-enabled/ on 88.198.191.108

server {
    listen 80;
    server_name learn.iil.pet;

    # Health checks bypass HTTPS redirect
    location /livez/ {
        proxy_pass http://127.0.0.1:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthz/ {
        proxy_pass http://127.0.0.1:8099;
        proxy_set_header Host $host;
    }

    # Redirect all other traffic to HTTPS once SSL is provisioned
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name learn.iil.pet;

    # SSL — provisioned by Certbot (uncomment after: certbot --nginx -d learn.iil.pet)
    # ssl_certificate /etc/letsencrypt/live/learn.iil.pet/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/learn.iil.pet/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # Proxy to learn-hub-web container
    location / {
        proxy_pass http://127.0.0.1:8099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Static files (WhiteNoise serves, Nginx caches)
    location /static/ {
        proxy_pass http://127.0.0.1:8099;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public";
    }
}
