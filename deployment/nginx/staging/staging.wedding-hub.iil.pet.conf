# Nginx Staging Config — wedding-hub (ADR-063)
# Domain: staging.wedding-hub.iil.pet
# Proxied to: dev-server (46.225.113.1) Port 8196
# SSL: Certbot — run after first staging deploy:
#   certbot --nginx -d staging.wedding-hub.iil.pet
#
# Copy to: /etc/nginx/sites-enabled/ on 88.198.191.108

server {
    listen 80;
    server_name staging.wedding-hub.iil.pet;

    # Health checks bypass HTTPS redirect
    location /livez/ {
        proxy_pass http://46.225.113.1:8196;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /readyz/ {
        proxy_pass http://46.225.113.1:8196;
        proxy_set_header Host $host;
    }

    # Redirect all other traffic to HTTPS once SSL is provisioned
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name staging.wedding-hub.iil.pet;

    # SSL — provisioned by Certbot (uncomment after: certbot --nginx -d staging.wedding-hub.iil.pet)
    # ssl_certificate /etc/letsencrypt/live/staging.wedding-hub.iil.pet/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/staging.wedding-hub.iil.pet/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Staging banner header
    add_header X-Staging-Environment "wedding-hub-staging" always;

    # Proxy to dev-server staging port
    location / {
        proxy_pass http://46.225.113.1:8196;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Static files (if served via Nginx instead of WhiteNoise)
    location /static/ {
        proxy_pass http://46.225.113.1:8196;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public";
    }
}
