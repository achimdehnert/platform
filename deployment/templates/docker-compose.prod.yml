# ═══════════════════════════════════════════════════════════════════════════════
# Reference docker-compose.prod.yml for Django SaaS on Hetzner
# ═══════════════════════════════════════════════════════════════════════════════
# Copy to your app repo and adjust [APP] placeholders.
# Secrets via .env.prod (never committed).  See deployment/README.md.
#
# deploy-remote.sh expects:
#   [APP]_IMAGE_TAG  — set in .env.prod, overwritten on deploy
#   WEB_SERVICE      — defaults to [APP]-web
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ── Web (Gunicorn) ────────────────────────────────────────────
  app-web:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}:${APP_IMAGE_TAG:-latest}
    container_name: ${APP_NAME}_web
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      GUNICORN_WORKERS: "3"
      GUNICORN_TIMEOUT: "120"
    volumes:
      - app_media:/app/media
      - app_static:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: >-
        python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/livez/')"
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - platform

  # ── Worker (Celery / Outbox) ──────────────────────────────────
  app-worker:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}:${APP_IMAGE_TAG:-latest}
    container_name: ${APP_NAME}_worker
    restart: unless-stopped
    env_file: .env.prod
    command: ["celery", "-A", "config", "worker", "-l", "info", "-c", "2"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ${APP_NAME}_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    shm_size: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME}_redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 192M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - platform

  # ── Nginx reverse proxy (optional, if no external LB) ────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ${APP_NAME}_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_static:/var/www/static:ro
      - app_media:/var/www/media:ro
    depends_on:
      app-web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform

volumes:
  postgres_data:
    name: ${APP_NAME}_postgres_data
  redis_data:
    name: ${APP_NAME}_redis_data
  app_media:
    name: ${APP_NAME}_media
  app_static:
    name: ${APP_NAME}_static

networks:
  platform:
    name: bf_platform_prod
    external: true
