# ═══════════════════════════════════════════════════════════════════════════════
# Odoo CI Workflow — Copy to <odoo-repo>/.github/workflows/ci.yml
# ═══════════════════════════════════════════════════════════════════════════════
# Triggers: push to any branch, PR to main
# Jobs:     lint → test → build (only on main/tags)
#
# Replace [ORG] and [REPO] with your values.
# ═══════════════════════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: ["*"]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/[ORG]/[REPO]

jobs:
  # ── Lint (ruff on custom addons) ──────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint custom addons
        run: ruff check addons/ --output-format=github

  # ── Test (Odoo --test-enable) ───────────────────────────────
  test:
    needs: [lint]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: odoo_test
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U odoo -d odoo_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    container:
      image: odoo:18.0

    steps:
      - uses: actions/checkout@v4

      - name: Run Odoo tests
        env:
          DB_HOST: postgres
          DB_PORT: "5432"
          DB_USER: odoo
          DB_PASSWORD: odoo
          DB_NAME: odoo_test
        run: |
          # Install custom addons
          cp -r addons/* /mnt/extra-addons/ 2>/dev/null || true

          # Initialize DB and run tests
          odoo \
            --db_host=$DB_HOST \
            --db_port=$DB_PORT \
            --db_user=$DB_USER \
            --db_password=$DB_PASSWORD \
            -d $DB_NAME \
            --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons \
            -i $(ls -d addons/*/ | xargs -I{} basename {} | paste -sd, -) \
            --test-enable \
            --stop-after-init \
            --log-level=test \
            2>&1 | tee /tmp/odoo-test.log

          # Fail if any test errors
          if grep -qE "^(ERROR|CRITICAL)" /tmp/odoo-test.log; then
            echo "::error::Odoo tests failed"
            exit 1
          fi

  # ── Build Docker image (main + tags only) ─────────────────────
  build:
    needs: [test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Job summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
