# ═══════════════════════════════════════════════════════════════════════════════
# (C) Deploy Production — Copy to <app>/.github/workflows/deploy-prod.yml
# ═══════════════════════════════════════════════════════════════════════════════
# Trigger: tag v* (semver) — requires manual approval via GitHub Environment
# Environment: production — protected, requires reviewer approval
#
# Replace [ORG], [APP], [DEPLOY_PATH] with your values.
# ═══════════════════════════════════════════════════════════════════════════════
name: Deploy Production

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: git SHA)"
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  # ── Gate: require CI passed for the same SHA ───────────────────
  check-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI status
        uses: actions/github-script@v7
        with:
          script: |
            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              filter: 'latest'
            });
            const ci = checks.data.check_runs.find(
              c => c.name.includes('lint') || c.name.includes('test')
            );
            if (!ci || ci.conclusion !== 'success') {
              core.setFailed('CI has not passed for this SHA');
            }

  # ── Deploy to each production host ─────────────────────────────
  deploy-prod:
    needs: [check-ci]
    runs-on: ubuntu-latest
    environment: production
    strategy:
      max-parallel: 1
      matrix:
        host: [prod1.example.com]
        # Add more hosts for multi-VM rolling deploys:
        # host: [prod1.example.com, prod2.example.com]
    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Strip refs/tags/ prefix
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy deploy script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ matrix.host }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deployment/scripts/deploy-remote.sh
          target: /srv/[APP]/scripts/
          strip_components: 2

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ matrix.host }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            chmod +x /srv/[APP]/scripts/deploy-remote.sh
            /srv/[APP]/scripts/deploy-remote.sh \
              --app [APP] \
              --tag "${{ steps.tag.outputs.tag }}" \
              --deploy-dir /srv/[APP] \
              --compose-file docker-compose.prod.yml \
              --env-file .env.prod \
              --health-retries 15 \
              --health-interval 10

      - name: Post status
        if: always()
        run: |
          echo "## Production Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- **Host:** \`${{ matrix.host }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ── Notify (optional) ──────────────────────────────────────────
  notify:
    needs: [deploy-prod]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ needs.deploy-prod.result }}"
          EMOJI=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\"${EMOJI} [APP] prod deploy: ${STATUS} (tag: ${GITHUB_REF#refs/tags/})\"}" \
            || true
