# Host Nginx vHost for drifttales.app + drifttales.com
# =====================================================
# TLS termination, proxy to Docker container (travel_beat_caddy:8089)
#
# Installation:
#   sudo cp drifttales.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/drifttales.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS Redirect (drifttales.app)
server {
    listen 80;
    listen [::]:80;
    server_name drifttales.app www.drifttales.app;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTP → HTTPS Redirect (drifttales.com)
server {
    listen 80;
    listen [::]:80;
    server_name drifttales.com www.drifttales.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server (drifttales.app)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name drifttales.app www.drifttales.app;

    ssl_certificate /etc/letsencrypt/live/drifttales.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drifttales.app/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/drifttales.app/chain.pem;

    include /etc/nginx/snippets/ssl-params.conf;

    access_log /var/log/nginx/drifttales.app_access.log combined;
    error_log /var/log/nginx/drifttales.app_error.log warn;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to travel_beat_caddy container
    location / {
        proxy_pass http://127.0.0.1:8089;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# HTTPS Server (drifttales.com)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name drifttales.com www.drifttales.com;

    ssl_certificate /etc/letsencrypt/live/drifttales.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drifttales.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/drifttales.com/chain.pem;

    include /etc/nginx/snippets/ssl-params.conf;

    access_log /var/log/nginx/drifttales.com_access.log combined;
    error_log /var/log/nginx/drifttales.com_error.log warn;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to travel_beat_caddy container
    location / {
        proxy_pass http://127.0.0.1:8089;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
