# ============================================================================
# DOMAIN DEVELOPMENT LIFECYCLE - GITHUB ACTIONS
# Step 7: CI/CD Workflow for Documentation Build
# ============================================================================
#
# Part of: Domain Development Lifecycle System
# Location: .github/workflows/docs-build.yml
#
# This workflow:
# 1. Exports documents from PostgreSQL database
# 2. Builds Sphinx documentation
# 3. Deploys to GitHub Pages
#
# Triggers:
# - Push to main branch (docs/ changes)
# - Scheduled: Every 6 hours
# - Manual dispatch
#
# ============================================================================

name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs-build.yml'
  
  schedule:
    # Every 6 hours to pick up database changes
    - cron: '0 */6 * * *'
  
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force full rebuild (ignore cache)'
        required: false
        default: 'false'
        type: boolean

# Sets permissions of the GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================================
  # JOB 1: EXPORT DATABASE DOCUMENTS
  # ============================================================================
  export-db-docs:
    name: Export Database Documents
    runs-on: ubuntu-latest
    
    outputs:
      docs_changed: ${{ steps.check_changes.outputs.changed }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install psycopg2-binary pyyaml jinja2
      
      - name: Export documents from database
        id: export
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scripts/export_docs_from_db.py \
            --output-dir docs/_db_export \
            --format rst
          
          # Count exported files
          BC_COUNT=$(find docs/_db_export/business_cases -name "*.rst" 2>/dev/null | wc -l || echo 0)
          UC_COUNT=$(find docs/_db_export/use_cases -name "*.rst" 2>/dev/null | wc -l || echo 0)
          ADR_COUNT=$(find docs/_db_export/adrs -name "*.rst" 2>/dev/null | wc -l || echo 0)
          
          echo "Exported: $BC_COUNT Business Cases, $UC_COUNT Use Cases, $ADR_COUNT ADRs"
          echo "bc_count=$BC_COUNT" >> $GITHUB_OUTPUT
          echo "uc_count=$UC_COUNT" >> $GITHUB_OUTPUT
          echo "adr_count=$ADR_COUNT" >> $GITHUB_OUTPUT
      
      - name: Check for changes
        id: check_changes
        run: |
          git add docs/_db_export/
          if git diff --cached --quiet; then
            echo "No changes in exported documents"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Documents have changed"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload exported docs
        uses: actions/upload-artifact@v4
        with:
          name: db-export
          path: docs/_db_export/
          retention-days: 1

  # ============================================================================
  # JOB 2: BUILD SPHINX DOCUMENTATION
  # ============================================================================
  build-docs:
    name: Build Sphinx Documentation
    runs-on: ubuntu-latest
    needs: export-db-docs
    if: |
      needs.export-db-docs.outputs.docs_changed == 'true' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download exported docs
        uses: actions/download-artifact@v4
        with:
          name: db-export
          path: docs/_db_export/
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install Sphinx and dependencies
        run: |
          pip install -r docs/requirements.txt
      
      - name: Build documentation
        run: |
          cd docs
          make html SPHINXOPTS="-W --keep-going -n"
        env:
          # For db_docs extension (if using live DB queries)
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      
      - name: Upload build artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html/

  # ============================================================================
  # JOB 3: DEPLOY TO GITHUB PAGES
  # ============================================================================
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================================================
  # JOB 4: NOTIFY ON FAILURE
  # ============================================================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [export-db-docs, build-docs, deploy]
    if: failure()
    
    steps:
      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "⚠️ Documentation build failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Documentation Build Failed*\n\nWorkflow: ${{ github.workflow }}\nRun: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK


---
# ============================================================================
# FILE: scripts/export_docs_from_db.py
# Export script for database documents
# ============================================================================

#!/usr/bin/env python3
"""
Export Business Cases, Use Cases, and ADRs from PostgreSQL to RST files.

Usage:
    python scripts/export_docs_from_db.py --output-dir docs/_db_export --format rst

Environment:
    DATABASE_URL: PostgreSQL connection string
"""

import argparse
import os
import sys
from datetime import datetime
from pathlib import Path
from typing import Any, Dict, List, Optional

import psycopg2
from psycopg2.extras import RealDictCursor


# ============================================================================
# DATABASE CONNECTION
# ============================================================================

def get_connection():
    """Get database connection from environment."""
    db_url = os.environ.get('DATABASE_URL')
    if not db_url:
        raise ValueError("DATABASE_URL environment variable not set")
    return psycopg2.connect(db_url, cursor_factory=RealDictCursor)


# ============================================================================
# DATA FETCHING
# ============================================================================

def fetch_business_cases(conn) -> List[Dict]:
    """Fetch all active Business Cases."""
    with conn.cursor() as cur:
        cur.execute("""
            SELECT 
                bc.code,
                bc.title,
                bc.problem_statement,
                bc.target_audience,
                bc.expected_benefits,
                bc.scope,
                bc.out_of_scope,
                bc.success_criteria,
                bc.assumptions,
                bc.constraints,
                bc.risks,
                bc.stakeholders,
                bc.architecture_basis,
                cat.name as category_name,
                cat.code as category_code,
                st.name as status_name,
                st.code as status_code,
                bc.created_at,
                bc.updated_at
            FROM platform.dom_business_case bc
            JOIN platform.lkp_choice cat ON bc.category_id = cat.id
            JOIN platform.lkp_choice st ON bc.status_id = st.id
            WHERE bc.deleted_at IS NULL
            ORDER BY bc.code
        """)
        return cur.fetchall()


def fetch_use_cases(conn) -> List[Dict]:
    """Fetch all active Use Cases."""
    with conn.cursor() as cur:
        cur.execute("""
            SELECT 
                uc.code,
                uc.title,
                uc.description,
                uc.actor,
                uc.preconditions,
                uc.postconditions,
                uc.business_rules,
                uc.main_flow,
                uc.alternative_flows,
                uc.exception_flows,
                uc.technical_notes,
                uc.api_endpoints,
                uc.estimated_hours,
                bc.code as business_case_code,
                bc.title as business_case_title,
                st.name as status_name,
                st.code as status_code,
                pr.name as priority_name,
                cx.name as complexity_name,
                cx.metadata->>'story_points' as story_points
            FROM platform.dom_use_case uc
            JOIN platform.dom_business_case bc ON uc.business_case_id = bc.id
            JOIN platform.lkp_choice st ON uc.status_id = st.id
            JOIN platform.lkp_choice pr ON uc.priority_id = pr.id
            LEFT JOIN platform.lkp_choice cx ON uc.complexity_id = cx.id
            WHERE uc.deleted_at IS NULL
            ORDER BY uc.code
        """)
        return cur.fetchall()


def fetch_adrs(conn) -> List[Dict]:
    """Fetch all active ADRs."""
    with conn.cursor() as cur:
        cur.execute("""
            SELECT 
                adr.code,
                adr.title,
                adr.context,
                adr.decision,
                adr.consequences,
                adr.alternatives,
                adr.decision_drivers,
                adr.affected_components,
                adr.implementation_notes,
                adr.decision_date,
                bc.code as business_case_code,
                bc.title as business_case_title,
                st.name as status_name,
                st.code as status_code,
                st.metadata->>'badge' as status_badge,
                sup.code as supersedes_code
            FROM platform.dom_adr adr
            JOIN platform.lkp_choice st ON adr.status_id = st.id
            LEFT JOIN platform.dom_business_case bc ON adr.business_case_id = bc.id
            LEFT JOIN platform.dom_adr sup ON adr.supersedes_id = sup.id
            WHERE adr.deleted_at IS NULL
            ORDER BY adr.code
        """)
        return cur.fetchall()


def fetch_use_cases_for_bc(conn, bc_code: str) -> List[Dict]:
    """Fetch Use Cases for a specific Business Case."""
    with conn.cursor() as cur:
        cur.execute("""
            SELECT 
                uc.code,
                uc.title,
                uc.actor,
                st.name as status_name,
                pr.name as priority_name
            FROM platform.dom_use_case uc
            JOIN platform.dom_business_case bc ON uc.business_case_id = bc.id
            JOIN platform.lkp_choice st ON uc.status_id = st.id
            JOIN platform.lkp_choice pr ON uc.priority_id = pr.id
            WHERE bc.code = %s AND uc.deleted_at IS NULL
            ORDER BY uc.sort_order, uc.code
        """, (bc_code,))
        return cur.fetchall()


# ============================================================================
# RST GENERATION (Same as in Sphinx extension)
# ============================================================================

def generate_business_case_rst(bc: Dict, use_cases: List[Dict]) -> str:
    """Generate RST content for a Business Case."""
    lines = []
    
    # Title
    title = f"{bc['code']}: {bc['title']}"
    lines.append(title)
    lines.append("=" * len(title))
    lines.append("")
    
    # Metadata
    lines.append(f":Status: {bc['status_name']}")
    lines.append(f":Kategorie: {bc['category_name']}")
    lines.append(f":Erstellt: {bc['created_at'].strftime('%d.%m.%Y')}")
    lines.append(f":Aktualisiert: {bc['updated_at'].strftime('%d.%m.%Y')}")
    lines.append("")
    
    # Problem
    lines.append("Problem")
    lines.append("-" * 7)
    lines.append("")
    lines.append(bc['problem_statement'])
    lines.append("")
    
    # Target Audience
    if bc['target_audience']:
        lines.append("Zielgruppe")
        lines.append("-" * 10)
        lines.append("")
        lines.append(bc['target_audience'])
        lines.append("")
    
    # Expected Benefits
    if bc['expected_benefits']:
        lines.append("Erwarteter Nutzen")
        lines.append("-" * 17)
        lines.append("")
        lines.append(bc['expected_benefits'])
        lines.append("")
    
    # Success Criteria
    if bc['success_criteria']:
        lines.append("Erfolgskriterien")
        lines.append("-" * 16)
        lines.append("")
        for criterion in bc['success_criteria']:
            lines.append(f"* {criterion}")
        lines.append("")
    
    # Scope
    if bc['scope']:
        lines.append("Scope")
        lines.append("-" * 5)
        lines.append("")
        lines.append(bc['scope'])
        lines.append("")
    
    # Out of Scope
    if bc['out_of_scope']:
        lines.append("Out of Scope")
        lines.append("-" * 12)
        lines.append("")
        lines.append(bc['out_of_scope'])
        lines.append("")
    
    # Architecture
    if bc['architecture_basis']:
        lines.append("Architektur")
        lines.append("-" * 11)
        lines.append("")
        for key, value in bc['architecture_basis'].items():
            lines.append(f"* **{key}**: {value}")
        lines.append("")
    
    # Use Cases
    if use_cases:
        lines.append("Use Cases")
        lines.append("-" * 9)
        lines.append("")
        lines.append(".. list-table::")
        lines.append("   :header-rows: 1")
        lines.append("   :widths: 15 50 15 20")
        lines.append("")
        lines.append("   * - Code")
        lines.append("     - Titel")
        lines.append("     - Akteur")
        lines.append("     - Status")
        for uc in use_cases:
            lines.append(f"   * - :doc:`../use_cases/{uc['code']}`")
            lines.append(f"     - {uc['title']}")
            lines.append(f"     - {uc['actor'] or '-'}")
            lines.append(f"     - {uc['status_name']}")
        lines.append("")
    
    return "\n".join(lines)


def generate_use_case_rst(uc: Dict) -> str:
    """Generate RST content for a Use Case."""
    lines = []
    
    # Title
    title = f"{uc['code']}: {uc['title']}"
    lines.append(title)
    lines.append("=" * len(title))
    lines.append("")
    
    # Metadata
    lines.append(f":Business Case: :doc:`../business_cases/{uc['business_case_code']}`")
    lines.append(f":Status: {uc['status_name']}")
    lines.append(f":Priorität: {uc['priority_name']}")
    if uc['complexity_name']:
        lines.append(f":Komplexität: {uc['complexity_name']} ({uc['story_points'] or '?'} SP)")
    if uc['actor']:
        lines.append(f":Akteur: {uc['actor']}")
    lines.append("")
    
    # Description
    if uc['description']:
        lines.append("Beschreibung")
        lines.append("-" * 12)
        lines.append("")
        lines.append(uc['description'])
        lines.append("")
    
    # Preconditions
    if uc['preconditions']:
        lines.append("Vorbedingungen")
        lines.append("-" * 14)
        lines.append("")
        for pre in uc['preconditions']:
            lines.append(f"* {pre}")
        lines.append("")
    
    # Main Flow
    if uc['main_flow']:
        lines.append("Hauptablauf")
        lines.append("-" * 11)
        lines.append("")
        for step in uc['main_flow']:
            step_num = step.get('step', '?')
            desc = step.get('description', '')
            lines.append(f"{step_num}. {desc}")
        lines.append("")
    
    # Postconditions
    if uc['postconditions']:
        lines.append("Nachbedingungen")
        lines.append("-" * 15)
        lines.append("")
        for post in uc['postconditions']:
            lines.append(f"* {post}")
        lines.append("")
    
    # Business Rules
    if uc['business_rules']:
        lines.append("Geschäftsregeln")
        lines.append("-" * 15)
        lines.append("")
        for rule in uc['business_rules']:
            lines.append(f"* {rule}")
        lines.append("")
    
    # API Endpoints
    if uc['api_endpoints']:
        lines.append("API Endpoints")
        lines.append("-" * 13)
        lines.append("")
        lines.append(".. code-block::")
        lines.append("")
        for endpoint in uc['api_endpoints']:
            lines.append(f"   {endpoint}")
        lines.append("")
    
    return "\n".join(lines)


def generate_adr_rst(adr: Dict) -> str:
    """Generate RST content for an ADR."""
    lines = []
    
    # Title
    badge = adr['status_badge'] or adr['status_code'].upper()
    title = f"{adr['code']}: {adr['title']}"
    lines.append(title)
    lines.append("=" * len(title))
    lines.append("")
    
    # Status
    lines.append(f".. admonition:: Status: {badge}")
    lines.append("   :class: note")
    lines.append("")
    lines.append(f"   {adr['status_name']}")
    if adr['decision_date']:
        lines.append(f"   (Entschieden am {adr['decision_date'].strftime('%d.%m.%Y')})")
    lines.append("")
    
    # Business Case link
    if adr['business_case_code']:
        lines.append(f":Business Case: :doc:`../business_cases/{adr['business_case_code']}`")
        lines.append("")
    
    # Context
    lines.append("Kontext")
    lines.append("-" * 7)
    lines.append("")
    lines.append(adr['context'])
    lines.append("")
    
    # Decision
    lines.append("Entscheidung")
    lines.append("-" * 12)
    lines.append("")
    lines.append(adr['decision'])
    lines.append("")
    
    # Consequences
    if adr['consequences']:
        lines.append("Konsequenzen")
        lines.append("-" * 12)
        lines.append("")
        lines.append(adr['consequences'])
        lines.append("")
    
    return "\n".join(lines)


def generate_index_rst(entity_type: str, items: List[Dict]) -> str:
    """Generate index.rst for a document type."""
    titles = {
        'business_cases': 'Business Cases',
        'use_cases': 'Use Cases',
        'adrs': 'Architecture Decision Records',
    }
    
    lines = []
    lines.append(titles[entity_type])
    lines.append("=" * len(titles[entity_type]))
    lines.append("")
    lines.append(f"Automatisch generiert am {datetime.now().strftime('%d.%m.%Y %H:%M')}")
    lines.append("")
    lines.append(".. toctree::")
    lines.append("   :maxdepth: 1")
    lines.append("")
    
    for item in items:
        lines.append(f"   {item['code']}")
    
    lines.append("")
    return "\n".join(lines)


# ============================================================================
# FILE WRITING
# ============================================================================

def write_file(path: Path, content: str) -> None:
    """Write content to file, creating directories if needed."""
    path.parent.mkdir(parents=True, exist_ok=True)
    path.write_text(content, encoding='utf-8')
    print(f"  Written: {path}")


def export_all(output_dir: str) -> Dict[str, int]:
    """Export all documents from database."""
    output_path = Path(output_dir)
    stats = {'business_cases': 0, 'use_cases': 0, 'adrs': 0}
    
    conn = get_connection()
    
    try:
        # Export Business Cases
        print("Exporting Business Cases...")
        bc_dir = output_path / "business_cases"
        business_cases = fetch_business_cases(conn)
        
        for bc in business_cases:
            use_cases = fetch_use_cases_for_bc(conn, bc['code'])
            content = generate_business_case_rst(bc, use_cases)
            write_file(bc_dir / f"{bc['code']}.rst", content)
            stats['business_cases'] += 1
        
        # Write BC index
        write_file(bc_dir / "index.rst", generate_index_rst('business_cases', business_cases))
        
        # Export Use Cases
        print("Exporting Use Cases...")
        uc_dir = output_path / "use_cases"
        use_cases = fetch_use_cases(conn)
        
        for uc in use_cases:
            content = generate_use_case_rst(uc)
            write_file(uc_dir / f"{uc['code']}.rst", content)
            stats['use_cases'] += 1
        
        # Write UC index
        write_file(uc_dir / "index.rst", generate_index_rst('use_cases', use_cases))
        
        # Export ADRs
        print("Exporting ADRs...")
        adr_dir = output_path / "adrs"
        adrs = fetch_adrs(conn)
        
        for adr in adrs:
            content = generate_adr_rst(adr)
            write_file(adr_dir / f"{adr['code']}.rst", content)
            stats['adrs'] += 1
        
        # Write ADR index
        write_file(adr_dir / "index.rst", generate_index_rst('adrs', adrs))
        
    finally:
        conn.close()
    
    return stats


# ============================================================================
# MAIN
# ============================================================================

def main():
    parser = argparse.ArgumentParser(description='Export database documents to RST')
    parser.add_argument('--output-dir', required=True, help='Output directory')
    parser.add_argument('--format', default='rst', choices=['rst'], help='Output format')
    
    args = parser.parse_args()
    
    print(f"Exporting documents to {args.output_dir}...")
    stats = export_all(args.output_dir)
    
    print(f"\nExport complete:")
    print(f"  Business Cases: {stats['business_cases']}")
    print(f"  Use Cases: {stats['use_cases']}")
    print(f"  ADRs: {stats['adrs']}")


if __name__ == '__main__':
    main()
