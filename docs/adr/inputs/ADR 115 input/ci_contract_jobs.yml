# .github/workflows/_ci-python.yml
# Erweiterung: test-contract Job + architecture-guardian Erweiterung
#
# Fix H1: mypy --strict nur für eigene Apps, NICHT für alle imports
# Fix M1: Confirmation §2 konsistent mit CI (services.py + adapters/)

  # ── Contract-Tests (ADR-155) ────────────────────────────────────────────────
  test-contract:
    runs-on: [self-hosted, hetzner, dev]
    needs: [test-unit]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run Contract Tests
        # Fix ADR-076: exit code 5 = keine Tests gefunden → als Fehler behandeln
        run: |
          set -euo pipefail
          pytest tests/contracts/ \
            -m contract \
            -v \
            --tb=short \
            --no-header \
            --strict-markers \
            -p no:warnings 2>&1
          code=$?
          if [ $code -eq 5 ]; then
            echo "❌ ADR-155 Violation: Keine Contract-Tests in tests/contracts/"
            echo "   Mindestens 1 Contract-Test pro integriertem iil-Package erforderlich."
            echo "   Checkliste: ADR-155 §4.6"
            exit 1
          fi
          exit $code

      # Fix H1: mypy NUR für eigene Code-Layer — nicht für alle Imports
      # Fix M1: Konsistent mit Confirmation §2 (adapters/ + services/)
      - name: mypy — Adapter Layer (strict)
        run: |
          set -euo pipefail
          # Nur eigene Dateien prüfen — Third-Party via pyproject.toml konfiguriert
          if find apps -name "*.py" -path "*/adapters/*" | grep -q .; then
            mypy apps/*/adapters/ \
              --strict \
              --config-file pyproject.toml \
              --no-error-summary
          else
            echo "ℹ️  Keine adapters/-Dateien gefunden — OK für Hubs ohne Package-Adapter"
          fi

      - name: mypy — Service Layer (non-strict, progressiv)
        # Für Service-Layer: zunächst non-strict, da existing code nicht annotiert
        # Phase 2: --strict wenn alle Services annotiert sind
        run: |
          set -euo pipefail
          if find apps -name "services.py" | grep -q .; then
            mypy apps/*/services.py \
              --config-file pyproject.toml \
              --ignore-missing-imports \
              --no-error-summary \
              || echo "⚠️  mypy Service-Layer: Warnungen (non-blocking bis Phase 2)"
          fi

  # ── Architecture Guardian (ADR-054) — erweitert um ADR-155-Regeln ──────────
  architecture-guardian:
    runs-on: [self-hosted, hetzner, dev]
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Guardian — kein **kwargs-Forwarding in Adaptern (ADR-155 §4.3)
        # Fix K2: Nutzt erweiterten Guardian mit indirektem Pattern
        run: |
          set -euo pipefail
          if find apps -name "*.py" -path "*/adapters/*" | grep -q .; then
            python dev-hub/apps/architecture_guardian/rules/no_kwargs_forwarding.py .
          else
            echo "ℹ️  Keine adapters/-Dateien — Guardian-Check übersprungen"
          fi

      - name: Guardian — Contract-Tests vorhanden (ADR-155 §4.6)
        # Prüft ob tests/contracts/ mindestens eine test_*.py hat
        run: |
          set -euo pipefail
          contract_count=$(find tests/contracts/ -name "test_*.py" 2>/dev/null | wc -l)
          if [ "$contract_count" -eq 0 ]; then
            echo "❌ ADR-155: tests/contracts/ enthält keine Contract-Tests."
            echo "   Checkliste ADR-155 §4.6 befolgen."
            exit 1
          fi
          echo "✓ ADR-155: ${contract_count} Contract-Test-Datei(en) gefunden."

      - name: Guardian — py.typed in iil-Package-Abhängigkeiten (ADR-155 §4.1)
        # Soft-Check: Warnung wenn iil-Package kein py.typed hat
        run: |
          set -euo pipefail
          for pkg in outlinefw aifw promptfw authoringfw weltenfw; do
            pkg_path=$(python -c "import importlib.util; s=importlib.util.find_spec('${pkg}'); print(s.submodule_search_locations[0] if s else '')" 2>/dev/null || echo "")
            if [ -n "$pkg_path" ] && [ ! -f "${pkg_path}/py.typed" ]; then
              echo "⚠️  ADR-155: Package '${pkg}' hat kein py.typed — mypy kann Typ-Fehler nicht erkennen."
              echo "   Provider-Repo: py.typed Datei anlegen (PEP 561)."
            fi
          done
          echo "✓ Guardian py.typed Check abgeschlossen"
