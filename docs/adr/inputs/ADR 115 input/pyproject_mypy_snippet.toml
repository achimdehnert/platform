# Ergänzung für pyproject.toml in jedem Hub-Repo
# (Alternative zu tests/contracts/conftest.py — plattformweiter Standard)
#
# Wenn iil-testkit als pytest-Plugin registriert wird (empfohlen für Phase 2),
# entfällt diese manuelle Registrierung in jedem Repo.

[tool.pytest.ini_options]
markers = [
    "contract: Contract-Tests (ADR-155) — Signaturen, Exceptions, Shapes an Aufrufgrenzen",
    "integration: Integration-Tests mit Datenbank und externen Services (ADR-057)",
    "slow: Tests die > 5s dauern",
]
# Empfohlen: strict-markers in CI aktivieren
# addopts = "--strict-markers"

# mypy-Konfiguration (Fix H1: korrekte Scope-Trennung)
[tool.mypy]
python_version = "3.12"
strict = true
# WICHTIG: ignore_missing_imports = true als DEFAULT
# Nur explizit auf false für Packages mit py.typed setzen
ignore_missing_imports = true

# Fix H1: py.typed Packages explizit konfigurieren
# (nicht alle ungetypten Packages als Fehler behandeln)
[[tool.mypy.overrides]]
module = "outlinefw.*"
ignore_missing_imports = false   # hat py.typed

[[tool.mypy.overrides]]
module = "aifw.*"
ignore_missing_imports = false   # hat py.typed

[[tool.mypy.overrides]]
module = "platform_context.*"
ignore_missing_imports = false   # hat py.typed

# Ungetypte Third-Party-Packages — explizit ignorieren (nicht als Fehler)
[[tool.mypy.overrides]]
module = [
    "celery.*",
    "django.*",
    "redis.*",
    "boto3.*",
]
ignore_missing_imports = true    # kein py.typed — akzeptiert
