# detection_patterns/text/ai_text_v1.yaml
# ============================================================================
# AI Copy / Text Fingerprint Pattern Catalogue — v1.0 (2026-03-27)
# ============================================================================
# Based on analysis of:
#   - Originality.ai text classifier patterns (2025-2026)
#   - GPTZero linguistic fingerprints
#   - Anthropic model output studies
#   - Manual audit of 500+ AI-generated UI copy samples
#
# Format per pattern:
#   id:          Unique pattern ID
#   category:    cta | filler | structure | error | signature
#   lang:        de | en | both
#   weight:      Contribution to final score (category weights sum to 100)
#   description: Human-readable
#   detection:
#     type:      "phrase" | "regex" | "structural"
#     values:    List of matching strings (case-insensitive)
# ============================================================================

version: "1.0"
updated: "2026-03-27"
total_weight: 100

patterns:

