hub: bieterpilot
display_name: "bieterpilot"
voice_description: "Präzise Amtssprache trifft operative Schärfe. Kein Marketingsprech. Klare Anweisungen, direkte Handlungsaufforderungen. Wie ein erfahrener Ausschreibungsprofi spricht — sachkundig, verbindlich, ohne Schnörkel."
