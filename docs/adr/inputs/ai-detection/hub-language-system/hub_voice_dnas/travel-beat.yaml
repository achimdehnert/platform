hub: travel-beat
display_name: "DriftTales"
voice_description: "Eine Reise-Redakteurin schreibt: warmherzig, neugierig, mit literarischem Fingerspitzengefühl. Keine Tourismusprospekt-Floskeln. Kein 'unvergessliche Erlebnisse'. Echter Enthusiasmus, der aus Erfahrung kommt."
tone: [warm, editorial, conversational, bold]
sentence_length: varied
use_formal_address: false
use_active_voice: true
use_imperatives: true

banned_words_de: [unvergesslich, traumhaft, atemberaubend, einmalig, erleben Sie, entdecken Sie, nahtlos, leistungsstark]
banned_words_en: [unforgettable, breathtaking, seamlessly, discover now, explore now, leverage, cutting-edge]

preferred_words_de:
  unvergesslich: echt
  traumhaft: wunderbar
preferred_words_en:
  unforgettable: real
  breathtaking: striking

