---
# =============================================================================
# Design Fingerprint Audit — Hub Visual Identity System (ADR-051)
# =============================================================================
# Runs on every PR + daily schedule.
# CI gate: fails if any hub has fingerprint score >= 40.
# =============================================================================

name: Design Fingerprint Audit

on:
  push:
    branches: [main, develop]
    paths:
      - "hub_dnas/**"
      - "detection_patterns/**"
      - "tools/design_dna/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "hub_dnas/**"
      - "detection_patterns/**"
      - "tools/design_dna/**"
  schedule:
    # Daily at 06:00 UTC — catch pattern database updates
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: "Regenerate all CSS tokens before audit"
        type: boolean
        default: false

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  audit:
    name: "Fingerprint Audit"
    runs-on: [self-hosted, hetzner, dev]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euo pipefail
          pip install pydantic pyyaml anthropic --break-system-packages

      - name: Validate all Hub DNA schemas
        run: |
          set -euo pipefail
          python -m tools.design_dna validate
        working-directory: ${{ github.workspace }}

      - name: Generate CSS tokens
        if: ${{ github.event.inputs.force_regenerate == 'true' || github.event_name == 'schedule' }}
        run: |
          set -euo pipefail
          python -m tools.design_dna generate
        working-directory: ${{ github.workspace }}

      - name: Run AI Fingerprint Audit
        id: audit
        run: |
          set -euo pipefail
          python -m tools.design_dna audit \
            --ci \
            --output reports/audit-report.json
        working-directory: ${{ github.workspace }}

      - name: Upload Audit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fingerprint-audit-report
          path: reports/audit-report.json
          retention-days: 30

      - name: Post PR Comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('reports/audit-report.json', 'utf8'));
            const rows = report.reports.map(r => {
              const grade = r.grade;
              const emoji = r.passed ? '✅' : '❌';
              const bar = '█'.repeat(Math.floor(r.score / 5)) + '░'.repeat(20 - Math.floor(r.score / 5));
              return `| ${emoji} | ${r.hub} | ${r.score.toFixed(1)} | ${grade} | \`${bar}\` |`;
            });
            const failed = report.reports.filter(r => !r.passed);
            const body = [
              '## 🔍 AI Fingerprint Audit Report',
              '',
              '| | Hub | Score | Grade | Visual |',
              '|---|---|---|---|---|',
              ...rows,
              '',
              failed.length > 0
                ? `> ❌ **${failed.length} hub(s) failed** (score ≥ 40). Run \`python -m tools.design_dna mutate\` to generate evolved DNA.`
                : '> ✅ All hubs passed the fingerprint audit.',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
