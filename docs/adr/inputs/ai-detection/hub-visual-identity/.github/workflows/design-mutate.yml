---
# =============================================================================
# Design Mutation Engine — Hub Visual Identity System (ADR-051)
# =============================================================================
# Triggered manually or on schedule (quarterly).
# Uses Claude API to generate evolved DNA for hubs that fail the audit.
# Outputs updated DNA to a PR for review before merging.
# =============================================================================

name: Design Mutation Engine

on:
  workflow_dispatch:
    inputs:
      hub:
        description: "Specific hub to mutate (empty = all failing hubs)"
        type: string
        required: false
      strength:
        description: "Mutation strength"
        type: choice
        options: [low, medium, high]
        default: medium
      dry_run:
        description: "Dry run — show plan without calling API"
        type: boolean
        default: false
  schedule:
    # Quarterly: first Monday of Jan, Apr, Jul, Oct at 08:00 UTC
    - cron: "0 8 1-7 1,4,7,10 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  mutate:
    name: "Mutation Engine"
    runs-on: [self-hosted, hetzner, dev]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          set -euo pipefail
          pip install pydantic pyyaml anthropic --break-system-packages

      - name: Run Audit (get current scores)
        run: |
          set -euo pipefail
          python -m tools.design_dna generate
          python -m tools.design_dna audit --output reports/audit-report.json || true
          # Allow failure — mutation should still run even if all hubs fail

      - name: Run Mutation Engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          python -m tools.design_dna mutate \
            ${{ github.event.inputs.hub != '' && format('--hub {0}', github.event.inputs.hub) || '' }} \
            --strength ${{ github.event.inputs.strength || 'medium' }} \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Re-generate CSS with mutated DNA
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          # Copy mutated DNA files back to hub_dnas/ (from _mutated/ staging dir)
          if [ -d "hub_dnas/_mutated" ]; then
            cp hub_dnas/_mutated/*.yaml hub_dnas/ 2>/dev/null || true
            rm -rf hub_dnas/_mutated
          fi
          python -m tools.design_dna generate

      - name: Re-audit mutated hubs
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          python -m tools.design_dna audit --output reports/post-mutation-audit.json || true

      - name: Create Pull Request with mutations
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "design(dna): mutate hub visual identities to reduce AI fingerprint"
          branch: "design/mutation-${{ github.run_number }}"
          title: "🧬 Design DNA Mutation — AI Fingerprint Reduction"
          body: |
            ## 🧬 Automated Design DNA Mutation

            This PR was generated by the **Design Mutation Engine** (ADR-051).

            ### What changed
            - Updated `hub_dnas/*.yaml` for hubs with fingerprint score ≥ 40
            - Re-generated `generated/pui-tokens-*.css`
            - Mutation strength: `${{ github.event.inputs.strength || 'medium' }}`

            ### Review checklist
            - [ ] Visual diff looks acceptable (brand personality preserved)
            - [ ] New fonts load correctly from Bunny Fonts CDN
            - [ ] Post-mutation audit scores are all < 40
            - [ ] No breaking changes to `pui-*` CSS variable names

            ### Reports
            - Pre-mutation: `reports/audit-report.json`
            - Post-mutation: `reports/post-mutation-audit.json`

            ---
            *Triggered by: ${{ github.actor }} on ${{ github.event_name }}*
          labels: "design,automated,dna-mutation"
          draft: false
