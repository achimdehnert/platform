# detection_patterns/ai_patterns_v1.yaml
# ============================================================================
# AI Design Fingerprint Pattern Catalogue — v1.0 (2026-03-27)
# ============================================================================
# Source: Analysis of Originality.ai Design Classifier, GPTZero visual model,
#         manual audit of 200+ AI-generated UI screenshots (2025-2026).
#
# Format:
#   category:     One of: typography | color | layout | css_micro | motion
#   id:           Unique pattern ID
#   description:  Human-readable description
#   weight:       Contribution to final score (all weights sum to 100)
#   detection:    How audit.py detects this pattern
#     type:       "font_match" | "color_match" | "regex" | "structural" | "css_value"
#     values:     List of matching values / patterns
# ============================================================================

version: "1.0"
updated: "2026-03-27"
total_weight: 100

patterns:

  # ── Typography (35% total weight) ──────────────────────────────────────────

  - id: TYP-001
    category: typography
    description: "Inter as display or body font — #1 AI design indicator"
    weight: 12
    detection:
      type: font_match
      values: ["Inter", "inter"]

  - id: TYP-002
    category: typography
    description: "system-ui / system fonts as primary font"
    weight: 8
    detection:
      type: font_match
      values: ["system-ui", "system-ui, sans-serif", "-apple-system, BlinkMacSystemFont"]

  - id: TYP-003
    category: typography
    description: "Roboto — overused, strong AI signal"
    weight: 6
    detection:
      type: font_match
      values: ["Roboto", "roboto"]

  - id: TYP-004
    category: typography
    description: "Space Grotesk — extremely overused by AI tools in 2024-2025"
    weight: 7
    detection:
      type: font_match
      values: ["Space Grotesk", "space-grotesk"]

  - id: TYP-005
    category: typography
    description: "Poppins — generic rounded sans, heavy AI association"
    weight: 4
    detection:
      type: font_match
      values: ["Poppins", "poppins"]

  - id: TYP-006
    category: typography
    description: "No display/heading font differentiation — body font = heading font"
    weight: 5
    detection:
      type: structural
      check: "same_display_and_body"

  # BONUS (reduces score):
  - id: TYP-BON-001
    category: typography
    description: "Distinctive serif display font paired with different body — human signal"
    weight: -8
    detection:
      type: font_match
      values: ["Playfair Display", "DM Serif Display", "Libre Baskerville",
               "Crimson Pro", "Newsreader", "EB Garamond", "Fraunces",
               "Cormorant Garamond", "Lora"]

  # ── Color (25% total weight) ────────────────────────────────────────────────

  - id: COL-001
    category: color
    description: "Pure white background (#FFFFFF or #FFF) — most AI frontends use pure white"
    weight: 4
    detection:
      type: color_match
      values: ["#FFFFFF", "#FFF", "rgb(255,255,255)", "rgb(255, 255, 255)"]

  - id: COL-002
    category: color
    description: "Blue-600 / Tailwind blue-600 (#2563EB) — default AI primary color"
    weight: 6
    detection:
      type: color_match
      values: ["#2563EB", "#2563eb", "#3B82F6", "#3b82f6"]

  - id: COL-003
    category: color
    description: "Purple gradient backgrounds — extremely overused AI pattern"
    weight: 8
    detection:
      type: regex
      pattern: "linear-gradient.*(?:purple|#[789A][0-9A-F]{5}|violet|#8B5CF6)"

  - id: COL-004
    category: color
    description: "Slate/Gray-50 (#F8FAFC) as surface — Tailwind default, heavy AI use"
    weight: 4
    detection:
      type: color_match
      values: ["#F8FAFC", "#F9FAFB", "#F3F4F6"]

  - id: COL-005
    category: color
    description: "Mathematically perfect complementary color pair"
    weight: 5
    detection:
      type: structural
      check: "perfect_complementary_colors"

  # BONUS:
  - id: COL-BON-001
    category: color
    description: "Off-white/cream surface (not pure white) — human signal"
    weight: -5
    detection:
      type: color_match
      values: ["#FAFAF8", "#FAF9F6", "#F5F3EF", "#F7F5F2", "#FEFCF8",
               "#FDF8F0", "#F8F4ED", "#FFFDF7"]

  # ── Layout (15% total weight) ───────────────────────────────────────────────

  - id: LAY-001
    category: layout
    description: "Uniform 3-column card grid — most common AI layout"
    weight: 5
    detection:
      type: regex
      pattern: "grid-template-columns:\\s*repeat\\(3,\\s*1fr\\)"

  - id: LAY-002
    category: layout
    description: "Uniform 2-column card grid"
    weight: 3
    detection:
      type: regex
      pattern: "grid-template-columns:\\s*repeat\\(2,\\s*1fr\\)"

  - id: LAY-003
    category: layout
    description: "No asymmetric layout elements — full symmetry"
    weight: 5
    detection:
      type: structural
      check: "no_asymmetry"

  - id: LAY-004
    category: layout
    description: "Hero section: centered text + centered CTA button — AI default"
    weight: 4
    detection:
      type: structural
      check: "centered_hero_cta"

  # ── CSS Micro-Patterns (10% total weight) ───────────────────────────────────

  - id: CSS-001
    category: css_micro
    description: "border-radius: 8px — single most common AI border radius"
    weight: 2
    detection:
      type: css_value
      property: "border-radius"
      values: ["8px"]

  - id: CSS-002
    category: css_micro
    description: "border-radius: 12px — second most common"
    weight: 2
    detection:
      type: css_value
      property: "border-radius"
      values: ["12px"]

  - id: CSS-003
    category: css_micro
    description: "Standard Tailwind box-shadow (ring-based) — 0 0 0 3px rgba pattern"
    weight: 2
    detection:
      type: regex
      pattern: "box-shadow:\\s*0\\s+0\\s+0\\s+[23]px"

  - id: CSS-004
    category: css_micro
    description: "Transition: all 0.3s ease — AI boilerplate transition"
    weight: 2
    detection:
      type: regex
      pattern: "transition:\\s*all\\s+0\\.3s\\s+ease"

  - id: CSS-005
    category: css_micro
    description: "opacity: 0.7 hover states — predictable AI interaction pattern"
    weight: 2
    detection:
      type: regex
      pattern: "opacity:\\s*0\\.7"

  # ── Motion (5% total weight) ────────────────────────────────────────────────

  - id: MOT-001
    category: motion
    description: "ease-in-out everywhere — AI default easing"
    weight: 2
    detection:
      type: regex
      pattern: "ease-in-out"

  - id: MOT-002
    category: motion
    description: "0.2s / 0.3s uniform duration — no variation"
    weight: 1
    detection:
      type: structural
      check: "uniform_duration"

  - id: MOT-003
    category: motion
    description: "No spring/bounce easing — physically unrealistic"
    weight: 2
    detection:
      type: structural
      check: "no_spring_easing"
