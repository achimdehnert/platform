name: cascade-inbox-stale

on:
  schedule:
    - cron: "0 */6 * * *"   # Alle 6 Stunden prüfen
  workflow_dispatch:          # Manuell auslösbar

permissions:
  issues: write

jobs:
  check-stale-cascade-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Stale Cascade Tasks prüfen + Discord notifizieren
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK_AGENT_TASKS: ${{ secrets.DISCORD_WEBHOOK_AGENT_TASKS }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'cascade-task',
              per_page: 50,
            });

            const now = Date.now();
            const WARN_AFTER_MS  = 24 * 60 * 60 * 1000;   // 24h → Discord Warning
            const CLOSE_AFTER_MS = 72 * 60 * 60 * 1000;   // 72h → Auto-Close

            const warnings = [];
            const toClose  = [];

            for (const issue of issues) {
              const updatedAt = new Date(issue.updated_at).getTime();
              const ageMs = now - updatedAt;
              const ageH  = Math.floor(ageMs / 3600000);
              const hasStale = issue.labels.some(l => l.name === 'stale');

              if (ageMs >= CLOSE_AFTER_MS) {
                toClose.push({ number: issue.number, title: issue.title, ageH });
              } else if (ageMs >= WARN_AFTER_MS && !hasStale) {
                warnings.push({ number: issue.number, title: issue.title, ageH });
              }
            }

            // Stale-Label setzen
            for (const issue of warnings) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['stale'],
              });
              console.log(`Stale label set: #${issue.number}`);
            }

            // Issues schließen (72h ohne Antwort)
            for (const issue of toClose) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `⏰ **Auto-Close**: Dieser Cascade-Task wurde nach 72h ohne Antwort automatisch geschlossen.\n\nFalls noch relevant: bitte neu als \`/ask\` via Discord stellen.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned',
              });
              console.log(`Closed: #${issue.number}`);
            }

            // Discord Notification
            const webhookUrl = process.env.DISCORD_WEBHOOK_AGENT_TASKS;
            if (!webhookUrl) {
              console.log('No Discord webhook configured, skipping notification');
              return;
            }

            const allStale = [...warnings, ...toClose];
            if (allStale.length === 0) {
              console.log('No stale issues found.');
              return;
            }

            const fields = [];

            if (warnings.length > 0) {
              fields.push({
                name: `⚠️ ${warnings.length} Issues ohne Antwort (>24h)`,
                value: warnings.slice(0, 5).map(i =>
                  `[#${i.number}](https://github.com/${context.repo.owner}/${context.repo.repo}/issues/${i.number}) — ${i.title.substring(0, 60)} (${i.ageH}h)`
                ).join('\n'),
                inline: false,
              });
            }

            if (toClose.length > 0) {
              fields.push({
                name: `❌ ${toClose.length} Issues automatisch geschlossen (>72h)`,
                value: toClose.slice(0, 5).map(i =>
                  `#${i.number} — ${i.title.substring(0, 60)} (${i.ageH}h)`
                ).join('\n'),
                inline: false,
              });
            }

            const payload = {
              embeds: [{
                title: '⏰ Cascade Inbox — Stale Report',
                color: warnings.length > 0 ? 0xFEE75C : 0xED4245,
                fields,
                footer: { text: `Repo: ${context.repo.owner}/${context.repo.repo}` },
                timestamp: new Date().toISOString(),
              }],
            };

            const { default: https } = await import('https');
            const body = JSON.stringify(payload);
            await new Promise((resolve, reject) => {
              const url = new URL(webhookUrl);
              const req = https.request({
                hostname: url.hostname,
                path: url.pathname + url.search,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body),
                },
              }, res => {
                if (res.statusCode >= 200 && res.statusCode < 300) resolve(res);
                else reject(new Error(`Discord webhook: ${res.statusCode}`));
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });

            console.log(`Discord notified: ${warnings.length} warnings, ${toClose.length} closed`);
