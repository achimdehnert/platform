# docker-compose.llm-mcp.yml
# Extension für docker-compose.prod.yml — Layer 2 LLM Gateway Service.
#
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.llm-mcp.yml up -d
#
# Secrets via .env.llm_mcp (gitignored):
#   LLM_MCP_API_KEY=<interner service-zu-service key>
#   LLM_MCP_OPENROUTER_API_KEY=<openrouter key>

version: "3.9"

services:
  llm_mcp:
    build:
      context: ./llm_mcp
      dockerfile: Dockerfile
    image: iilgmbh/llm_mcp:${VERSION:-latest}
    container_name: llm_mcp
    restart: unless-stopped
    env_file:
      - .env.llm_mcp
    environment:
      LLM_MCP_DEFAULT_MODEL: "openai/gpt-4o"
      LLM_MCP_MAX_TOKENS: "2048"
      LLM_MCP_REQUEST_TIMEOUT: "55.0"
      LLM_MCP_LOG_LEVEL: "INFO"
    networks:
      - internal      # Nur intern erreichbar (kein Traefik-Expose!)
    ports: []         # Kein direkter Port-Expose in Produktion
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # Optional: Celery Task Alternative (Option B aus ADR-114 Review)
  # celery_worker:
  #   extends:
  #     file: docker-compose.prod.yml
  #     service: celery
  #   environment:
  #     CELERY_QUEUES: "llm_chat,default"

networks:
  internal:
    external: true    # Bereits in docker-compose.prod.yml definiert
