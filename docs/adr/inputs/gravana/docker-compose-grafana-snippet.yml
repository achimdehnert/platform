# docker-compose.llm-mcp.yml — Grafana Service (ADR-115)
# 
# Ergänzung zum bestehenden Stack.
# Nur der neue grafana-Service und das grafana-volume sind hier gezeigt.
# Den vollständigen compose-file mit den bestehenden Services zusammenführen.

services:

  grafana:
    image: grafana/grafana-oss:11.4.0  # Pinned version für Reproduzierbarkeit
    container_name: llm_mcp_grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"  # Nur lokal — Nginx-Proxy für extern
    environment:
      # Admin-Credentials
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY}

      # Server-Config
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-localhost}

      # Auth: Anonymous Access deaktivieren
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"

      # Provisioning: Auto-Update bei Dateiänderung
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: >-
        /etc/grafana/provisioning/dashboards/agent_controlling.json

      # DB-Verbindung für Datasource (Read-Only User!)
      GRAFANA_DB_HOST: ${POSTGRES_HOST:-postgres}
      GRAFANA_DB_PORT: ${POSTGRES_PORT:-5432}
      GRAFANA_DB_NAME: ${POSTGRES_DB:-orchestrator_mcp}
      GRAFANA_DB_USER: grafana_ro
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD}

      # Alerting
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"

      # Logging
      GF_LOG_MODE: console
      GF_LOG_LEVEL: warn

    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q '\"database\": \"ok\"'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    networks:
      - llm_mcp_internal
    
    depends_on:
      postgres:
        condition: service_healthy

    labels:
      - "com.platform.service=grafana"
      - "com.platform.adr=ADR-115"

volumes:
  grafana_data:
    driver: local

