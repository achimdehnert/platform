#!/usr/bin/env bash
# ============================================================================
# services.conf — Central Service Registry (Single Source of Truth)
# ============================================================================
#
# ALL deploy, rollback, backup, monitoring, and health-check scripts
# source this file instead of maintaining their own service maps.
#
# Location: platform/scripts/setup/services.conf
#
# To add a new service:
#   1. Add a line to SERVICES array below
#   2. That's it. All scripts pick it up automatically.
#
# Format per entry (pipe-delimited):
#   slug|deploy_path|web_service|compose_file|health_url|db_container|db_name|db_user|domains
#
# Fields:
#   slug          — Short name used in CLI (e.g. "bfagent")
#   deploy_path   — Absolute path on production server
#   web_service   — Docker Compose service name for the web container
#   compose_file  — Compose file name (relative to deploy_path)
#   health_url    — Public health-check URL (HTTPS)
#   db_container  — Docker container running PostgreSQL for this service
#   db_name       — Database name inside PostgreSQL
#   db_user       — PostgreSQL user
#   domains       — Comma-separated list of domains (for SSL checks)
#
# Use "-" for fields that don't apply (e.g. no DB, no health URL).
# ============================================================================

SERVICES=(
  "bfagent|/opt/bfagent-app|bfagent-web|docker-compose.prod.yml|https://bfagent.iil.pet/healthz/|bfagent_db|bfagent_prod|bfagent|bfagent.iil.pet"
  "travel-beat|/opt/travel-beat|travel-beat-web|docker-compose.prod.yml|https://drifttales.com/health/|travel_beat_db|travel_beat|travelbeat|drifttales.com"
  "weltenhub|/opt/weltenhub|weltenhub-web|docker-compose.prod.yml|https://weltenforger.com/health/|bfagent_db|weltenhub|bfagent|weltenforger.com"
  "risk-hub|/opt/risk-hub|risk-hub-web|docker-compose.prod.yml|https://demo.schutztat.de/health/|risk_hub_db|risk_hub|risk_hub|demo.schutztat.de"
  "dev-hub|/opt/dev-hub|devhub-web|docker-compose.prod.yml|https://devhub.iil.pet/livez/|bfagent_db|devhub_db|bfagent|devhub.iil.pet"
  "pptx-hub|/opt/pptx-hub|pptx-hub-web|docker-compose.prod.yml|https://prezimo.com/livez/|pptx_hub_db|pptx_hub|pptx_hub|prezimo.com"
  "coach-hub|/opt/coach-hub|coach-hub-web|docker-compose.prod.yml|http://127.0.0.1:8007/livez/|coach_hub_db|coach_hub|coach_hub|-"
  "trading-hub|/opt/trading-hub|trading-hub-web|docker-compose.prod.yml|https://trading-hub.iil.pet/livez/|trading_hub_db|tradinghub_prod|bfagent|trading-hub.iil.pet"
  "wedding-hub|/opt/wedding-hub|wedding-hub-web|docker-compose.prod.yml|https://wedding-hub.iil.pet/livez/|wedding_hub_db|wedding_hub|wedding_hub|wedding-hub.iil.pet"
  "cad-hub|/opt/cad-hub|web|docker-compose.prod.yml|https://nl2cad.de/livez/|cad_hub_db|cad_hub|postgres|nl2cad.de"
)

# ============================================================================
# Helper functions — sourced by all scripts
# ============================================================================

# Parse a service entry into variables.
# Usage: _parse_service "$entry"
# Sets: SVC_SLUG, SVC_PATH, SVC_WEB, SVC_COMPOSE, SVC_HEALTH,
#        SVC_DB_CTR, SVC_DB_NAME, SVC_DB_USER, SVC_DOMAINS
_parse_service() {
    local IFS='|'
    read -r SVC_SLUG SVC_PATH SVC_WEB SVC_COMPOSE SVC_HEALTH \
            SVC_DB_CTR SVC_DB_NAME SVC_DB_USER SVC_DOMAINS <<< "$1"
}

# Find a service entry by slug. Returns 0 if found, 1 if not.
# Usage: _find_service "bfagent"
# On success, sets SVC_* variables via _parse_service.
_find_service() {
    local target="$1"
    for entry in "${SERVICES[@]}"; do
        _parse_service "$entry"
        if [[ "$SVC_SLUG" == "$target" ]]; then
            return 0
        fi
    done
    return 1
}

# List all valid service slugs (for error messages).
_list_slugs() {
    local slugs=()
    for entry in "${SERVICES[@]}"; do
        slugs+=("${entry%%|*}")
    done
    echo "${slugs[*]}"
}

# Collect all unique domains from all services (for SSL checks).
_all_domains() {
    local domains=()
    for entry in "${SERVICES[@]}"; do
        _parse_service "$entry"
        if [[ "$SVC_DOMAINS" != "-" ]]; then
            IFS=',' read -ra doms <<< "$SVC_DOMAINS"
            for d in "${doms[@]}"; do
                domains+=("$d")
            done
        fi
    done
    # Unique
    printf '%s\n' "${domains[@]}" | sort -u
}

# Check if a field is set (not "-" placeholder).
_has_field() {
    [[ -n "$1" && "$1" != "-" ]]
}
