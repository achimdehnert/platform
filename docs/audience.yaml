# platform/docs/audience.yaml
#
# Audience Navigator Konfiguration für das platform-Repo.
# Schema-Version: 1 (audience_validator.py, ADR-158)
#
# WICHTIG:
# - type: outline → collections: [] (Array mit exakten Outline-Collection-Namen)
#   KEIN freier query-String (Review-Fix H-02)
# - AGENT_HANDOVER.md NICHT in operator.sources (Review-Fix M-04, ADR-154)
# - Änderungen werden via `manage.py load_audience_config` in DB importiert

schema_version: 1

audiences:

  user:
    title: "Für Anwender"
    icon: "users"
    sources:
      - type: github
        paths:
          - "docs/tutorials/"
          - "README.md"
      - type: outline
        collections:
          - "User Guides"
          - "FAQ"

  developer:
    title: "Für Entwickler"
    icon: "code"
    sources:
      - type: github
        paths:
          - "CORE_CONTEXT.md"
          - "AGENT_HANDOVER.md"
          - "docs/guides/"
          - "docs/reference/"
      - type: techdocs
        site_slug: "platform"
      - type: outline
        collections:
          - "Getting Started"
          - "Development Guides"

  architect:
    title: "Für Architekten"
    icon: "building"
    sources:
      - type: github
        paths:
          - "docs/adr/"
          - "docs/explanation/"
      - type: outline
        collections:
          - "Konzepte"
          - "Lessons Learned"
          - "Architektur-Entscheidungen"
      - type: techdocs
        site_slug: "platform"
        filter: "explanation/"

  operator:
    title: "Für Betreiber"
    icon: "server"
    sources:
      - type: outline
        collections:
          - "Runbooks"
          - "Operations"
          - "Incident Reports"
      - type: devhub
        apps:
          - "health"
          - "operations"
      - type: github
        paths:
          - "docs/guides/deployment.md"
          # AGENT_HANDOVER.md intentionally excluded — agent-context only (ADR-154)
