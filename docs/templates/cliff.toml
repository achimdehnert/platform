# cliff.toml — git-cliff Konfiguration für automatisches CHANGELOG
# Kopiere in Repo-Root als cliff.toml
# Verwendung: pip install git-cliff && git-cliff -o CHANGELOG.md
# CI: git-cliff --latest -o CHANGELOG.md && git add CHANGELOG.md && git commit -m "docs: update CHANGELOG"
# Passt zu IIL Platform Commit-Format: [feat/fix/refactor/docs/test/chore] module: description

[changelog]
header = """
# Changelog

Alle nennenswerten Änderungen an diesem Projekt.
Format: [Semantic Versioning](https://semver.org/lang/de/)
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}⚠️ **BREAKING CHANGE**: {% endif %}\
  {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
  {{ commit.message | upper_first }}\
  {% if commit.id %} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/achimdehnert/{{ env.REPO_NAME }}/commit/{{ commit.id }})){% endif %}
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = false    # IIL nutzt [TAG] nicht conventional-commits-Spec
filter_unconventional = false
commit_parsers = [
  { message = "^\\[feat\\]",     group = "Features" },
  { message = "^\\[fix\\]",      group = "Bug Fixes" },
  { message = "^\\[refactor\\]", group = "Refactoring" },
  { message = "^\\[perf\\]",     group = "Performance" },
  { message = "^\\[docs\\]",     group = "Dokumentation" },
  { message = "^\\[test\\]",     group = "Tests" },
  { message = "^\\[chore\\]",    group = "Maintenance", skip = true },
  { message = "^chore\\(deps\\)",group = "Dependency Updates", skip = true },
  { message = "^Merge",          skip = true },
  { message = ".*",              group = "Sonstiges" },
]
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = "v0\\.1\\.0-beta\\.1"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
