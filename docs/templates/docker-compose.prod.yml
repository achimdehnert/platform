# IIL Platform — docker-compose.prod.yml (Golden Path)
# Kopiere in Repo-Root und ersetze REPO_NAME + PORT
# Referenz: ADR-022 (env_file statt environment:${VAR}), ADR-056 (Health)

services:
  web:
    image: ghcr.io/achimdehnert/REPO_NAME-web:${IMAGE_TAG:-latest}
    env_file: .env.prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:PORT:8000"
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/livez/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  migrate:
    image: ghcr.io/achimdehnert/REPO_NAME-web:${IMAGE_TAG:-latest}
    env_file: .env.prod
    command: python manage.py migrate --no-input
    depends_on:
      - db
    restart: "no"

  db:
    image: postgres:16-alpine
    env_file: .env.prod
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
