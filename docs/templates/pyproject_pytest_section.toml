# pyproject.toml pytest section — ADR-057 §2.2 standard configuration
# GENERATED via: python3 platform/scripts/gen_test_scaffold.py <repo>
# DO NOT edit manually — run gen_test_scaffold.py --update to refresh

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"  # adjust per repo
python_files = ["test_*.py"]
python_functions = ["test_should_*"]  # ADR-057: test_should_* naming mandatory
iil_naming_mode = "error"              # iil-testkit plugin: enforce naming (warn | error)
addopts = [
    "--strict-markers",
    "--tb=short",
    "-ra",
    "--no-header",
    # "-n", "auto",          # pytest-xdist: aktivieren wenn pytest-xdist installiert
    "--cov",
    "--cov-report=term-missing:skip-covered",
    "--cov-fail-under=80",
]
markers = [
    "unit: Unit-Tests (kein DB-Zugriff)",
    "integration: Integration-Tests (Django Test Client, DB)",
    "contract: Contract-Tests (Schemathesis, API)",
    "slow: Tests die laenger als 5s dauern",
]

[tool.coverage.run]
source = ["apps"]
omit = [
    "*/migrations/*",
    "*/admin.py",
    "*/apps.py",
    "*/tests/*",
    "config/*",
    "manage.py",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
