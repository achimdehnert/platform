# pyproject.toml pytest section — ADR-057 §2.2 standard configuration
# Merge into existing pyproject.toml in each service repo
# Adjust DJANGO_SETTINGS_MODULE if settings path differs

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--tb=short",
    "-ra",
    "--no-header",
    "-n auto",               # pytest-xdist: parallel execution
    "--dist=loadscope",      # Tests in same class on same worker — prevents DB race conditions
    "--randomly-seed=last",  # Reproduce last failing order: pytest --randomly-seed=last
]
markers = [
    "slow: Tests die > 1s dauern",
    "contract: Contract Tests gegen andere Services",
    "integration: Tests die DB oder externe Services brauchen",
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning:django.*:",
]

[tool.coverage.run]
source = ["apps"]
omit = [
    "*/migrations/*",
    "*/admin.py",
    "*/apps.py",
    "*/tests/*",
    "config/*",
    "manage.py",
]

[tool.coverage.report]
fail_under = 0    # Phase 1: kein Gate, nur Report — auf 70 anheben in Phase 3
show_missing = true
