# Governance App - Separate Deployment
# governance.iil.pet

services:
  governance-web:
    build: .
    container_name: governance_web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8082:8000"
    networks:
      - bf_platform_prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  bf_platform_prod:
    external: true
