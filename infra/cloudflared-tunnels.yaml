# platform/infra/cloudflared-tunnels.yaml
# ═══════════════════════════════════════════════════════════════════════════════
# Single Source of Truth für Cloudflare-Tunnel-IDs und -Hostnames (ADR-198).
#
# Edge-Routing-Mapping `server → tunnel`. `infra/ports.yaml` referenziert nur
# Ports + Domains, NICHT Tunnel-Details (ADR-198 §4.4).
#
# Onboarding-Scripts (siehe ADR-198 §4.5) lesen diese Datei, um DNS-CNAMEs
# konsistent zu setzen — niemals UI-Klicks im Cloudflare-Dashboard.
# ═══════════════════════════════════════════════════════════════════════════════

tunnels:

  bf-platform:
    id: f758021c-a475-4ab7-9c02-1c14599a38e2
    hostname: f758021c-a475-4ab7-9c02-1c14599a38e2.cfargotunnel.com
    server: prod          # 88.198.191.108 (Hetzner CPX52)
    origin: "https://localhost:443"
    no_tls_verify: true
    created: "2026-03-06"  # ADR-102 §5.2
    monitoring: "Uptime-Kuma + CF Notifications"
    notes: |
      Catch-all Tunnel auf Prod-Nginx. Routet alle <app>.iil.pet,
      iil.pet, Custom-TLDs via server_name. Origin-Cert irrelevant
      wegen noTLSVerify=true.

  bf-staging:
    id: 2a517762-d011-4bf8-8405-9bd237b2c4f4
    hostname: 2a517762-d011-4bf8-8405-9bd237b2c4f4.cfargotunnel.com
    server: staging        # 178.104.184.168 (Hetzner CPX42)
    origin: "http://localhost:80"
    no_tls_verify: null    # n/a — Loopback HTTP
    created: "2026-05-14"
    monitoring: "Uptime-Kuma (Pilot-Host: staging-writing.iil.pet/livez/)"
    notes: |
      Erzeugt am 2026-05-14 (ADR-198 §7 Phase 1). systemd cloudflared.service
      läuft auf 178.104.184.168. Pilot-CNAME staging-writing.iil.pet ist live.
      DNS-Massen-Umbiegung über `python3 infra/scripts/dns_staging_sync.py --apply`.

  ollama-4090:
    id: 1d85d3ac-3eea-421e-ad31-19d3295815bf
    hostname: 1d85d3ac-3eea-421e-ad31-19d3295815bf.cfargotunnel.com
    server: home-4090     # Achims Windows-Workstation (RTX 4090), privates LAN
    origin: "http://localhost:11434"
    no_tls_verify: null    # n/a — Loopback HTTP
    created: "2026-07-13"
    monitoring: "curl https://ollama.iil.pet/api/tags → 200 + Modell-Liste"
    notes: |
      Named tunnel von der Heim-4090 (NICHT Hetzner) — exponiert lokales Ollama als
      ollama.iil.pet für Dev/Benchmark + open-mPA-Pfad des iil-voice-agent.
      Modelle: qwen2.5:7b (strict-validiert, iil-voice-agent#90), dolphin3 (verworfen).
      Cloudflare Access AKTIV (2026-07-13): App cc559065-7b4b-4ceb-b969-8ec66fa57cce,
      Policy Service-Auth, Service-Token "ollama-voice-agent" (id fb6afc15-…). Verifiziert:
      ohne Token 403, mit CF-Access-Client-Id/-Secret 200. Creds → ~/.secrets (Betreiber).
      ⚠️ NICHT für strict-meiki-Bürgerdaten (Perimeter, ADR-249): der souveräne Pfad
         bleibt privates on-prem, nicht dieser öffentliche Tunnel.

# ═══════════════════════════════════════════════════════════════════════════════
# Advanced Certificate Manager (ACM) — pro Zone aktivierbar
#
# Universal SSL deckt nur Zone + 1 Wildcard-Level ab (ADR-198 §1.1).
# Für Multi-Tenant-Hubs mit 2-Label-Wildcards (z.B. *.staging.schutztat.de)
# wird ACM benötigt — $10/Monat pro Zone.
# ═══════════════════════════════════════════════════════════════════════════════

zones:

  iil.pet:
    universal_ssl: true
    acm_required: false
    rationale: "Single-Level-Konvention staging-<app>.iil.pet reicht."

  schutztat.de:
    universal_ssl: true
    acm_required: true
    rationale: "risk-hub Multi-Tenancy *.staging.schutztat.de braucht 2-Label-Wildcard."
    monthly_cost_usd: 10

  drifttales.com:
    universal_ssl: true
    acm_required: false

  drifttales.de:
    universal_ssl: true
    acm_required: false

  drifttales.app:
    universal_ssl: true
    acm_required: false

  ai-trades.de:
    universal_ssl: true
    acm_required: false

  nl2cad.de:
    universal_ssl: true
    acm_required: false

  prezimo.de:
    universal_ssl: true
    acm_required: false

  prezimo.com:
    universal_ssl: true
    acm_required: false

  weltenforger.com:
    universal_ssl: true
    acm_required: false

  weltenforger.de:
    universal_ssl: true
    acm_required: false

  kiohnerisiko.de:
    universal_ssl: true
    acm_required: false
    notes: "Alias-Domain risk-hub — Prod-Redirect, kein Staging."

  137herz.de:
    universal_ssl: true
    acm_required: false

  137herz.ai:
    universal_ssl: true
    acm_required: false

  bieterpilot.de:
    universal_ssl: true
    acm_required: false

  wishreads.com:
    universal_ssl: true
    acm_required: false

  wishreads.app:
    universal_ssl: true
    acm_required: false

