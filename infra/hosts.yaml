# platform/infra/hosts.yaml
# ═══════════════════════════════════════════════════════════════════════════════
# Single Source of Truth für PHYSISCHE HOSTS + CI-RUNNER-TOPOLOGIE
#
# Warum diese Datei existiert:
#   Wiederkehrendes Problem (User-Kritik 2026-06-17): der Agent hat keine
#   Transparenz über die TATSÄCHLICHE Infrastruktur — welche Server existieren,
#   wo sie liegen, welche GitHub-Actions-Runner mit welchen Labels laufen. Das war
#   2026-06-15 die Outage-Wurzel (137-hub COMPOSE-Kollision auf Multi-Hub-Host) und
#   2026-06-17 der Merge-Blocker (toter `hetzner`-Runner-Pin in complete-check.yml).
#
# WICHTIG: Diese Datei MUSS den realen Server-Zustand abbilden.
#   Hosts prüfen:   python infra/scripts/server_probe.py --host <ip>
#   Runner prüfen:  gh api repos/<owner>/<repo>/actions/runners
#   Ports:          siehe infra/ports.yaml (eigene SoT)
#
# Ground-Truth-Stand: 2026-07-22 (verifiziert per SSH-Probe + Hetzner-Cloud-API; siehe `verified`).
# ═══════════════════════════════════════════════════════════════════════════════

hosts:
  prod:
    ip: 88.198.191.108
    ssh: root@88.198.191.108
    ssh_alias: hetzner-prod            # ~/.ssh/config
    hostname: ubuntu-8gb-nbg1-1        # ⚠ LEGACY-NAME, LÜGT: die Box wurde vergrößert.
    # Real (API + on-host, 2026-07-22): Hetzner Cloud `cpx52` = 12 vCPU / 24 GB / 480 GB,
    # AMD EPYC-Genoa, Rechenzentrum nbg1-dc3, Cloud-Name `iilgmbh-prod` (id 114710083).
    # Dazu Volume `iilgbmh-docker` (350 GB, id 105908261) gemountet als /var/lib/docker.
    cloud_name: iilgmbh-prod
    server_type: cpx52                 # 12 vCPU / 24 GB / 480 GB
    datacenter: nbg1-dc3
    os: Ubuntu 24.04.3 LTS
    provider: Hetzner (nbg1)
    role: >
      Produktions-Multi-Hub-Host. Trägt ALLE Prod-Container aller Hubs
      (risk-hub→schutztat.de, billing-hub, trading-hub, …) als getrennte
      docker-compose-Projekte auf EINER Engine. Multi-Hub-Host → COMPOSE_PROJECT_NAME
      pro Hub pinnen (ADR-248), sonst Cross-Projekt-Orphan-Removal.
      ⚠ SPEICHERNOTLAGE (#1303): 113 Container, Swap dauerhaft 100 %, 9 OOM-Kills in
      16 Tagen Uptime bei 94 % CPU-Idle — das Problem ist RAM, nicht CPU. Entlastung
      läuft über `prod-b` (unten) + Runner-Verlagerung (ADR-257) + Freeze #1314.
    hosts_runners: [prod-server]
    verified: 2026-07-22               # SSH-Probe + Hetzner-Cloud-API

  prod-b:
    ip: 89.167.43.30
    ssh: root@89.167.43.30
    cloud_name: iilgmbh-prod-b         # id 123575372, vormals `lastwar-bot`
    server_type: cpx42                 # 8 vCPU / 16 GB / 301 GB
    datacenter: hel1-dc2               # Finnland — siehe Standort-Auflage unten
    os: Ubuntu 24.04.4 LTS
    provider: Hetzner (hel1)
    firewall: prod-b-web               # id 11351382 — nur 22/80/443 + ICMP
    role: >
      Zweiter Prod-Host, angelegt 2026-07-22 durch Rebuild der zuvor ungenutzten
      Maschine `lastwar-bot` (89 Tage Uptime, Load 0,00, 0,3 GB Traffic) — daher
      0 EUR Mehrkosten (grandfathered cpx42) statt Neukauf. Trägt den Long Tail der
      Hubs, die von `prod` wegwandern. Docker 29.6.2 + Compose v5.3.1.
      STANDORT-AUFLAGE: Hetzner-Standort ist Helsinki. Der Owner hat hel1 für alles
      AUSSER Gov-Workloads freigegeben (2026-07-22). Einziger echter Gov-/Sozialdaten-
      Workload ist meiki-lra/frist-hub — der gehört NICHT hierher. `ttz` und
      `writing-hub` sind ausdrücklich unkritisch (keine Personendaten, kein Public
      Sector) und dürfen hier laufen.
      Archiv des Vorzustands: Snapshot `lastwar-bot-archive-20260722` (id 411324113,
      7,8 GB) — Android-SDK/Emulator-Projekt, auf einen Server mit >=301 GB Disk
      wiederherstellbar.
    hosts_runners: []                  # TODO: Runner je umgezogenem Repo registrieren
    verified: 2026-07-22               # SSH + docker --version on-host

  staging:
    ip: 88.99.38.75
    ssh: root@88.99.38.75              # Admin/Deploy-Zugang
    ssh_interactive: devuser@88.99.38.75  # interaktiver Dev-Account — Default für Dev-Arbeit auf diesem Host
    hostname: dev-desktop              # Label in infra-Skripten; OS-Hostname real: ubuntu-32gb-fsn1-1
    cloud_name: moonlight-sunshine     # id 125584724 — Name kommt vom Sunshine/Moonlight-
    server_type: cpx62                 # Desktop-Streaming, das hier zusätzlich läuft
    datacenter: fsn1-dc8               # 16 vCPU / 32 GB / 640 GB
    # ⚠ NAMENS-DRIFT (2026-07-02): ports.yaml nennt diesen Host "dev"
    #   (servers.dev), diese Datei "staging" — real spielt er BEIDE Rollen
    #   (siehe role). Empfohlene ~/.ssh/config-Aliase: fsn1 / hetzner-devuser.
    #   Der Alias "dev-server" (46.225.113.1) ist TOT — alter dev-server,
    #   nicht mehr existent (dns_staging_sync.py) — aus SSH-Configs entfernen.
    # Dauerdienste (devuser, systemd --user): kd-server auf 127.0.0.1:8130
    #   (Klickdummy-Bewertung, ~/kd-serve/, Tunnel: LocalForward 8130)
    provider: Hetzner
    role: >
      Staging-/Dev-Host. Trägt Staging-Container (risk_hub_staging_*,
      cad_hub_staging_web, …) + diverse *_local_*-Dev-Stacks + ib_gateway.
      Staging-Ingress via eigenem cloudflared (staging-riskhub.iil.pet).
      Trägt seit 2026-06-28 den Non-Prod-CI-Runner (ADR-257, Pilot travel-beat) —
      KEINE Prod-Container auf dieser Engine (Bedingung ADR-257 Entscheidung 1).
    hosts_runners: [staging-ci]
    verified: 2026-06-28               # on-host: 16 CPU/32 GB/601 G; staging-ci-Runner registriert + online

  staging-dedicated:
    ip: 178.104.184.168
    ssh: root@178.104.184.168
    cloud_name: staging-platform       # id 127038422
    server_type: cpx42                 # 8 vCPU / 16 GB / 301 GB
    datacenter: fsn1-dc8
    role: >
      ROLLEN-KLÄRUNG ERLEDIGT (2026-07-22, on-host verifiziert): dedizierter
      Staging-Host. Trägt 12 Container — risk-hub-Staging (risk_hub_web/db/redis/
      minio/celery/worker/celery_beat), dev-hub-Staging (dev_hub_staging_*) und
      klickdummy; /opt hält dev-hub-staging, klickdummy, risk-hub, scripts,
      shared-secrets. Deutlich unterausgelastet: 3,6 von 16 GB belegt, Disk 6,2 von
      301 GB, Uptime 97 Tage.
      ⚠ Doppelung mit `staging` (88.99.38.75): risk-hub-Staging und dev-hub-Staging
      existieren auf BEIDEN Hosts. Konsolidierung ist offen.
    hosts_runners: []
    verified: 2026-07-22               # SSH-Probe on-host

  odoo:
    ip: 46.225.127.211
    ssh_alias: hetzner-odoo            # ~/.ssh/config
    os: Ubuntu (4 vCPU / 8 GB / 150 GB)
    role: >
      Odoo-Host, NICHT im selben Hetzner-Cloud-Projekt wie die vier Hosts oben
      (taucht unter dem Projekt-Token nicht auf) — eigenes Konto/Projekt.
      Trägt odoo_web/odoo_db plus einen vollständigen Monitoring-Stack
      (traefik, prometheus, grafana, loki, promtail, node_exporter,
      postgres_exporter). Uptime 159 Tage, 1,5 von 7,7 GB belegt.
      💡 Dieser Stack ist der einzige im Bestand — `prod` hat KEIN Monitoring, was
      der Grund war, dass der OOM-Ausfall am 2026-07-20 16 h unbemerkt blieb.
      Naheliegend: prod per node_exporter/cadvisor hier anmelden (0 EUR).
      Bekannter Defekt: `aifw_service` in Restart-Schleife.
    hosts_runners: []
    verified: 2026-07-22               # SSH-Probe on-host

# ─────────────────────────────────────────────────────────────────────────────
# GitHub-Actions Self-Hosted Runner
# ─────────────────────────────────────────────────────────────────────────────
# Label-Konvention: Deploy/host-gebundene Jobs → `prod-server` (unique Label, NICHT
# plain self-hosted, das matcht seit ADR-257 mehrere Runner). CI/Build → `ci-nonprod`
# (staging-ci-Runner). Die Labels `hetzner` und `dev` sind TOT (verwaister, offline
# dev-hetzner-2) — NICHT mehr verwenden.
runners:
  prod-server:
    host: prod                         # 88.198.191.108
    status: online                     # Stand 2026-06-17
    labels: [self-hosted, Linux, X64, prod, prod-server]
    scope: per-repo
    install: /opt/actions-runner-<repo>
    service: actions.runner.achimdehnert-<repo>.prod-server.service
    note: >
      Ein dedizierter Runner pro Repo (risk-hub, billing-hub, trading-hub,
      platform, … alle 23 Repos). Verarbeitet alles mit `runs-on: self-hosted`.
      Ein Runner pro Repo → Jobs eines PRs laufen sequenziell.
      ADR-257: für CI/Build deprecated (Migration läuft; Deploy bleibt hier, ADR-156).
    verified: 2026-06-17

  staging-ci:
    host: staging                      # 88.99.38.75
    status: online                     # 2026-06-28 registriert + verifiziert (gh api)
    labels: [self-hosted, Linux, X64, ci-nonprod]
    scope: per-repo
    install: /opt/actions-runner-<repo>
    service: actions.runner.achimdehnert-<repo>.<repo>-staging-ci.service
    runner_user: github-ci             # NICHT root (REC-5); in docker-group für buildx
    note: >
      Non-Prod-CI-Runner (ADR-257). Trägt CI/Build-Jobs, die per shared-ci-Input
      `runs_on: ci-nonprod` hierher gelenkt werden; host-gebundene Deploys bleiben
      via `deploy_runs_on: prod-server` auf dem Prod-Host. Pilot-Repo: travel-beat
      (`travel-beat-staging-ci`). Weitere Hubs gestaffelt via ADR-222-Familie.
    verified: 2026-06-28

  dev-hetzner-2:
    host: UNKNOWN                       # auf keinem erreichbaren Host installiert
    status: deleted                     # 2026-06-17 dereg. (id=23 auf risk-hub gelöscht)
    labels: [self-hosted, Linux, X64, hetzner, dev]
    note: >
      War eine VERWAISTE Registrierung: in GitHub als Runner geführt, aber auf
      KEINEM erreichbaren Host (nicht prod, nicht staging/dev-desktop; nicht in
      ssh-config/known_hosts/infra-configs). >13h offline am 2026-06-17 → blockierte
      ALLE risk-hub-Merges (die toten Labels `hetzner`/`dev` zeigten nur auf ihn).
      Am 2026-06-17 dereg. (`gh api -X DELETE …/actions/runners/23` auf risk-hub;
      auf keinem anderen Repo registriert). Eintrag bleibt als Lehre/Historie.
    verified: 2026-06-17

# Workflows mit toten Labels — alle bereinigt (2026-06-17). Neue Workflows: runs-on: self-hosted.
