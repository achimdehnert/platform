# platform/infra/hosts.yaml
# ═══════════════════════════════════════════════════════════════════════════════
# Single Source of Truth für PHYSISCHE HOSTS + CI-RUNNER-TOPOLOGIE
#
# Warum diese Datei existiert:
#   Wiederkehrendes Problem (User-Kritik 2026-06-17): der Agent hat keine
#   Transparenz über die TATSÄCHLICHE Infrastruktur — welche Server existieren,
#   wo sie liegen, welche GitHub-Actions-Runner mit welchen Labels laufen. Das war
#   2026-06-15 die Outage-Wurzel (137-hub COMPOSE-Kollision auf Multi-Hub-Host) und
#   2026-06-17 der Merge-Blocker (toter `hetzner`-Runner-Pin in complete-check.yml).
#
# WICHTIG: Diese Datei MUSS den realen Server-Zustand abbilden.
#   Hosts prüfen:   python infra/scripts/server_probe.py --host <ip>
#   Runner prüfen:  gh api repos/<owner>/<repo>/actions/runners
#   Ports:          siehe infra/ports.yaml (eigene SoT)
#
# Ground-Truth-Stand: 2026-06-17 (verifiziert per SSH + gh api; siehe `verified`).
# ═══════════════════════════════════════════════════════════════════════════════

hosts:
  prod:
    ip: 88.198.191.108
    ssh: root@88.198.191.108
    ssh_alias: hetzner-prod            # ~/.ssh/config
    hostname: ubuntu-8gb-nbg1-1
    os: Ubuntu 24.04.3 LTS
    provider: Hetzner (nbg1)
    role: >
      Produktions-Multi-Hub-Host. Trägt ALLE Prod-Container aller Hubs
      (risk-hub→schutztat.de, billing-hub, trading-hub, …) als getrennte
      docker-compose-Projekte auf EINER Engine. Multi-Hub-Host → COMPOSE_PROJECT_NAME
      pro Hub pinnen (ADR-248), sonst Cross-Projekt-Orphan-Removal.
    hosts_runners: [prod-server]
    verified: 2026-06-17

  staging:
    ip: 88.99.38.75
    ssh: root@88.99.38.75              # Admin/Deploy-Zugang
    ssh_interactive: devuser@88.99.38.75  # interaktiver Dev-Account — Default für Dev-Arbeit auf diesem Host
    hostname: dev-desktop              # Label in infra-Skripten; OS-Hostname real: ubuntu-32gb-fsn1-1
    provider: Hetzner
    role: >
      Staging-/Dev-Host. Trägt Staging-Container (risk_hub_staging_*,
      cad_hub_staging_web, …) + diverse *_local_*-Dev-Stacks + ib_gateway.
      Staging-Ingress via eigenem cloudflared (staging-riskhub.iil.pet).
      Trägt seit 2026-06-28 den Non-Prod-CI-Runner (ADR-257, Pilot travel-beat) —
      KEINE Prod-Container auf dieser Engine (Bedingung ADR-257 Entscheidung 1).
    hosts_runners: [staging-ci]
    verified: 2026-06-28               # on-host: 16 CPU/32 GB/601 G; staging-ci-Runner registriert + online

  odoo:
    ip: 46.225.127.211
    ssh_alias: hetzner-odoo            # ~/.ssh/config
    role: "Odoo-Host (Details nicht in dieser Session verifiziert)."
    hosts_runners: []
    verified: false                    # nur aus ~/.ssh/config, nicht geprüft

# ─────────────────────────────────────────────────────────────────────────────
# GitHub-Actions Self-Hosted Runner
# ─────────────────────────────────────────────────────────────────────────────
# Label-Konvention: Deploy/host-gebundene Jobs → `prod-server` (unique Label, NICHT
# plain self-hosted, das matcht seit ADR-257 mehrere Runner). CI/Build → `ci-nonprod`
# (staging-ci-Runner). Die Labels `hetzner` und `dev` sind TOT (verwaister, offline
# dev-hetzner-2) — NICHT mehr verwenden.
runners:
  prod-server:
    host: prod                         # 88.198.191.108
    status: online                     # Stand 2026-06-17
    labels: [self-hosted, Linux, X64, prod, prod-server]
    scope: per-repo
    install: /opt/actions-runner-<repo>
    service: actions.runner.achimdehnert-<repo>.prod-server.service
    note: >
      Ein dedizierter Runner pro Repo (risk-hub, billing-hub, trading-hub,
      platform, … alle 23 Repos). Verarbeitet alles mit `runs-on: self-hosted`.
      Ein Runner pro Repo → Jobs eines PRs laufen sequenziell.
      ADR-257: für CI/Build deprecated (Migration läuft; Deploy bleibt hier, ADR-156).
    verified: 2026-06-17

  staging-ci:
    host: staging                      # 88.99.38.75
    status: online                     # 2026-06-28 registriert + verifiziert (gh api)
    labels: [self-hosted, Linux, X64, ci-nonprod]
    scope: per-repo
    install: /opt/actions-runner-<repo>
    service: actions.runner.achimdehnert-<repo>.<repo>-staging-ci.service
    runner_user: github-ci             # NICHT root (REC-5); in docker-group für buildx
    note: >
      Non-Prod-CI-Runner (ADR-257). Trägt CI/Build-Jobs, die per shared-ci-Input
      `runs_on: ci-nonprod` hierher gelenkt werden; host-gebundene Deploys bleiben
      via `deploy_runs_on: prod-server` auf dem Prod-Host. Pilot-Repo: travel-beat
      (`travel-beat-staging-ci`). Weitere Hubs gestaffelt via ADR-222-Familie.
    verified: 2026-06-28

  dev-hetzner-2:
    host: UNKNOWN                       # auf keinem erreichbaren Host installiert
    status: deleted                     # 2026-06-17 dereg. (id=23 auf risk-hub gelöscht)
    labels: [self-hosted, Linux, X64, hetzner, dev]
    note: >
      War eine VERWAISTE Registrierung: in GitHub als Runner geführt, aber auf
      KEINEM erreichbaren Host (nicht prod, nicht staging/dev-desktop; nicht in
      ssh-config/known_hosts/infra-configs). >13h offline am 2026-06-17 → blockierte
      ALLE risk-hub-Merges (die toten Labels `hetzner`/`dev` zeigten nur auf ihn).
      Am 2026-06-17 dereg. (`gh api -X DELETE …/actions/runners/23` auf risk-hub;
      auf keinem anderen Repo registriert). Eintrag bleibt als Lehre/Historie.
    verified: 2026-06-17

# Workflows mit toten Labels — alle bereinigt (2026-06-17). Neue Workflows: runs-on: self-hosted.
dead_label_refs:
  - repo: risk-hub
    file: .github/workflows/complete-check.yml
    was: "[self-hosted, hetzner]"
    fixed_in: "PR #209 (→ self-hosted)"
  - repo: risk-hub
    file: .github/workflows/runner-diag.yml
    was: "[self-hosted, dev]"
    fixed_in: "PR #210 (Workflow entfernt — diente nur dev-hetzner-2)"
