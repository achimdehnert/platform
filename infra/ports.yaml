# platform/infra/ports.yaml
# ═══════════════════════════════════════════════════════════════════════════════
# Single Source of Truth für alle Service-Ports (ADR-106, ADR-157, ADR-164)
#
# WICHTIG: Diese Datei MUSS den realen Server-Zustand abbilden!
#   Validierung: python infra/scripts/port_audit.py
#   Nur offline:  python infra/scripts/port_audit.py --offline
#   Nächster Port: python infra/scripts/port_audit.py --next-free
#
# ═══════════════════════════════════════════════════════════════════════════════
#
# PORT-STRATEGIE (ADR-164)
#
#   Prinzip: dev = staging = prod Port (gleicher Port, verschiedene Server)
#   Staging + Prod laufen auf getrennten Servern → identische Ports möglich.
#   Dev (lokal) bekommt denselben Port wo möglich; eigenen wo Compose kollidiert.
#
#   Ranges:
#     3000-3199   Infrastructure UIs (Grafana, Outline, Uptime-Kuma)
#     4000-4099   IB Gateway / Finance-Infra
#     5432-5499   PostgreSQL (interne DB-Ports, nur compose-intern)
#     6379-6399   Redis (interne Ports, nur compose-intern)
#     8000-8019   Reserviert: BF Agent (8000 dev only), Infra-APIs
#     8020-8069   Standalone Tools (pptx-hub 8020, odoo 8069)
#     8080-8109   App-Hubs Block A (Hauptprodukte)
#     8110-8199   App-Hubs Block B (Erweiterung)
#     9000-9099   Auth + Object Storage (Authentik 9000, MinIO 9001/9010)
#
#   Regeln:
#     1. Jeder Hub hat genau EINEN Web-Port pro Umgebung (kein Bereich!)
#     2. Staging-Port = Prod-Port (immer, ADR-157 §4)
#     3. Dev-Port = Prod-Port (default), weicht nur ab wenn Docker-Compose
#        eine andere Zuordnung erzwingt (z.B. historisch 8000:8000)
#     4. Neue Hubs: nächsten freien Port via port_audit.py --next-free
#     5. Interne Ports (DB, Redis, Celery) werden NICHT hier verwaltet —
#        nur host-gemappte Web-Ports
#     6. Compose-Files MÜSSEN diesen Port verwenden (drift = deploy-blocker)
#
# REGEL: Staging-Domains unter iil.pet MUESSEN single-level sein!
#   OK: staging-writing.iil.pet   (1 Level = CF Universal SSL deckt ab)
#   VERBOTEN: staging.writing.iil.pet   (2 Level = CF Universal SSL deckt NICHT ab)
#   Eigene Domains (LE Wildcard) duerfen staging.X.Y bleiben.
#
# Nächster freier Port: 8110  (berechnet: port_audit.py --next-free)
# Vergabe: aufsteigend, VOR Deploy port_audit.py laufen lassen!
# ═══════════════════════════════════════════════════════════════════════════════

# --- Server-Definitionen (ADR-157 §4.2) ---
servers:
  prod:
    ip: 88.198.191.108
    name: Hetzner Dedicated (Production)
    ssh: root@88.198.191.108
  dev:
    ip: 88.99.38.75
    name: Dev Desktop (Development)
    ssh: root@88.99.38.75
  staging:
    ip: 178.104.184.168
    name: Hetzner Staging (Dedicated)
    ssh: root@178.104.184.168

# --- Infrastructure Services (nicht App-Hubs) ---
infra:

  authentik:
    port: 9000
    server: prod
    domain_prod: auth.iil.pet
    note: "SSO/Identity Provider — 9443 for HTTPS"

  outline:
    port: 3100
    server: prod
    domain_prod: knowledge.iil.pet
    note: "Wiki/Knowledge Base — maps 3100→3000 internal"

  grafana:
    port: 3000
    server: prod
    domain_prod: grafana.iil.pet

  uptime-kuma:
    port: 3001
    server: staging
    domain_staging: uptime.iil.pet

  minio:
    port: 9010
    server: prod
    note: "Object Storage for risk-hub — API 9010, Console 9001"

  llm-mcp:
    port: 8001
    server: prod
    note: "LLM Gateway — internal only"

# ═══════════════════════════════════════════════════════════════════════════════
# App-Hub Ports — sortiert nach Port
#
# Felder:
#   prod:            Host-Port auf Production-Server (127.0.0.1:PORT→8000)
#   staging:         Host-Port auf Staging-Server (= prod)
#   dev:             Host-Port auf Dev Desktop / localhost
#   container_name:  Docker container name (für health checks)
#   domain_prod:     Primary production domain
#   domain_staging:  Staging domain
#   domain_aliases:  Additional production domains (redirects)
#   repo:            GitHub repo (achimdehnert/*)
#   compose_drift:   Compose-File hat falschen Port (zu fixen!)
# ═══════════════════════════════════════════════════════════════════════════════
