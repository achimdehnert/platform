# ============================================================================
# Platform Secrets Inventory (ADR-045, Issue #18 FIX-F)
# ============================================================================
#
# This file documents ALL secrets used across the IIL Platform ecosystem.
# It does NOT contain secret values — only metadata about where secrets
# are defined and consumed.
#
# Scope: GitHub Actions secrets (repo-level), server-side env files,
#         SOPS-encrypted files.
#
# Last audited: 2026-03-11
# ============================================================================

# ---------------------------------------------------------------------------
# 1. Shared Secrets (used by multiple repos)
# ---------------------------------------------------------------------------
shared:
  DEPLOY_SSH_KEY:
    description: "Private SSH key for deploy@prod-server (88.198.191.108)"
    type: ssh_key
    rotation: quarterly
    consumers:
      - platform
      - travel-beat
      - risk-hub
      - mcp-hub
      - bfagent

  DEPLOY_HOST:
    description: "Production server IP/hostname"
    type: hostname
    value_hint: "88.198.191.108"
    consumers:
      - platform
      - travel-beat
      - risk-hub
      - mcp-hub
      - bfagent

  DEPLOY_USER:
    description: "SSH user for production deployments"
    type: username
    value_hint: "deploy"
    consumers:
      - platform
      - travel-beat
      - risk-hub
      - mcp-hub
      - bfagent

  PROJECT_PAT:
    description: "GitHub PAT for cross-repo operations (dispatch, PR, packages)"
    type: github_token
    rotation: yearly
    consumers:
      - platform
      - travel-beat
      - risk-hub
      - weltenhub
      - pptx-hub
      - mcp-hub
      - bfagent

  HETZNER_HOST:
    description: "Hetzner production server"
    type: hostname
    value_hint: "88.198.191.108"
    consumers:
      - platform
      - travel-beat
      - pptx-hub

  HETZNER_SSH_KEY:
    description: "SSH key for Hetzner server access"
    type: ssh_key
    rotation: quarterly
    consumers:
      - platform
      - travel-beat
      - pptx-hub

  HETZNER_USER:
    description: "SSH user for Hetzner"
    type: username
    value_hint: "deploy"
    consumers:
      - platform
      - travel-beat
      - pptx-hub

  HETZNER_DEV_HOST:
    description: "Hetzner dev-server for staging"
    type: hostname
    consumers:
      - travel-beat
      - risk-hub
      - weltenhub

  HETZNER_DEV_SSH_KEY:
    description: "SSH key for dev-server access"
    type: ssh_key
    rotation: quarterly
    consumers:
      - travel-beat
      - risk-hub
      - weltenhub

  HETZNER_DEV_USER:
    description: "SSH user for dev-server"
    type: username
    value_hint: "deploy"
    consumers:
      - travel-beat
      - risk-hub
      - weltenhub

  DISCORD_WEBHOOK:
    description: "Discord webhook for deployment notifications"
    type: webhook_url
    consumers:
      - platform
      - mcp-hub

  SOPS_AGE_KEY:
    description: "age private key for SOPS decryption in CI"
    type: encryption_key
    rotation: yearly
    consumers:
      - platform
      - bfagent

# ---------------------------------------------------------------------------
# 2. Platform-only Secrets
# ---------------------------------------------------------------------------
platform:
  STAGING_SSH_KEY:
    description: "SSH key for staging deployments"
    type: ssh_key
    rotation: quarterly

  STAGING_HOST:
    description: "Staging server hostname"
    type: hostname

  STAGING_USER:
    description: "SSH user for staging"
    type: username

  STAGING_SSH_FINGERPRINT:
    description: "SSH host fingerprint for staging server"
    type: fingerprint

  DEPLOY_SSH_FINGERPRINT:
    description: "SSH host fingerprint for prod server"
    type: fingerprint

  OPENAI_API_KEY:
    description: "OpenAI API key for ADR review workflow"
    type: api_key
    rotation: yearly

  ANTHROPIC_API_KEY:
    description: "Anthropic API key for ADR review workflow"
    type: api_key
    rotation: yearly

  DEVHUB_WEBHOOK_SECRET:
    description: "Webhook secret for dev-hub sync"
    type: webhook_secret

  PLATFORM_DEPLOY_TOKEN:
    description: "Token for platform deploy operations"
    type: token

  AUDIT_API_TOKEN:
    description: "API token for audit service"
    type: api_key

  AUDIT_API_URL:
    description: "Audit service URL"
    type: url

  SLACK_WEBHOOK_URL:
    description: "Slack webhook (legacy, migrating to Discord)"
    type: webhook_url
    deprecated: true
    replacement: DISCORD_WEBHOOK

  PIP_INDEX_URL:
    description: "Private PyPI index URL"
    type: url

# ---------------------------------------------------------------------------
# 3. risk-hub Secrets (Schutztat)
# ---------------------------------------------------------------------------
risk-hub:
  STAGING_SECRET_KEY:
    description: "Django SECRET_KEY for staging"
    type: django_secret

  STAGING_DB_PASSWORD:
    description: "PostgreSQL password for staging"
    type: database_password

  STAGING_MINIO_USER:
    description: "MinIO access key for staging S3"
    type: username

  STAGING_MINIO_PASSWORD:
    description: "MinIO secret key for staging S3"
    type: password

  STRIPE_SECRET_KEY:
    description: "Stripe secret key for payment processing"
    type: api_key
    rotation: yearly

  STRIPE_PUBLISHABLE_KEY:
    description: "Stripe publishable key (frontend)"
    type: api_key

  STRIPE_WEBHOOK_SECRET:
    description: "Stripe webhook endpoint secret"
    type: webhook_secret

  STRIPE_PRICE_STARTER_MONTHLY:
    description: "Stripe price ID for Starter monthly plan"
    type: stripe_price_id

  STRIPE_PRICE_STARTER_ANNUAL:
    description: "Stripe price ID for Starter annual plan"
    type: stripe_price_id

  STRIPE_PRICE_PROFESSIONAL_MONTHLY:
    description: "Stripe price ID for Professional monthly plan"
    type: stripe_price_id

  STRIPE_PRICE_PROFESSIONAL_ANNUAL:
    description: "Stripe price ID for Professional annual plan"
    type: stripe_price_id

  STRIPE_PRICE_BUSINESS_MONTHLY:
    description: "Stripe price ID for Business monthly plan"
    type: stripe_price_id

  STRIPE_PRICE_BUSINESS_ANNUAL:
    description: "Stripe price ID for Business annual plan"
    type: stripe_price_id

# ---------------------------------------------------------------------------
# 4. mcp-hub Secrets
# ---------------------------------------------------------------------------
mcp-hub:
  REGISTRY_DATABASE_URL:
    description: "PostgreSQL connection string for MCP registry"
    type: database_url

  CONTENT_STORE_DSN:
    description: "Content store database connection"
    type: database_url

  DISCORD_WEBHOOK_URL:
    description: "Discord webhook URL (alternate key name)"
    type: webhook_url

# ---------------------------------------------------------------------------
# 5. weltenhub Secrets (Weltenforger)
# ---------------------------------------------------------------------------
weltenhub:
  GHCR_PAT:
    description: "GitHub Container Registry PAT"
    type: github_token

  GHCR_AUTH_B:
    description: "GHCR auth base64-encoded credentials"
    type: token

# ---------------------------------------------------------------------------
# 6. Server-side Secrets (on 88.198.191.108)
# ---------------------------------------------------------------------------
server_side:
  location: "/opt/<repo>/.env.prod"
  note: "Each app has its own .env.prod on the production server"
  managed_by: "Manual (ssh_manage file_write) — NO automated rotation yet"
  apps:
    - bfagent
    - travel-beat
    - risk-hub
    - weltenhub
    - pptx-hub
    - mcp-hub
    - billing-hub
    - coach-hub
    - dev-hub

# ---------------------------------------------------------------------------
# 7. Local Developer Secrets (NOT in CI)
# ---------------------------------------------------------------------------
local:
  location: "/home/dehnert/.secrets/"
  files:
    hetzner_cloud_token:
      env: DEPLOYMENT_MCP_HETZNER_API_TOKEN
      usage: "Hetzner Cloud API (deployment-mcp)"

    github_token:
      env: GITHUB_TOKEN
      usage: "GitHub API (github MCP)"

    cloudflare_write_token:
      env: CLOUDFLARE_API_TOKEN
      usage: "Cloudflare DNS/Zone/Tunnel"

    cloudflare_access_token:
      env: DEPLOYMENT_MCP_CLOUDFLARE_API_TOKEN
      usage: "Cloudflare Zero Trust Access"

    ionos_api_key:
      env: IONOS_API_KEY
      usage: "IONOS DNS management"

# ---------------------------------------------------------------------------
# 8. SOPS Configuration (Phase 2)
# ---------------------------------------------------------------------------
sops:
  status: "planned"
  encryption: "age"
  key_location: "/etc/secrets/staging.key (on dev-server, chmod 600)"
  ci_secret: "SOPS_AGE_KEY"
  pattern: ".env.*.enc → decrypted to .env.* in CI/CD"
  repos_with_sops:
    - platform
    - bfagent
  repos_planned: []
