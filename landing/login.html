<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CAD-Hub</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            padding: 20px;
        }
        
        .auth-card {
            background: white;
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .auth-header .logo {
            font-size: 32px;
            margin-bottom: 16px;
            display: block;
        }
        
        .auth-header h1 {
            font-size: 24px;
            color: #0f172a;
            margin-bottom: 8px;
        }
        
        .auth-header p {
            color: #64748b;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }
        
        .form-options a {
            color: #2563eb;
            text-decoration: none;
        }
        
        .auth-card .btn {
            width: 100%;
            justify-content: center;
            padding: 16px;
            font-size: 16px;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
            font-size: 14px;
            color: #64748b;
        }
        
        .auth-footer a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo">🏗️ CAD-Hub</a>
                <h1>Willkommen zurück</h1>
                <p>Melden Sie sich an, um fortzufahren</p>
            </div>
            
            <div class="error-message" id="errorMessage">
                E-Mail oder Passwort ist falsch.
            </div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">E-Mail</label>
                    <input type="email" id="email" name="email" required
                           placeholder="ihre@email.de">
                </div>
                
                <div class="form-group">
                    <label for="password">Passwort</label>
                    <input type="password" id="password" name="password" required
                           placeholder="Ihr Passwort">
                </div>
                
                <div class="form-options">
                    <label>
                        <input type="checkbox" name="remember"> Angemeldet bleiben
                    </label>
                    <a href="reset-password.html">Passwort vergessen?</a>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    Anmelden
                </button>
            </form>
            
            <div class="auth-footer">
                Noch kein Konto? <a href="register.html">Kostenlos registrieren</a>
            </div>
        </div>
    </div>
    
    <script>
        // Demo accounts (in production: database-driven)
        const DEMO_ACCOUNTS = {
            'demo@cad-hub.de': 'demo2026',
            'max@techcorp.de': 'techcorp2026',
        };
        
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMessage');
            
            // Check credentials
            if (DEMO_ACCOUNTS[email] === password) {
                // Success - redirect to dashboard
                localStorage.setItem('cadhub_user', JSON.stringify({
                    email: email,
                    name: email.split('@')[0],
                    logged_in_at: new Date().toISOString()
                }));
                window.location.href = 'app/dashboard.html';
            } else {
                // Show error
                errorEl.style.display = 'block';
                errorEl.textContent = 'E-Mail oder Passwort ist falsch.';
            }
        }
    </script>
</body>
</html>
