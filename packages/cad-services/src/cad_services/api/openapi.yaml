openapi: 3.1.0
info:
  title: CAD-Hub API
  description: |
    REST API für CAD-Modell-Verarbeitung, Brandschutzanalyse und Flächenberechnung.
    
    ## Features
    - IFC/DXF Upload und Parsing
    - DIN 277 Flächenberechnung
    - Brandschutz-Analyse (DIN 4102, EN 13501)
    - Fluchtweg-Berechnung
    - PDF-Report-Generierung
  version: 1.0.0
  contact:
    name: CAD-Hub Team
    email: support@cadhub.local
  license:
    name: Proprietary
    
servers:
  - url: http://localhost:8000/api/v1
    description: Development Server
  - url: https://cadhub.example.com/api/v1
    description: Production Server

tags:
  - name: Models
    description: CAD-Modell-Verwaltung
  - name: Upload
    description: Datei-Upload und Verarbeitung
  - name: Analysis
    description: Analyse-Funktionen
  - name: Reports
    description: Report-Generierung

paths:
  /projects/{project_id}/models:
    get:
      tags: [Models]
      summary: Liste aller Modelle eines Projekts
      operationId: listModels
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
      responses:
        '200':
          description: Liste der Modelle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelList'
        '404':
          $ref: '#/components/responses/NotFound'
          
  /projects/{project_id}/upload:
    post:
      tags: [Upload]
      summary: CAD-Datei hochladen
      operationId: uploadModel
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: IFC oder DXF Datei
                name:
                  type: string
                  description: Optionaler Modellname
      responses:
        '201':
          description: Upload erfolgreich
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          description: Datei zu groß (max 100MB)

  /models/{model_id}:
    get:
      tags: [Models]
      summary: Modell-Details abrufen
      operationId: getModel
      parameters:
        - $ref: '#/components/parameters/ModelId'
      responses:
        '200':
          description: Modell-Details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Model'
        '404':
          $ref: '#/components/responses/NotFound'
          
  /models/{model_id}/process:
    post:
      tags: [Upload]
      summary: Modell verarbeiten (IFC parsen)
      operationId: processModel
      parameters:
        - $ref: '#/components/parameters/ModelId'
      responses:
        '200':
          description: Verarbeitung gestartet/abgeschlossen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingResult'
        '404':
          $ref: '#/components/responses/NotFound'
          
  /models/{model_id}/fire-safety:
    get:
      tags: [Analysis]
      summary: Brandschutz-Analyse abrufen
      operationId: getFireSafetyAnalysis
      parameters:
        - $ref: '#/components/parameters/ModelId'
      responses:
        '200':
          description: Brandschutz-Ergebnis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FireSafetyResult'
                
    post:
      tags: [Analysis]
      summary: Brandschutz-Analyse durchführen
      operationId: runFireSafetyAnalysis
      parameters:
        - $ref: '#/components/parameters/ModelId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                building_type:
                  type: string
                  enum: [standard, industrial, high_rise, assembly, healthcare]
                  default: standard
                has_sprinkler:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Analyse-Ergebnis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FireSafetyResult'

  /models/{model_id}/escape-routes:
    get:
      tags: [Analysis]
      summary: Fluchtweg-Analyse abrufen
      operationId: getEscapeRoutes
      parameters:
        - $ref: '#/components/parameters/ModelId'
        - name: floor_id
          in: query
          schema:
            type: integer
          description: Optional auf Etage filtern
      responses:
        '200':
          description: Fluchtweg-Ergebnis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EscapeRouteResult'

  /models/{model_id}/din277:
    get:
      tags: [Analysis]
      summary: DIN 277 Flächenberechnung abrufen
      operationId: getDIN277Calculation
      parameters:
        - $ref: '#/components/parameters/ModelId'
      responses:
        '200':
          description: DIN 277 Ergebnis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DIN277Result'

  /models/{model_id}/reports/fire-safety:
    get:
      tags: [Reports]
      summary: Brandschutz-PDF-Report generieren
      operationId: generateFireSafetyReport
      parameters:
        - $ref: '#/components/parameters/ModelId'
      responses:
        '200':
          description: PDF-Report
          content:
            application/pdf:
              schema:
                type: string
                format: binary

components:
  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: integer
      description: Projekt-ID
      
    ModelId:
      name: model_id
      in: path
      required: true
      schema:
        type: integer
      description: Modell-ID
      
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
        
    PageNumber:
      name: page
      in: query
      schema:
        type: integer
        default: 1

  schemas:
    Model:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        source_format:
          type: string
          enum: [ifc, dxf, dwg]
        status:
          type: string
          enum: [pending, processing, ready, error]
        created_at:
          type: string
          format: date-time
        processed_at:
          type: string
          format: date-time
          nullable: true
        floor_count:
          type: integer
        room_count:
          type: integer
          
    ModelList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Model'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
          
    UploadResponse:
      type: object
      properties:
        model_id:
          type: integer
        status:
          type: string
        message:
          type: string
          
    ProcessingResult:
      type: object
      properties:
        status:
          type: string
          enum: [success, already_processed, error]
        model_id:
          type: integer
        floors:
          type: integer
        rooms:
          type: integer
        elements:
          type: integer
          
    FireSafetyResult:
      type: object
      properties:
        model_id:
          type: integer
        is_compliant:
          type: boolean
        total_elements:
          type: integer
        compliant_elements:
          type: integer
        violations:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        rated_elements:
          type: array
          items:
            $ref: '#/components/schemas/FireRatedElement'
            
    FireRatedElement:
      type: object
      properties:
        ifc_guid:
          type: string
        element_type:
          type: string
        name:
          type: string
        actual_rating:
          type: string
          nullable: true
        required_rating:
          type: string
          nullable: true
        is_compliant:
          type: boolean
          
    EscapeRouteResult:
      type: object
      properties:
        model_id:
          type: integer
        floor_id:
          type: integer
          nullable: true
        is_compliant:
          type: boolean
        routes:
          type: array
          items:
            $ref: '#/components/schemas/EscapeRoute'
        violations:
          type: array
          items:
            type: string
            
    EscapeRoute:
      type: object
      properties:
        from_room_id:
          type: integer
        from_room_name:
          type: string
        to_exit_type:
          type: string
        distance_m:
          type: number
        max_distance_m:
          type: number
        is_compliant:
          type: boolean
          
    DIN277Result:
      type: object
      properties:
        model_id:
          type: integer
        total_bgf:
          type: number
          description: Brutto-Grundfläche in m²
        total_ngf:
          type: number
          description: Netto-Grundfläche in m²
        total_nuf:
          type: number
          description: Nutzungsfläche in m²
        floors:
          type: array
          items:
            type: object
            properties:
              floor_id:
                type: integer
              name:
                type: string
              bgf:
                type: number
              ngf:
                type: number
              
    Error:
      type: object
      properties:
        detail:
          type: string
        code:
          type: string

  responses:
    NotFound:
      description: Ressource nicht gefunden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
            
    BadRequest:
      description: Ungültige Anfrage
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      
security:
  - BearerAuth: []
