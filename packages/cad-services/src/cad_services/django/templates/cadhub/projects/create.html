{% extends "cadhub/base.html" %}

{% block title %}Neues Projekt - CAD-Hub{% endblock %}

{% block content %}
<!-- Breadcrumb -->
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item">
            <a href="{% url 'cadhub:project-list' %}">Projekte</a>
        </li>
        <li class="breadcrumb-item active">Neues Projekt</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Neues Projekt erstellen</h5>
            </div>
            <div class="card-body">
                <form method="post" hx-post="{% url 'cadhub:project-create' %}" 
                      hx-target="#content">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="name" class="form-label">Projektname *</label>
                        <input type="text" id="name" name="name" 
                               class="form-control {% if form.name.errors %}is-invalid{% endif %}"
                               placeholder="z.B. Bürogebäude München"
                               value="{{ form.name.value|default:'' }}" required>
                        {% if form.name.errors %}
                        <div class="invalid-feedback">{{ form.name.errors.0 }}</div>
                        {% endif %}
                    </div>
                    
                    <div class="mb-4">
                        <label for="description" class="form-label">Beschreibung</label>
                        <textarea id="description" name="description" 
                                  class="form-control" rows="4"
                                  placeholder="Kurze Projektbeschreibung...">{{ form.description.value|default:'' }}</textarea>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Projekt erstellen
                        </button>
                        <a href="{% url 'cadhub:project-list' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Abbrechen
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
