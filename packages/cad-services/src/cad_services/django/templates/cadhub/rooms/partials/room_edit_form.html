<div class="modal-header">
    <h5 class="modal-title">Raum bearbeiten</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
</div>
<form hx-post="{% url 'cadhub:room-edit' room.pk %}" 
      hx-target="#room-row-{{ room.pk }}"
      hx-swap="outerHTML">
    {% csrf_token %}
    <div class="modal-body">
        <div class="row g-3">
            <div class="col-md-4">
                <label for="number" class="form-label">Raumnummer *</label>
                <input type="text" id="number" name="number" class="form-control"
                       value="{{ room.number }}" required>
            </div>
            <div class="col-md-8">
                <label for="name" class="form-label">Raumname *</label>
                <input type="text" id="name" name="name" class="form-control"
                       value="{{ room.name }}" required>
            </div>
            <div class="col-12">
                <label for="long_name" class="form-label">Langname</label>
                <input type="text" id="long_name" name="long_name" class="form-control"
                       value="{{ room.long_name|default:'' }}">
            </div>
            <div class="col-md-6">
                <label for="area_m2" class="form-label">Fläche (m²)</label>
                <input type="number" id="area_m2" name="area_m2" class="form-control"
                       value="{{ room.area_m2 }}" step="0.01" min="0">
            </div>
            <div class="col-md-6">
                <label for="height_m" class="form-label">Höhe (m)</label>
                <input type="number" id="height_m" name="height_m" class="form-control"
                       value="{{ room.height_m }}" step="0.01" min="0">
            </div>
            <div class="col-md-6">
                <label for="floor_id" class="form-label">Etage</label>
                <select id="floor_id" name="floor_id" class="form-select">
                    <option value="">-- Keine --</option>
                    {% for floor in floors %}
                    <option value="{{ floor.pk }}" 
                            {% if room.floor_id == floor.pk %}selected{% endif %}>
                        {{ floor.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label for="usage_category_id" class="form-label">DIN 277 Kategorie</label>
                <select id="usage_category_id" name="usage_category_id" class="form-select">
                    <option value="">-- Keine --</option>
                    {% for cat in usage_categories %}
                    <option value="{{ cat.pk }}" 
                            {% if room.usage_category_id == cat.pk %}selected{% endif %}>
                        {{ cat.code }} - {{ cat.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            Abbrechen
        </button>
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-save"></i> Speichern
        </button>
    </div>
</form>
