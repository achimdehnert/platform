<tr id="room-row-{{ room.pk }}"
    hx-get="{% url 'cadhub:room-detail' room.pk %}" 
    hx-target="#room-detail-modal .modal-content"
    hx-trigger="click"
    data-bs-toggle="modal"
    data-bs-target="#room-detail-modal"
    style="cursor: pointer;">
    <td class="fw-medium">{{ room.number }}</td>
    <td>{{ room.name }}</td>
    <td>{{ room.floor.name|default:"-" }}</td>
    <td class="text-end font-monospace">{{ room.area_m2|floatformat:2 }} m²</td>
    <td class="text-end font-monospace">{{ room.height_m|floatformat:2 }} m</td>
    <td class="text-end font-monospace">{{ room.volume_m3|floatformat:2 }} m³</td>
    <td>
        {% if room.usage_category %}
        <span class="badge bg-info">{{ room.usage_category.code }}</span>
        {% else %}
        <span class="text-muted">-</span>
        {% endif %}
    </td>
    <td>
        <button class="btn btn-sm btn-outline-primary" 
                title="Bearbeiten"
                hx-get="{% url 'cadhub:room-edit' room.pk %}"
                hx-target="#edit-modal .modal-content"
                data-bs-toggle="modal"
                data-bs-target="#edit-modal"
                onclick="event.stopPropagation();">
            <i class="bi bi-pencil"></i>
            <span class="visually-hidden">Bearbeiten</span>
        </button>
    </td>
</tr>
