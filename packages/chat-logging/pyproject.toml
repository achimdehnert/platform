[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "iil-chat-logging"
version = "0.2.0"
description = "Persistent chat conversation logging & QM for Django apps"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Achim Dehnert"}]

dependencies = [
    "django>=5.0",
    "chat-agent>=0.1.0",
]

[project.optional-dependencies]
eval = [
    "deepeval>=1.0",
    "langfuse>=2.0",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-django>=4.8",
    "pytest-cov>=4.0",
    "ruff>=0.1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/chat_logging"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "strict"
DJANGO_SETTINGS_MODULE = "tests.settings"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["chat_logging"]
