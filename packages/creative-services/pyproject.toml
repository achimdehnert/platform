[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "creative-services"
version = "0.3.0"
description = "Shared AI-powered creative writing and tool-use services for BF Agent ecosystem"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "BF Agent Team" }
]
keywords = ["ai", "creative-writing", "llm", "saas"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "pydantic>=2.0",
    "httpx>=0.25",
    "tenacity>=8.0",
]

[project.optional-dependencies]
openai = ["openai>=1.0"]
anthropic = ["anthropic>=0.18"]
storage = [
    "asyncpg>=0.29",
    "alembic>=1.13",
    "sqlalchemy>=2.0",
]
all = [
    "openai>=1.0",
    "anthropic>=0.18",
    "groq>=0.4",
    "asyncpg>=0.29",
    "alembic>=1.13",
    "sqlalchemy>=2.0",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "ruff>=0.1",
]

[tool.hatch.build.targets.wheel]
packages = ["creative_services"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
