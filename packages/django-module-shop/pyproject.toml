[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "django-module-shop"
version = "0.2.0"
description = "Reusable Django module catalogue & subscription management"
requires-python = ">=3.11"
dependencies = ["django>=4.2"]

[tool.setuptools.packages.find]
where = ["."]

[tool.ruff]
line-length = 100
