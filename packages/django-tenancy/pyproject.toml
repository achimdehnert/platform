[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "iil-django-tenancy"
version = "0.1.0"
description = "Platform-standard multi-tenancy for Django UI Hubs (ADR-035, ADR-109)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "IIL Engineering", email = "engineering@iil.gmbh" }]
keywords = ["django", "multi-tenancy", "saas"]
classifiers = [
    "Framework :: Django",
    "Framework :: Django :: 4.2",
    "Framework :: Django :: 5.0",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "Django>=4.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.8",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["django_tenancy"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "S", "B", "A"]
ignore = [
    "S101",   # assert in tests
    "N818",   # TenantNotFound/TenantMisconfigured — public API, can't rename without breaking change
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S105", "S106", "S110"]  # test passwords, except-pass
"django_tenancy/migrations/*" = ["E501"]  # generated code

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "tests.settings"
python_files = ["test_*.py"]
