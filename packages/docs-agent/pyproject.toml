[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "docs-agent"
version = "0.1.0"
description = "AI-assisted documentation quality agent — AST scanner, DIATAXIS classifier, CLI"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Achim Dehnert"},
]
dependencies = [
    "typer>=0.12.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
llm = [
    "libcst>=1.1.0",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[project.scripts]
docs-agent = "docs_agent.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/docs_agent"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
