[project]
name = "iil-django-commons"
version = "0.3.0"
description = "Shared backend services library for Django projects (Logging, Health, Cache, Rate Limiting, Security)"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Proprietary"}
authors = [
    {name = "Achim Dehnert", email = "achim.dehnert@iil.gmbh"},
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: Django :: 5.0",
    "Intended Audience :: Developers",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "Django>=5.0,<6.0",
]

[project.optional-dependencies]
cache = [
    "django-redis>=5.4",
    "redis>=5.0",
]
ratelimit = [
    "redis>=5.0",
]
monitoring = [
    "prometheus-client>=0.20",
]
email = [
    "resend>=2.0",
]
logging = [
    "python-json-logger>=2.0",
]
all = [
    "django-redis>=5.4",
    "redis>=5.0",
    "prometheus-client>=0.20",
    "python-json-logger>=2.0",
    "resend>=2.0",
]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.8",
    "pytest-mock>=3.12",
    "factory-boy>=3.3",
    "django-redis>=5.4",
    "redis>=5.0",
    "python-json-logger>=2.0",
]
testing = [
    "pytest>=8.0",
    "pytest-django>=4.8",
    "pytest-mock>=3.12",
    "factory-boy>=3.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/iil_commons"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "tests.settings"
python_files = ["test_*.py"]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"
