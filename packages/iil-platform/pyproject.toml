[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "iil-platform"
version = "1.0.0"
description = "IIL Platform Foundation — Umbrella for Context, Commons, Tenancy, Shop, Notifications"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Achim Dehnert", email = "achim@dehnert.com"}]
keywords = ["django", "platform", "multi-tenant", "iil"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: Django",
    "Framework :: Django :: 5.0",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "iil-platform-context>=0.5.1",
    "iil-django-tenancy>=0.1.0",
]

[project.optional-dependencies]
commons = ["iil-django-commons>=0.3.0"]
shop = ["iil-django-module-shop>=0.2.0"]
notifications = ["iil-platform-notifications>=0.1.0"]
full = ["iil-platform[commons,shop,notifications]"]

[project.urls]
Homepage = "https://github.com/achimdehnert/platform"
Repository = "https://github.com/achimdehnert/platform"
Issues = "https://github.com/achimdehnert/platform/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/iil_platform"]

[tool.hatch.build.targets.sdist]
include = ["src/iil_platform", "README.md"]
