[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mcp-governance"
version = "0.1.0"
description = "MCP Tool Governance — Specification Standard, Service Discovery & Error Contract"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [
    {name = "Achim Dehnert"},
]
dependencies = [
    "pydantic>=2.0,<3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
]

[tool.hatch.build.targets.wheel]
packages = ["mcp_governance"]
