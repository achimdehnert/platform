[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "outline-mcp"
version = "0.2.0"
description = "MCP Server for Outline Wiki — Knowledge Base access for Cascade (ADR-145)"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Achim Dehnert"},
]
dependencies = [
    "fastmcp>=2.0,<3.0",
    "httpx>=0.27,<1.0",
    "pydantic-settings>=2.0,<3.0",
    "tenacity>=8.0,<10.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
    "pytest-cov",
    "respx>=0.21",
]

[project.scripts]
outline-mcp = "outline_mcp.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["outline_mcp"]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
