[project]
name = "iil-platform-notifications"
version = "0.1.0"
description = "Platform-wide multi-channel notification registry (ADR-088)"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "Achim Dehnert"}]

dependencies = [
    "django>=4.2",
    "celery>=5.3",
    "pydantic>=2.0",
    "httpx>=0.25",
]

[project.optional-dependencies]
sms = ["twilio>=8.0"]
dev = [
    "pytest>=8.0",
    "pytest-django>=4.5",
    "ruff>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["platform_notifications"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "tests.settings"
pythonpath = ["."]
