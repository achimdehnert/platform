[tool.pytest.ini_options]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--tb=short",
    "-ra",
    "--no-header",
]
markers = [
    "megatest: Platform-weiter Hardcoding-Megatest",
]
# tools/tests/ ist die CI-Suite (tools-tests.yml); tests/ enthält megatest + Altbestand.
# Ohne beide Pfade sähe nacktes `pytest` nur 5 von 40 Testdateien (Blindfleck, repo-optimize L-4).
testpaths = ["tests", "tools/tests"]
