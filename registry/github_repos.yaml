# registry/github_repos.yaml — Vollständiges Inventar aller GitHub-Repos
# Single Source of Truth für Cascade, port_audit, onboard-repo, deploy-check
#
# Validierung: python infra/scripts/validate_repos.py
# Generiert aus: GitHub API (86 Repos, 2026-04-03)
#
# Schema:
#   type: django-app | framework | library | infra | stack | archive
#   status: production | active | experimental | maintenance | archive
#   deployed: true/false (hat Container auf Prod/Staging-Server?)
#   port: Referenz auf ports.yaml (wenn deployed)
#
# Referenzen:
#   ADR-157: Staging/Production Split, Port-Governance
#   ADR-106: Port-Audit
#   ADR-022: Repository Consistency Standards

