# registry/iil-migration.yaml — Single Source of Truth for the iil-* PyPI-family
# org migration (achimdehnert -> iilgmbh / PyPI org "iil"). Governance: ADR-255.
#
# This is the machine-readable SSoT mandated by ADR-255 REC-3. No second truth in
# prose. An idempotent checker validates reality against it:
#     python3 tools/iil_migration_check.py
#
# Honesty contract (house rule "Evidenz vor Behauptung"): every per-package fact
# is tagged in `verification`. `verified:` = checked against gh/pypi on the given
# date; `unverified:` = NOT yet checked, needs the Phase-0 deep-dive (ADR-255
# Phase-0 gate). Do not promote a package past `pending` without recording a real
# release proof here (ADR-255 step 5).
#
# Schema (per package):
#   dist             — published PyPI distribution name (target, iil-* prefixed)
#   pypi_current     — PyPI project name(s) that exist TODAY (may differ pre-rename)
#   repo_current     — owner/name of the GitHub repo TODAY (gh-verified)
#   repo_final       — target owner/name (default: iilgmbh/<dist>, REC-8)
#   rename           — true if repo and/or dist name changes (REC-8 separate gate)
#   workflow         — publish workflow file (hardened OIDC baseline, REC-7)
#   environment      — GitHub Environment used by the publish job (REC-7)
#   publisher_current/publisher_final — OIDC trusted-publisher owner (REC-6)
#   role_target      — org/repo role target state (REC-1, governance end state)
#   dependencies     — fleet consumers (drives integration-rich pilot pick)
#   status           — done | pending | pilot | blocked
#   verification     — verified/unverified evidence trail
#
# status legend:
#   done    — repo under iilgmbh AND release proven through final publisher
#   pending — not started / repo still under achimdehnert
#   pilot   — selected for the REC-12 kill-gate trio (measure before fan-out)
#   blocked — has an open blocker (named in `notes`)

meta:
  adr: ADR-255
  github_org_target: iilgmbh          # signs the OIDC repository_owner claim
  pypi_org_target: iil                # PyPI Organization (NOT "iilgmbh"); ADR-255 naming map
  pypi_account_legacy: iildehnert     # personal account to transfer projects OUT of
  default_resolution: explicit        # REC-4: no silent achimdehnert fallback for iil-*
  verified_on: 2026-06-23
  iilgmbh_repos_at_acceptance:        # gh repo list iilgmbh, 2026-06-23 (12 repos)
    - desktop-setup
    - django-lms-lite
    - iil-data
    - iil-fieldprefill
    - iil-klickdummy
    - iil-pet-portal
    - iil-relaunch
    - iil-voice-agent
    - illustration-fw
    - nl2iot-hub
    - risk-hub
    - shared-ci
  # Phase-0 prerequisites gate (ADR-255). Blocking before ANY per-repo transfer.
  phase0_gate:
    pypi_org_iil_exists: true         # VERIFIED 2026-06-22 (pypi.org/org/iil 200)
    pypi_projects_under_org: unverified   # iil-* still on personal iildehnert acct
    github_names_available: unverified
    target_org_actions_envs_ok: unverified
    breakglass_runbook_written: false
    two_independent_owners: unverified    # REC-1 governance end state

# Kill-gate pilot trio (ADR-255 REC-12): score separately on 3 profiles before fan-out.
pilots:
  a_simple_no_rename: iil-adrfw       # publish.yml already landed (ADR-255 step 1)
  b_rename: promptfw                  # promptfw -> iil-promptfw
  c_integration_rich: aifw            # aifw -> iil-aifw; fleet-critical + rename = hardest

packages:

  iil-adrfw:
    dist: iil-adrfw
    pypi_current: [iil-adrfw]
    repo_current: achimdehnert/iil-adrfw
    repo_final: iilgmbh/iil-adrfw
    rename: false
    workflow: publish.yml
    environment: pypi
    publisher_current: achimdehnert
    publisher_final: iilgmbh
    role_target: team-bound (REC-1)
    dependencies: [platform, dev-hub]
    status: pilot
    notes: "Pilot (a). Hardened OIDC publish.yml landed; OIDC publisher under
      achimdehnert is throwaway at transfer (ADR-255 Context #2)."
    verification:
      verified: "repo_current=achimdehnert/iil-adrfw (gh 2026-06-23); pypi iil-adrfw exists (200)"
      unverified: "publisher identity; release proof through final publisher"

  aifw:
    dist: iil-aifw
    pypi_current: [aifw, iil-aifw]    # BOTH exist on PyPI (200) — canonical owner unverified
    repo_current: achimdehnert/aifw
    repo_final: iilgmbh/iil-aifw
    rename: true
    workflow: publish-iil-aifw.yml
    environment: pypi
    publisher_current: achimdehnert
    publisher_final: iilgmbh
    role_target: team-bound (REC-1)
