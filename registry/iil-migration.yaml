# registry/iil-migration.yaml — Single Source of Truth for the iil-* PyPI-family
# org migration (achimdehnert -> iilgmbh / PyPI org "iil"). Governance: ADR-255.
#
# This is the machine-readable SSoT mandated by ADR-255 REC-3. No second truth in
# prose. An idempotent checker validates reality against it:
#     python3 tools/iil_migration_check.py
#
# Honesty contract (house rule "Evidenz vor Behauptung"): every per-package fact
# is tagged in `verification`. `verified:` = checked against gh/pypi on the given
# date; `unverified:` = NOT yet checked, needs the Phase-0 deep-dive (ADR-255
# Phase-0 gate). Do not promote a package past `pending` without recording a real
# release proof here (ADR-255 step 5).
#
# Schema (per package):
#   dist             — published PyPI distribution name (target, iil-* prefixed)
#   pypi_current     — PyPI project name(s) that exist TODAY (may differ pre-rename)
#   repo_current     — owner/name of the GitHub repo TODAY (gh-verified)
#   repo_final       — target owner/name (default: iilgmbh/<dist>, REC-8)
#   rename           — true if repo and/or dist name changes (REC-8 separate gate)
#   workflow         — publish workflow file (hardened OIDC baseline, REC-7)
#   environment      — GitHub Environment used by the publish job (REC-7)
#   publisher_current/publisher_final — OIDC trusted-publisher owner (REC-6)
#   role_target      — org/repo role target state (REC-1, governance end state)
#   dependencies     — fleet consumers (drives integration-rich pilot pick)
#   status           — done | pending | pilot | blocked
#   verification     — verified/unverified evidence trail
#
# status legend:
#   done    — repo under iilgmbh AND release proven through final publisher
#   pending — not started / repo still under achimdehnert
#   pilot   — selected for the REC-12 kill-gate trio (measure before fan-out)
#   blocked — has an open blocker (named in `notes`)

meta:
  adr: ADR-255
  github_org_target: iilgmbh          # signs the OIDC repository_owner claim
  pypi_org_target: iil                # PyPI Organization (NOT "iilgmbh"); ADR-255 naming map
  pypi_account_legacy: iildehnert     # personal account to transfer projects OUT of
  default_resolution: explicit        # REC-4: no silent achimdehnert fallback for iil-*
  verified_on: 2026-06-23
  iilgmbh_repos_at_acceptance:        # gh repo list iilgmbh, 2026-06-23 (12 repos)
    - desktop-setup
    - django-lms-lite
    - iil-data
    - iil-fieldprefill
    - iil-klickdummy
    - iil-pet-portal
    - iil-relaunch
    - iil-voice-agent
    - illustration-fw
    - nl2iot-hub
    - risk-hub
    - shared-ci
  # Phase-0 prerequisites gate (ADR-255). Blocking before ANY per-repo transfer.
  # Run 2026-06-23 (read-only). VERDICT: NOT PASSABLE yet — the governance end state
  # (>=2 independent owners, REC-1) is unmet on the GitHub org, so a transfer now would
  # "achieve" migration nominally while control stays personal (exactly the Rev-2 warning).
  phase0_gate:
    pypi_org_iil_exists: true         # VERIFIED 2026-06-22 (pypi.org/org/iil 200)
    pypi_projects_under_org: unverified   # PyPI user/org pages behind bot-challenge ("Client
                                          # Challenge") -> not scrapable read-only. NOTE: the
                                          # iil-* DIST names are already the canonical/active
                                          # ones (see per-package); ownership transfer to org
                                          # `iil` still needs an AUTHENTICATED check (user).
    github_names_available: true      # VERIFIED 2026-06-23: all 16 target iil-* names are FREE
                                      # under iilgmbh (gh 404 -> no transfer collision).
    target_org_actions_envs_ok: unverified  # needs admin:org (token has read:org only);
                                            # org Actions-policy + org secrets not readable.
    breakglass_runbook_written: draft       # REC-9 DRAFT: docs/runbooks/iil-migration-breakglass-pypi-token.md
                                            # pending 2 user decisions (named principal, secure channel)
    two_independent_owners: false     # BLOCKER (REC-1): iilgmbh has a SINGLE owner
                                      # (achimdehnert, admin) — verified complete via read:org
                                      # 2026-06-23. PyPI org owner-count needs an authed check.

# Phase-0 read-only findings (2026-06-23) — evidence trail for the gate above.
phase0_findings:
  dist_rename_already_done:
    summary: >
      The PyPI DIST rename is effectively complete fleet-wide: the iil-* names are
      already the canonical/active distributions; the bare names are stale or
      explicitly deprecated. So every "rename" package is now only a REPO rename +
      OWNERSHIP transfer, NOT a dist migration. Verified via PyPI JSON 2026-06-23.
    evidence:
      iil-aifw: "v0.11.4 2026-06-15 (10 rel) — canonical; aifw v0.5.0 2026-03-02 stale"
      iil-promptfw: "v0.8.0 2026-04-04 — canonical; promptfw v0.5.1 2026-03-01 stale"
      iil-authoringfw: "v0.11.1 2026-06-06 — canonical; authoringfw v0.3.0 stale"
      iil-nl2cadfw: "v0.2.1 2026-06-14 — canonical; nl2cad v0.3.0 marked 'DEPRECATED — redirect, use iil-nl2cadfw'"
      iil-weltenfw: "v0.4.0 2026-03-10 — canonical; weltenfw v0.1.0 stale"
      iil-learnfw / iil-outlinefw / iil-researchfw / iil-illustrationfw: "only the iil-* dist exists (no bare name)"
  github_target_names_free: "all 16 target iil-* repo names 404 under iilgmbh — no transfer collision"
  blockers:
    - "REC-1 NOT met: iilgmbh GitHub org has a SINGLE owner (achimdehnert). Add a 2nd independent company-controlled owner before transfer."
    - "PyPI: ownership/owner-count needs an AUTHENTICATED check (profile pages behind bot-challenge); transfer iil-* projects from personal `iildehnert` into org `iil` with >=2 owners."
    - "REC-9 break-glass runbook not yet written."
    - "Org Actions-policy + org secrets not readable read-only (needs admin:org) — verify target-org CI prerequisites with an admin token."

# Kill-gate pilot trio (ADR-255 REC-12): score separately on 3 profiles before fan-out.
pilots:
  a_simple_no_rename: iil-adrfw       # publish.yml already landed (ADR-255 step 1)
  b_rename: promptfw                  # promptfw -> iil-promptfw
  c_integration_rich: aifw            # aifw -> iil-aifw; fleet-critical + rename = hardest

