# registry/repos.yaml — Single Source of Truth for all platform repositories
# Used by: repo_checker.py, populate_catalog (devhub), CI coverage gate
# ADR-022: Repository Consistency Standards
# Last verified: 2026-02-26 against docker-compose.prod.yml in each repo
#
# DEPLOY FIELDS (added 2026-02-26 to prevent misidentified containers/paths):
#   deploy.server_path   — absolute path on Hetzner VM 88.198.191.108
#   deploy.image         — full GHCR image reference
#   deploy.web_container — container_name from docker-compose.prod.yml
#   deploy.web_service   — service name from docker-compose.prod.yml
#   deploy.migrate_cmd   — correct Django migrate command
#   deploy.multi_tenant  — true if django-tenants is used
#   deploy.port          — host port mapped to container
#
# TENANCY FIELDS (added 2026-05-20 — ADR-212 Offene Punkte #1, Issue #247):
#   tenancy_mode  — REQUIRED. Enum: subdomain | path | header | jwt_claim | none
#                   subdomain: Tenant via Subdomain (SubdomainTenantMiddleware / django-tenants)
#                   path:      Tenant via URL-Pfad (/<tenant>/…)
#                   header:    Tenant via HTTP-Header (z.B. X-API-Key → tenant_id)
#                   jwt_claim: Tenant aus JWT-Claim
#                   none:      kein Tenant-Konzept
#   demo_fixture  — REQUIRED wenn tenancy_mode == subdomain.
#                   true: Demo-Org-Migration konfiguriert (iil-demo-fixture angebunden)
#                   false: noch nicht konfiguriert (Klausel-1-Pflicht offen)
#
# KLICKDUMMY FIELDS (added 2026-05-20 — ADR-211 Rev 9 / SF3 Prereq, Issue #255):
#   klickdummy.class  — REQUIRED wenn das Repo einen `klickdummy/`-Pfad
#                       oder einen `?demo=`-Render hat. Sonst weglassen.
#                       Enum: mock-prototype | demo-render
#                         mock-prototype: kein Backend, Systemgrenzen als
#                                         Target-Mock (kein `?demo=` in Prod).
#                                         Beispiel-Kontext: ADR-211 §Kontext —
#                                         meiki-hub-Stil (Manifest-Single-File).
#                         demo-render:    env-gegateter Zustand der echten App
#                                         (`?demo=<state>`). I2 erfordert, dass
#                                         dieser Pfad in **Prod nicht erreichbar**
#                                         ist (404/disabled). Wird per
#                                         `klickdummy_prod_guard.sh` extern
#                                         adversarial geprüft (SF3, AC: Issue #255).
#                       „Keine Klasse deklariert" bei Repo mit `klickdummy/`-Pfad =
#                       I2-Verstoß (kein vacuous pass; ADR-211 Rev 9 I2).
#   klickdummy.demo_paths  — OPTIONAL, nur für `class: demo-render`. Liste der
#                       Pfade/States, die der externe Prod-Guard probiert.
#                       Beispiel: ["/login?demo=anonymous", "/dashboard?demo=trial"]
#                       Default (wenn weggelassen): nur `/?demo=` an Root.
#   Diese PR ergänzt **nur die Schema-Spezifikation** — per-Repo-Werte werden
#   vom Owner pro Repo separat ratifiziert (kein Vorgriff durch den Agent).
domains:
- name: Developer Platform
  systems:
  - name: dev-hub
    repo: dev-hub
    description: Central Developer Portal & Platform Management Hub
    github: achimdehnert/dev-hub
    deployed: true
    url: https://devhub.iil.pet
    type: django
    lifecycle: production
    tenancy_mode: none
    dockerfile: Dockerfile
    compose: docker-compose.prod.yml
    coverage_threshold: 80
    deploy:
      server_path: /opt/dev-hub
      image: ghcr.io/achimdehnert/dev-hub:${IMAGE_TAG:-latest}
      web_container: devhub_web
      web_service: devhub-web
      migrate_cmd: python manage.py migrate --noinput
      multi_tenant: false
      port: 8085
    staging:
      server_path: /opt/dev-hub-staging
      image: ghcr.io/achimdehnert/dev-hub:${IMAGE_TAG:-latest}
      web_container: dev_hub_staging_web
      web_service: dev-hub-staging-web
      django_settings_module: config.settings.production
      migrate_cmd: python manage.py migrate --noinput
      port: 19002
      ingress: traefik
      hostnames:
      - staging-devhub.iil.pet
    oidc:
      prod_app_slug: dev-hub
      prod_redirect: https://devhub.iil.pet/oidc/callback/
      staging_app_slug: dev-hub-staging
      staging_redirect: https://staging-devhub.iil.pet/oidc/callback/
