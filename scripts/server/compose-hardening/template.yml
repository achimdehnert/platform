# =============================================================================
# BF Agent Platform — Compose Hardening Template (ADR-098)
# =============================================================================
# Merge this into each app's docker-compose.prod.yml.
# Replace ${APP_NAME} and ${APP_PORT} with app-specific values.
#
# App port map (ADR-063):
#   bfagent=8080  mcp-hub=8081  travel-beat=8082  weltenhub=8085
#   trading-hub=8088  risk-hub=8090  cad-hub=8094
#
# ADR-022 invariants enforced here:
#   - healthcheck on every service (python urllib, not curl)
#   - depends_on with condition: service_healthy / service_completed_successfully
#   - image: ghcr.io/achimdehnert/ prefix only
#   - env_file: .env.prod (never environment: ${VAR})
#   - localhost-only port binding (127.0.0.1:PORT:8000)
#   - restart: unless-stopped on all long-running services
#   - log rotation on all services
#   - deploy.resources.limits + reservations on all services
# =============================================================================

services:

  web:
    image: "ghcr.io/achimdehnert/${APP_NAME}:${IMAGE_TAG:-latest}"
    command: ["web"]
    env_file: .env.prod
    ports:
      - "127.0.0.1:${APP_PORT}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/livez/')"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 384M     # tier override: cad-hub -> 512M
          cpus: "1.0"      # tier override: cad-hub -> 2.0, trading-hub -> 1.5
        reservations:
          memory: 192M
          cpus: "0.25"

  worker:
    image: "ghcr.io/achimdehnert/${APP_NAME}:${IMAGE_TAG:-latest}"
    command: ["worker"]
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping", "--timeout", "10"]
      interval: 60s
      timeout: 15s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M     # tier override: bfagent/mcp-hub/cad-hub -> 512M, cpus -> 2.0
          cpus: "1.5"
        reservations:
          memory: 256M
          cpus: "0.5"

  beat:
    image: "ghcr.io/achimdehnert/${APP_NAME}:${IMAGE_TAG:-latest}"
    command: ["beat"]
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 60s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 64M
          cpus: "0.1"

  db:
    image: "postgres:16-alpine"
    env_file: .env.prod
    volumes:
      - db_data:/var/lib/postgresql/data
    shm_size: "128m"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: >
      postgres
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c effective_cache_size=256MB
      -c max_connections=50
      -c checkpoint_completion_target=0.9
      -c wal_buffers=8MB
      -c random_page_cost=1.1
      -c log_min_duration_statement=200
      -c log_connections=off
      -c log_disconnections=off
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.75"
        reservations:
          memory: 256M
          cpus: "0.25"

  redis:
    image: "redis:7-alpine"
    command: >
      redis-server
      --maxmemory 96mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 48M
          cpus: "0.1"

  migrate:
    image: "ghcr.io/achimdehnert/${APP_NAME}:${IMAGE_TAG:-latest}"
    command: ["migrate"]
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

# =============================================================================
# Per-app overrides (only differing values — merge on top of this template)
# =============================================================================
#
# bfagent / mcp-hub (I/O-heavy — LLM/SSH calls):
#   worker.deploy.resources.limits.cpus: "2.0"
#
# cad-hub (CPU-heavy — IFC parsing):
#   web.deploy.resources.limits.cpus: "2.0"
#   web.deploy.resources.limits.memory: 512M
#   worker.deploy.resources.limits.cpus: "2.0"
#
# trading-hub (WebSocket-heavy):
#   web.deploy.resources.limits.cpus: "1.5"
#
# risk-hub (no beat):
#   Remove beat service entirely
