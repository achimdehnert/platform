#!/usr/bin/env bash
# ============================================================================
# platform.conf — Declarative Platform Configuration (Source of Truth)
# ============================================================================
#
# This file defines ALL platform-wide settings for git, SSH, and deployment.
# It is sourced by platform-setup.sh, server-setup.sh, and verify.sh.
#
# Location: platform/scripts/setup/platform.conf
# Format: Bash-sourceable KEY=VALUE (no spaces around =)
# ============================================================================

# ── Git Identity ─────────────────────────────────────────────────────────────
GIT_USER_NAME="achimdehnert"
GIT_USER_EMAIL="achim.dehnert@iil.gmbh"
GIT_DEFAULT_BRANCH="main"
GIT_PULL_STRATEGY="rebase"              # rebase | merge | ff-only

# ── Conventional Commits ─────────────────────────────────────────────────────
GIT_COMMIT_TYPES="feat fix refactor test docs chore ci perf style build"

# ── GitHub ───────────────────────────────────────────────────────────────────
GITHUB_USER="achimdehnert"
GITHUB_ORG=""                            # Leave empty if personal account
GITHUB_SSH_HOST="github.com"
GITHUB_REGISTRY="ghcr.io/achimdehnert"

# ── SSH Key Configuration ────────────────────────────────────────────────────
SSH_KEY_TYPE="ed25519"
SSH_KEY_GITHUB="github_ed25519"          # Key name (without path)
SSH_KEY_SERVER="platform_ed25519"        # Key name (without path)
SSH_DIR="${HOME}/.ssh"

# ── Server Configuration ─────────────────────────────────────────────────────
# Format: "alias|host|user|port"
SERVERS=(
    "prod|88.198.191.108|root|22"
    "dev|46.225.113.1|deploy|22"
)

# Legacy single-server vars (used by ssh config template)
SERVER_HOST="88.198.191.108"
SERVER_USER="root"
SERVER_PORT="22"
SERVER_ALIAS="prod"

# ── Network / Firewall ────────────────────────────────────────────────────────
# WICHTIG: Hetzner-Server blockieren ICMP — `ping` liefert 100% packet loss!
# Das bedeutet NICHT, dass der Server down ist.
# Diagnose IMMER via TCP-Probe: server_probe.py (infra/scripts/server_probe.py)
ICMP_BLOCKED_SERVERS=("88.198.191.108")

# ── Platform Repositories ────────────────────────────────────────────────────
# Format: "repo-slug|server-path|branch|deploy-model"
# deploy-model: docker-image = CI/CD baut Image, docker compose pull + up
#               git-clone    = git pull auf Server, Code direkt gemountet
#               compose-only = docker-compose.prod.yml auf Server, kein Git-Repo
#               none         = Nur lokal / PyPI-Package, kein Server-Deploy
PLATFORM_REPOS=(
    "mcp-hub|/home/dehnert/github/mcp-hub|main|git-clone"
    "dev-hub|/opt/dev-hub|main|docker-image"
    "bfagent|/opt/bfagent-app|main|docker-image"
    "travel-beat|/opt/travel-beat|main|docker-image"
    "weltenhub|/opt/weltenhub|main|docker-image"
    "risk-hub|/opt/risk-hub|main|docker-image"
    "pptx-hub|/opt/pptx-hub|main|docker-image"
    "trading-hub|/opt/trading-hub|main|docker-image"
    "wedding-hub|/opt/wedding-hub|main|docker-image"
    "coach-hub|/opt/coach-hub|main|docker-image"
    "cad-hub|/opt/cad-hub|main|docker-image"
    "137-hub|/opt/137-hub|main|docker-image"
    "odoo-hub|/opt/odoo-hub|main|compose-only"
    "platform|NONE|main|none"
)

# ── WSL-specific ─────────────────────────────────────────────────────────────
WSL_HOME="/home/dehnert"

# ── Git Config Extras ────────────────────────────────────────────────────────
GIT_EXTRAS=(
    "core.autocrlf|input"
    "core.eol|lf"
    "init.defaultBranch|main"
    "push.autoSetupRemote|true"
    "push.default|current"
    "fetch.prune|true"
    "diff.colorMoved|default"
    "rerere.enabled|true"
    "commit.verbose|true"
    'url.git@github.com:.insteadOf|https://github.com/'
)

# ── Editor (environment-dependent) ─────────────────────────────────────────
GIT_EDITOR_DEV="code --wait"
GIT_EDITOR_SERVER="true"                # Forces git commit -m (no interactive)
