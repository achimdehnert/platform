# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  EMERGENCY DEPLOY - Bypass Platform Workflows                              ║
# ║  USE ONLY WHEN: Platform repo is unavailable or workflows are broken       ║
# ║                                                                            ║
# ║  Copy this file to: <your-app>/.github/workflows/deploy-emergency.yml      ║
# ║  Replace {{APP_NAME}} and {{DEPLOY_PATH}} with your values                 ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

name: "⚠️ Emergency Deploy (Bypass Platform)"

on:
  workflow_dispatch:
    inputs:
      confirm_bypass:
        description: 'Type EMERGENCY to confirm platform bypass'
        required: true
        type: string
      reason:
        description: 'Reason for emergency deployment'
        required: true
        type: string
      image_tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        default: 'latest'
        type: string

env:
  APP_NAME: "{{APP_NAME}}"           # e.g., travel-beat
  DEPLOY_PATH: "{{DEPLOY_PATH}}"     # e.g., /opt/travel-beat
  COMPOSE_FILE: "docker-compose.prod.yml"
  ENV_FILE: ".env.prod"

jobs:
  validate:
    name: "Validate Emergency Request"
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Validate confirmation
        id: check
        run: |
          if [ "${{ inputs.confirm_bypass }}" != "EMERGENCY" ]; then
            echo "::error::You must type 'EMERGENCY' to confirm bypass"
            echo "approved=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "approved=true" >> $GITHUB_OUTPUT

  log-emergency:
    name: "Log Emergency Deployment"
    needs: [validate]
    if: needs.validate.outputs.approved == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Log emergency deployment
        run: |
          echo "╔═══════════════════════════════════════════════════════════╗"
          echo "║  ⚠️  EMERGENCY DEPLOYMENT TRIGGERED                        ║"
          echo "╚═══════════════════════════════════════════════════════════╝"
          echo ""
          echo "Reason: ${{ inputs.reason }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Time: $(date -u)"
          echo "Repository: ${{ github.repository }}"
          echo "Image Tag: ${{ inputs.image_tag }}"
          echo ""
          echo "⚠️ This deployment bypasses all platform safety checks!"

      # TODO: Add Slack/PagerDuty notification here
      # - name: Notify on-call
      #   run: |
      #     curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
      #       -H 'Content-type: application/json' \
      #       -d '{"text":"⚠️ Emergency Deploy: ${{ env.APP_NAME }} by ${{ github.actor }}"}'

  emergency-deploy:
    name: "Emergency Deploy"
    needs: [validate, log-emergency]
    if: needs.validate.outputs.approved == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Direct deploy (no platform dependency)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -euo pipefail
            
            echo "🚨 Emergency deployment starting..."
            cd ${{ env.DEPLOY_PATH }}
            
            # Update image tag if specified
            if [ "${{ inputs.image_tag }}" != "latest" ]; then
              APP_ENV=$(echo "${{ env.APP_NAME }}" | tr '[:lower:]-' '[:upper:]_')
              sed -i "s/^${APP_ENV}_IMAGE_TAG=.*/${APP_ENV}_IMAGE_TAG=${{ inputs.image_tag }}/" ${{ env.ENV_FILE }}
            fi
            
            # Pull and deploy
            docker compose -f ${{ env.COMPOSE_FILE }} pull
            docker compose -f ${{ env.COMPOSE_FILE }} up -d --force-recreate
            
            # Log emergency deployment
            echo '{"timestamp":"'$(date -Iseconds)'","type":"EMERGENCY","actor":"${{ github.actor }}","reason":"${{ inputs.reason }}","tag":"${{ inputs.image_tag }}"}' >> deployments.log
            
            echo "✅ Emergency deployment completed"

  verify:
    name: "Verify Deployment"
    needs: [emergency-deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for containers
        run: sleep 30
      
      - name: Basic health check
        run: |
          # Replace with your health URL
          HEALTH_URL="https://${{ env.APP_NAME }}.example.com/health/"
          
          for i in 1 2 3 4 5; do
            echo "Health check attempt $i/5..."
            HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' "$HEALTH_URL" 2>/dev/null || echo "000")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Emergency deployment verified (HTTP $HTTP_CODE)"
              exit 0
            fi
            
            echo "HTTP $HTTP_CODE - waiting 10s..."
            sleep 10
          done
          
          echo "⚠️ Health check failed - manual verification required"
          exit 1

  post-deploy:
    name: "Post-Deploy Actions"
    needs: [verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Emergency Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | ${{ env.APP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | ${{ inputs.reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | ${{ inputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Remember to create an incident report for this emergency deployment.**" >> $GITHUB_STEP_SUMMARY
