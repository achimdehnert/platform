# IIL Print Agent — Design Profiles (SSoT)
# Neue Designs: einfach Block hinzufügen, kein Code-Change nötig.
# Pflichtfelder: primary, bg_light, border, border_dark, row_even, row_odd,
#                gantt_bg, header_left, cover_label, subtitle,
#                footer_suffix, llm_context, es_label_text

designs:

  meiki:
    primary:       "#1A4A7A"
    bg_light:      "#EFF4FA"
    border:        "#D0D8E4"
    border_dark:   "#0F3060"
    row_even:      "#F5F8FC"
    row_odd:       "#FFFFFF"
    gantt_bg:      "#FAFCFF"
    flow_s1:       "#1565C0"
    flow_s2:       "#2E7D32"
    flow_s3:       "#6A1B9A"
    header_left:   "PROJEKT MEiKI  |  LENKUNGSKREIS"
    cover_label:   "PROJEKT MEiKI &nbsp;|&nbsp; LENKUNGSKREIS"
    subtitle:      "Projekt MEiKI — Mehrwert durch KI in Bayerischen Landkreisen"
    footer_suffix: "Projekt MEiKI, gefördert durch den Freistaat Bayern"
    llm_context:   "bayerische Kommunalverwaltung (Projekt MEiKI)"
    es_label_text: "Executive Summary"
    meta_template: meiki
    # Mermaid theme injection — 4-tier semantic palette.
    # Authors use :::primary / :::accent / :::support / :::muted in diagrams;
    # classDef lines are prepended automatically at render time.
    mermaid_classes:
      primary: { fill: "#1A4A7A", stroke: "#0F3060", color: "#FFFFFF" }
      accent:  { fill: "#1565C0", stroke: "#1A4A7A", color: "#FFFFFF" }
      support: { fill: "#B8D1E8", stroke: "#1A4A7A", color: "#0F3060" }
      muted:   { fill: "#EFF4FA", stroke: "#1A4A7A", color: "#0F3060" }

